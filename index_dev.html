class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error)return(
      <div style={{padding:32,background:'#fef2f2',minHeight:'100vh',fontFamily:'monospace'}}>
        <h2 style={{color:'#dc2626'}}>гГђгГ≥гГАгГ™гГ≥гВ∞гВ®гГ©гГЉпЉИйЦЛзЩЇзФ®и°®з§ЇпЉЙ</h2>
        <pre style={{color:'#991b1b',fontSize:12,whiteSpace:'pre-wrap'}}>{this.state.error?.message}\n{this.state.error?.stack}</pre>
        <button onClick={()=>this.setState({error:null})} style={{marginTop:16,padding:'8px 16px',background:'#c2410c',color:'white',border:'none',borderRadius:8,cursor:'pointer'}}>гГ™гВїгГГгГИ</button>
      </div>
    );
    return this.props.children;
  }
}

const normalizeStore = (s) => {
  const t = String(s||'').trim();
  if(!t) return '';
  if(/^(honten|жЬђеЇЧ|H|h)$/.test(t)) return 'жЬђеЇЧ';
  if(/^(sanda|дЄЙзФ∞|дЄЙзФ∞еЇЧ|S|s)$/.test(t)) return 'дЄЙзФ∞еЇЧ';
  return t;
};

// ExcelгВїгГЂARGBвЖТCSS hexпЉИиГМжЩѓиЙ≤еПЦеЊЧпЉЙ
const cellArgbToHex = (ws, col, row) => {
  try {
    const addr = XLSX.utils.encode_cell({r:row, c:col});
    const cell = ws[addr];
    if(!cell||!cell.s) return null;
    const fg = cell.s.fgColor || cell.s.patternFgColor || cell.s.bgColor;
    if(!fg) return null;
    const argb = fg.argb || fg.rgb || '';
    if(!argb || argb==='00000000' || argb==='FFFFFFFF' || argb.toLowerCase()==='ffffff' || argb==='FF000000') return null;
    const rgb = argb.length===8 ? argb.slice(2) : argb;
    return '#'+rgb;
  } catch(e){ return null; }
};

const parseCustExcel = (wb) => {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const allRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:false});
  if(!allRows||!allRows.length) return [];

  const norm = s => String(s||'').replace(/[гАА\s]/g,'').toLowerCase();

  // гГШгГГгГАгГЉи°МгВТеЕИй†≠10и°МгБІиЗ™еЛХж§ЬеЗЇ
  let headerIdx = -1, colMap = {};
  for(let ri=0; ri<Math.min(10,allRows.length); ri++){
    const row = allRows[ri]; if(!row) continue;
    let hits=0; const cand={};
    for(let ci=0; ci<row.length; ci++){
      const cell = norm(row[ci]); if(!cell) continue;
      for(const [fld,kws] of Object.entries(COL_KEYWORDS)){
        if(!cand[fld] && kws.some(kw=>cell.includes(kw)||kw.includes(cell))){
          cand[fld]=ci; hits++;
        }
      }
    }
    if(hits>=2 && (cand.name!=null||cand.inspDate!=null)){ headerIdx=ri; colMap=cand; break; }
  }
  // гГХгВ©гГЉгГЂгГРгГГгВѓпЉЪгВєгВѓгГ™гГЉгГ≥гВЈгГІгГГгГИжЇЦжЛ†пЉИзВєж§ЬжЇАдЇЖжЧ•=0еИЧзЫЃпЉЙ
  if(headerIdx<0){
    colMap={inspDate:0,name:1,no:2,carModel:3,
      mailing1:4,reserve1:5,mailing2:6,reserve2:7,
      arrivalDate:8,tokuten:9,course:10,store:11,staff:12,note:13};
    headerIdx=0;
  }

  const toDate = v => {
    if(!v||v==='') return '';
    if(v instanceof Date) return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;
    if(typeof v==='number'){
      const d=new Date(Math.round((v-25569)*86400*1000));
      d.setMinutes(d.getMinutes()+d.getTimezoneOffset());
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    const s=String(v);
    const m=s.match(/(\d{4})[\/\-еєі](\d{1,2})[\/\-жЬИ](\d{1,2})/);
    if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
    // M/D/YY ељҐеЉП (дЊЛ: 6/1/26 вЖТ 2026-06-01)
    const m2=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
    if(m2) return `20${m2[3]}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`;
    return s;
  };

  const g = (row,fld) => row[colMap[fld]??-1] ?? null;

  const result = [];
  for(let ri=headerIdx+1; ri<allRows.length; ri++){
    const r = allRows[ri]; if(!r) continue;
    const nameVal = g(r,'name');
    if(!nameVal||String(nameVal).trim()==='') continue;
    // еРНеЙНеИЧгБЃгВїгГЂиГМжЩѓиЙ≤гВТи°Мдї£и°®иЙ≤гБ®гБЧгБ¶еПЦеЊЧ
    const cellBg = cellArgbToHex(ws, colMap.name??4, ri);
    result.push({
      inspDate:   toDate(g(r,'inspDate')),
      name:       String(nameVal).replace(/гАА/g,' ').trim(),
      no:         g(r,'no')??'',
      carModel:   String(g(r,'carModel')||'').trim(),
      phoneHome:  String(g(r,'phoneHome')||'').trim(),
      phoneMobile:String(g(r,'phoneMobile')||'').trim(),
      mailing1:   toDate(g(r,'mailing1')),
      reserve1:   toDate(g(r,'reserve1')),
      mailing2:   toDate(g(r,'mailing2')),
      reserve2:   toDate(g(r,'reserve2')),
      arrivalDate:toDate(g(r,'arrivalDate')),
      tokuten:    g(r,'tokuten')??'',
      course:     String(g(r,'course')||'').trim(),
      store:      normalizeStore(g(r,'store')),
      staff:      String(g(r,'staff')||'').trim(),
      note:       String(g(r,'note')||'').trim(),
      cellBg:     cellBg||null,
      _idx: ri,
    });
  }
  return result;
};

const CustomerListView = memo(({custFiles, setCustFiles, currentUser}) => {
  const [selMonth, setSelMonth] = useState(null);
  const [filter, setFilter]     = useState('');
  const [storeFilter, setStoreFilter] = useState('all');
  const [importing, setImporting] = useState(false);
  const [importOk, setImportOk]   = useState(null);
  const [archivedFiles, setArchivedFiles] = useState(()=>{
    try{const v=localStorage.getItem('hub_cust_archived');return v?JSON.parse(v):{}}catch{return{};}
  });
  const [showArchive, setShowArchive] = useState(false);

  const saveAndSet = useCallback((updater)=>{
    setCustFiles(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      try{localStorage.setItem('hub_cust_files',JSON.stringify(next));}catch{}
      return next;
    });
  },[setCustFiles]);

  const saveArchivedFiles = (data)=>{
    setArchivedFiles(data);
    try{localStorage.setItem('hub_cust_archived',JSON.stringify(data));}catch{}
  };

  const months = useMemo(()=>Object.keys(custFiles).sort(),[custFiles]);

  useEffect(()=>{
    if(months.length===0){setSelMonth(null);return;}
    if(!selMonth||!months.includes(selMonth)) setSelMonth(months[months.length-1]);
  },[months]);

  // жЬИиЗ™еЛХж§ЬеЗЇ
  const detectMonthFromRows = (rows) => {
    const counts={};
    ['inspDate','mailing1','mailing2','arrivalDate'].forEach(fld=>{
      rows.forEach(r=>{const m=(r[fld]||'').slice(0,7);if(m.match(/^\d{4}-\d{2}$/))counts[m]=(counts[m]||0)+1;});
    });
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    return sorted.length>0?sorted[0][0]:null;
  };

  // гГХгВ°гВ§гГЂи™≠гБњиЊЉгБњ
  const processFiles = async(files)=>{
    if(!files||files.length===0)return;
    setImporting(true);
    for(const file of Array.from(files)){
      if(!file.name.match(/\.(xlsx|xls)$/i)){alert(`гАМ${file.name}гАНгБѓ.xlsxгБЊгБЯгБѓ.xlsгГХгВ°гВ§гГЂгБІгБѓгБВгВКгБЊгБЫгВУ`);continue;}
      try{
        const buf=await file.arrayBuffer();
        const wb=XLSX.read(buf,{type:'array',cellDates:true});
        const rows=parseCustExcel(wb);
        let mk=detectMonthFromRows(rows);
        if(!mk){
          const nm=file.name.replace(/\.[^.]+$/,'');
          const m1=nm.match(/(\d{4})[_\-]?(\d{2})/);
          if(m1) mk=`${m1[1]}-${m1[2]}`;
        }
        if(!mk){
          const now=new Date();
          const def=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
          const input=prompt(`гАМ${file.name}гАНгБЃжЬИгВТеЕ•еКЫгБЧгБ¶гБПгБ†гБХгБДпЉИдЊЛ: 2026-06пЉЙ`,def);
          if(!input||!input.match(/^\d{4}-\d{2}$/)){alert('гВєгВ≠гГГгГЧгБЧгБЊгБЧгБЯ');continue;}
          mk=input;
        }
        saveAndSet(prev=>({...prev,[mk]:rows}));
        setImportOk(mk);
        setSelMonth(mk);
        setTimeout(()=>setImportOk(null),3000);
      }catch(e){alert(`гАМ${file.name}гАНи™≠гБњиЊЉгБњгВ®гГ©гГЉ: `+e.message);}
    }
    setImporting(false);
  };

  const handleDeleteMonth=(mk,e)=>{
    e&&e.stopPropagation();
    if(!confirm(mk+'гБЃгГЗгГЉгВњгВТеЙКйЩ§гБЧгБЊгБЩгБЛпЉЯ'))return;
    saveAndSet(prev=>{const u={...prev};delete u[mk];return u;});
    if(selMonth===mk)setSelMonth(null);
  };

  const handleArchiveMonth=(mk,e)=>{
    e&&e.stopPropagation();
    if(!confirm(`гАМ${mk}гАНгВТгВҐгГЉгВЂгВ§гГЦгБЧгБЊгБЩгБЛпЉЯ`))return;
    saveAndSet(prev=>{
      const rows=prev[mk]||[];
      saveArchivedFiles({...archivedFiles,[mk]:{rows,archivedAt:new Date().toISOString()}});
      const u={...prev};delete u[mk];return u;
    });
    if(selMonth===mk)setSelMonth(null);
  };

  const selRows = useMemo(()=>(custFiles[selMonth]||[]).map((r,i)=>({...r,_month:selMonth,_idx:i})),[custFiles,selMonth]);

  const displayRows = useMemo(()=>selRows.filter(c=>{
    if(storeFilter!=='all'&&c.store!==storeFilter)return false;
    const q=filter.toLowerCase();
    if(q&&![c.name,c.carModel,String(c.no),c.staff,c.note,c.course,c.inspDate].some(v=>v&&String(v).toLowerCase().includes(q)))return false;
    return true;
  }),[selRows,filter,storeFilter]);

  const now=new Date();
  const oldThreshold=`${now.getFullYear()}-${String(now.getMonth()-2<1?now.getMonth()+10:now.getMonth()-2).padStart(2,'0')}`;
  const arcCount=Object.keys(archivedFiles).length;

  // зВєж§ЬжЇАдЇЖжЧ•гБЛгВЙзЙєеЕЄгВТеИ§еЃЪпЉИ1гГґжЬИеЙНгГї2гГґжЬИеЙНпЉЙ
  const getTokuten=(inspDate, mailing2)=>{
    if(!inspDate) return '';
    const insp=new Date(inspDate);
    const oneMonthBefore=new Date(insp); oneMonthBefore.setMonth(oneMonthBefore.getMonth()-1);
    const twoMonthBefore=new Date(insp); twoMonthBefore.setMonth(twoMonthBefore.getMonth()-2);
    const today=new Date();
    if(mailing2){
      const m2=new Date(mailing2);
      if(today>=m2) return 'вС°';
    }
    if(today>=twoMonthBefore && today<oneMonthBefore) return 'вС°';
    if(today>=oneMonthBefore) return 'вС†';
    return '';
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 120px)',minHeight:400}}>

      {/* вФАвФА вС† гГШгГГгГАгГЉ вФАвФА */}
      <div style={{flexShrink:0,background:'white',borderRadius:13,padding:'10px 14px',marginBottom:8,boxShadow:'0 2px 10px rgba(0,0,0,.1)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
          <h3 style={{margin:0,fontSize:13,fontWeight:900,color:'#1e293b'}}>рЯУЛ й°ІеЃҐгГ™гВєгГИ</h3>
          <label style={{cursor:'pointer',display:'inline-flex',alignItems:'center',gap:5,
            padding:'6px 14px',background:importing?'#64748b':(importOk?'#16a34a':'#f59e0b'),
            color:'white',borderRadius:7,fontWeight:800,fontSize:12,boxShadow:'0 2px 6px rgba(0,0,0,.15)'}}>
            рЯУВ {importing?'и™≠иЊЉдЄ≠...':(importOk?'и™≠иЊЉеЃМдЇЖ':'ExcelгГХгВ°гВ§гГЂгВТйБЄжКЮ')}
            <input type="file" accept=".xlsx,.xls" multiple style={{display:'none'}}
              onChange={e=>{if(e.target.files.length)processFiles(e.target.files);e.target.value='';}}/>
          </label>
          <button onClick={()=>setShowArchive(v=>!v)}
            style={{width:28,height:28,borderRadius:'50%',background:showArchive?'#7c3aed':'#ede9fe',
              color:showArchive?'white':'#7c3aed',border:`2px solid ${showArchive?'#7c3aed':'#c4b5fd'}`,
              fontWeight:800,fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>
            рЯУ¶
          </button>
        </div>

        {/* жЬИгВњгГЦ */}
        <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'flex-start'}}>
          {months.length===0&&<span style={{color:'#9ca3af',fontSize:12,padding:'4px 0'}}>гАМрЯУВ ExcelгГХгВ°гВ§гГЂгВТйБЄжКЮгАНгБІExcelгВТи™≠гБњиЊЉгВАгБ®жЬИгВњгГЦгБМиЗ™еЛХдљЬжИРгБХгВМгБЊгБЩ</span>}
          {months.map(m=>{
            const rows=custFiles[m]||[];
            const isOld=m<oldThreshold;
            const isSel=selMonth===m;
            return(
              <div key={m} onClick={()=>setSelMonth(m)}
                style={{cursor:'pointer',border:`2px solid ${isSel?'#2563eb':isOld?'#f59e0b':'#cbd5e1'}`,

// loanerResгБЛгВЙbookingKeyгБІдї£иїКгВТеЛХзЪДгБЂеПЦеЊЧ
// bookingKey = "insp-dk-idx" гБЊгБЯгБѓ "sched-dk-slot"
// еРНеЙНдЄАиЗігБІгБѓгБ™гБПгВ≠гГЉдЄАиЗігБІзҐЇеЃЯгБЂзіРдїШгБС
const getLoanerByKey = (loanerRes, bookingKey) => {
  if(!bookingKey) return null;
  for(const cid of Object.keys(loanerRes)){
    for(const r of (loanerRes[cid]||[])){
      if(r.bookingKey===bookingKey){
        if(r.carName) return {label:`${r.carName}${r.carNum?` (${r.carNum})`:''}`,id:cid};
        const car=LOANERS.find(c=>c.id===Number(cid));
        return car?{label:`${car.name} (${car.num})`,id:Number(cid)}:null;
      }
    }
  }
  return null;
};
// жЧІгГЗгГЉгВњдЇТжПЫпЉЪbookingKeyгБ™гБЧ(жЧІзЙИдњЭе≠ШгГЗгГЉгВњ)гБѓеРНеЙНгГЮгГГгГБгБЂгГХгВ©гГЉгГЂгГРгГГгВѓ
const getLoanerLabel = (loanerRes, dk, rowName, bookingKey) => {
  if(!dk)return'';
  // гБЊгБЪbookingKeyгБІж§ЬзіҐ
  if(bookingKey){
    const found=getLoanerByKey(loanerRes,bookingKey);
    if(found)return found.label;
  }
  // гГХгВ©гГЉгГЂгГРгГГгВѓпЉЪеРНеЙНдЄАиЗіпЉИжЧІгГЗгГЉгВњдЇТжПЫпЉЙ
  if(!rowName)return'';
  const parts=dk.split('-').map(Number);
  const [y,m,d]=[parts[0],parts[1]-1,parts[2]];
  const dateNum=toNum(y,m,d);
  for(const cid of Object.keys(loanerRes)){
    for(const r of (loanerRes[cid]||[])){
      if(dateNum>=toNum(r.fy,r.fm,r.fd)&&dateNum<=toNum(r.ty,r.tm,r.td)&&r.user===rowName){
        if(r.carName) return `${r.carName}${r.carNum?` (${r.carNum})`:''}`;
        const car=LOANERS.find(c=>c.id===Number(cid));
        return car?`${car.name} (${car.num})`:'';
      }
    }
  }
  return'';
};
const getLoanerIdForRow = (loanerRes, dk, rowName, bookingKey) => {
  if(!dk)return null;
  if(bookingKey){
    const found=getLoanerByKey(loanerRes,bookingKey);
    if(found)return found.id;
  }
  if(!rowName)return null;
  const parts=dk.split('-').map(Number);
  const [y,m,d]=[parts[0],parts[1]-1,parts[2]];
  const dateNum=toNum(y,m,d);
  for(const cid of Object.keys(loanerRes)){
    for(const r of (loanerRes[cid]||[])){
      if(dateNum>=toNum(r.fy,r.fm,r.fd)&&dateNum<=toNum(r.ty,r.tm,r.td)&&r.user===rowName){
        return Number(cid);
      }
    }
  }
  return null;
};

const formatTime = (raw) => {
  const d=raw.replace(/\D/g,'');
  if(!d) return raw;
  if(d.length===3) return `${d[0]}:${d.slice(1)}`;
  if(d.length===4) return `${d.slice(0,2)}:${d.slice(2)}`;
  return raw;
};

const resolveStaff = (val, dynStaff) => {
  const t=String(val||'').trim();
  const n=parseInt(t,10);
  const list=dynStaff||STAFF;
  if(!isNaN(n)&&String(n)===t){
    const f=list.find(s=>s.myNumber===n||s.id===n);
    if(f)return f.name;
  }
  return t;
};

const sGet = async(k, retries=3) => {
  if (!GAS_READY) return null;
  for(let i=0;i<retries;i++){
    try {
      const r = await fetch(`${GAS_URL}?key=${encodeURIComponent(k)}&apiKey=${encodeURIComponent(GAS_API_KEY)}`, {cache:'no-store'});
      if(r.status===503){
        if(i<retries-1){await new Promise(r=>setTimeout(r,2000*(i+1)));continue;}
        return null;
      }
      const t = await r.text();
      if (!t || t === 'null' || t.startsWith('error:')) return null;
      const parsed = JSON.parse(t);
      // GASгБЃеРМжЩВеСЉгБ≥еЗЇгБЧгВ®гГ©гГЉгБМжЈЈеЕ•гБЧгБЯгГЗгГЉгВњгВТйЩ§е§Ц
      if (parsed && typeof parsed === 'object' && parsed.error) return null;
      return parsed;
    } catch { if(i===retries-1) return null; }
  }
  return null;
};

// GASгБЂгГЗгГЉгВњгВТжЫЄгБНиЊЉгВА
const sSet = async(k, v, retries=3) => {
  if (!GAS_READY) return;
  for(let i=0;i<retries;i++){
    try {
      // no-cors: GASгБЃгГ™гГАгВ§гГђгВѓгГИеХПй°МгВТеЫЮйБњгАВгГђгВєгГЭгГ≥гВєгБѓи™≠гВБгБ™гБДгБМжЫЄгБНиЊЉгБњгБѓжИРеКЯгБЩгВЛ
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {'Content-Type': 'text/plain;charset=utf-8'},
        body: JSON.stringify({key: k, value: JSON.stringify(v), apiKey: GAS_API_KEY}),
      });
      return; // жИРеКЯ
    } catch {
      if(i<retries-1) await new Promise(r=>setTimeout(r,1500*(i+1)));
    }
  }
};

// customers-filesгВєгГЖгГЉгВњгВєжЫіжЦ∞пЉИеЈЃеИЖгВ≠гГЉжЦєеЉП - GAS1еЫЮгБЃгБњпЉЙ
const syncCustStatus=async(custId,newStatus,extraFields={},matchName,matchNo)=>{
  try{
    // вС† cust-updatesгВ≠гГ•гГЉгБЂз©НгВАпЉИcustomers.htmlгБМгГЭгГЉгГ™гГ≥гВ∞гБІи™≠гВАпЉЙ
    const update={custId,name:matchName,no:matchNo,status:newStatus,...extraFields,ts:Date.now()};
    const existing=await sGet(STOR+'cust-updates')||[];
    const next=[...existing.filter(u=>
      !(custId&&u.custId===custId)&&
      !(matchName&&matchNo&&u.name===matchName&&String(u.no)===String(matchNo))
    ),update];
    await sSet(STOR+'cust-updates',next);

    // вС° гГБгГ£гГ≥гВѓгГЗгГЉгВњгВВзЫіжО•жЫЄгБНжПЫгБИпЉИcustomers.htmlгВТйЦЛгБДгБ¶гБДгБ™гБПгБ¶гВВеПНжШ†пЉЙ
    const SAFE=n=>n.replace(/[^a-zA-Z0-9гАА-йњњгВ†-гГњгБА-гВЯ]/g,'_').slice(0,30);
    const cfIdx=await sGet(STOR+'cf-index');
    if(!Array.isArray(cfIdx))return;
    for(const fi of cfIdx){
      const sn=SAFE(fi.name);
      const chunkMeta=await sGet(STOR+'cf-'+sn+'-index');
      if(!chunkMeta)continue;
      for(let ci2=0;ci2<chunkMeta.chunks;ci2++){
        const chunk=await sGet(STOR+'cf-'+sn+'-chunk-'+ci2);
        if(!Array.isArray(chunk))continue;
        let changed=false;
        const newChunk=chunk.map(c=>{
          const match=(custId&&c.custId===custId)||(matchName&&((!matchNo&&c.name===matchName)||(matchNo&&c.name===matchName&&String(c.no)===String(matchNo))));
          if(!match)return c;
          changed=true;
          return{...c,status:newStatus,...extraFields};
        });
        if(changed){
          await sSet(STOR+'cf-'+sn+'-chunk-'+ci2,newChunk);
          // localStorageгВВеН≥жЩВжЫіжЦ∞пЉИpreloadгБЂгВИгВЛдЄКжЫЄгБНгВТйШ≤гБРпЉЙ
          try{
            const lsKey='hub-cf-'+sn;
            const lsData=localStorage.getItem(lsKey);
            if(lsData){
              const parsed=JSON.parse(lsData);
              const updatedCustomers=(parsed.customers||[]).map(c=>{
                const match=(custId&&c.custId===custId)||(matchName&&((!matchNo&&c.name===matchName)||(matchNo&&c.name===matchName&&String(c.no)===String(matchNo))));
                if(!match)return c;
                return{...c,status:newStatus,...extraFields};
              });
              localStorage.setItem(lsKey,JSON.stringify({...parsed,customers:updatedCustomers}));
            }
          }catch(e){}
          // гГБгГ£гГ≥гВѓжЫЄгБНжПЫгБИжИРеКЯ вЖТ cust-updatesгВ≠гГ•гГЉгБЛгВЙеЙКйЩ§пЉИдЇМйЗНйБ©зФ®йШ≤ж≠ҐпЉЙ
          try{
            const curQ=await sGet(STOR+'cust-updates')||[];
            const filteredQ=curQ.filter(u=>
              !(custId&&u.custId===custId)&&
              !(matchName&&matchNo&&u.name===matchName&&String(u.no)===String(matchNo))
            );
            await sSet(STOR+'cust-updates',filteredQ);
          }catch(e2){}
          break; // и¶ЛгБ§гБЛгБ£гБЯгГХгВ°гВ§гГЂгБІзµВдЇЖ
        }
      }
    }
  }catch(e){console.error('syncCustStatus error:',e);}
};

function useShared(key, def, pollMs=6000) {
  const [val, setVal] = useState(def);
  const mounted      = useRef(true);
  const localRef     = useRef(def);
  const initialized  = useRef(false);
  const writeCount   = useRef(0);
  const writeTimer   = useRef(null);
  const pollTimer    = useRef(null);

  useEffect(() => {
    mounted.current = true;
    sGet(key).then(v => {
      if (!mounted.current) return;
      if (v !== null && writeCount.current === 0) { localRef.current = v; setVal(v); }
      initialized.current = true;
    }).catch(() => { initialized.current = true; });
    return () => {
      mounted.current = false;
      if (pollTimer.current)  clearInterval(pollTimer.current);
      if (writeTimer.current) clearTimeout(writeTimer.current);
    };
  }, [key]);

  useEffect(() => {
    if (!GAS_READY) return;
    pollTimer.current = setInterval(() => {
      if (!mounted.current || !initialized.current || writeCount.current > 0) return;
      sGet(key).then(v => {
        if (!mounted.current || v === null || writeCount.current > 0) return;
        const cur  = JSON.stringify(localRef.current);
        const next = JSON.stringify(v);
        if (cur !== next) { localRef.current = v; setVal(v); }
      }).catch(() => {});
    }, pollMs);
    return () => { if (pollTimer.current) clearInterval(pollTimer.current); };
  }, [key, pollMs]);

  const update = useCallback((fn) => {
    const next = typeof fn === 'function' ? fn(localRef.current) : fn;
    localRef.current = next;
    setVal(next);
    writeCount.current += 1;
    if (writeTimer.current) clearTimeout(writeTimer.current);
    sSet(key, next).then(() => {
      writeTimer.current = setTimeout(() => { writeCount.current = Math.max(0, writeCount.current - 1); }, 4000);
    }).catch(() => {
      setTimeout(() => sSet(key, localRef.current).catch(() => {}), 1500);
      writeTimer.current = setTimeout(() => { writeCount.current = Math.max(0, writeCount.current - 1); }, 6000);
    });
  }, [key]);

  return [val, update];
}

// жѓОжЬИзђђ2зБЂжЫЬжЧ•гВТињФгБЩпЉИ1жЬИ=0,5жЬИ=4,8жЬИ=7 гБѓйЩ§е§Ц вЖТ nullпЉЙ
const getSecondTuesdayExemptMonths = new Set([0,4,7]); // 1жЬИгГї5жЬИгГї8жЬИпЉИ0-indexedпЉЙ
const getSecondTuesday = (year, month) => {
  // month: 0-indexed
  if(getSecondTuesdayExemptMonths.has(month)) return null;
  let count=0;
  for(let d=1;d<=31;d++){
    const dt=new Date(year,month,d);
    if(dt.getMonth()!==month)break;
    if(dt.getDay()===2){count++;if(count===2)return d;}
  }
  return null;
};
const isSecondTuesdayHoliday = (year, month, day, overrideOpen) => {
  // зђђ2зБЂжЫЬжЧ•гБЛгБ§йЩ§е§ЦжЬИгБІгБ™гБПгАБгБЛгБ§еАЛеИ•гБІгАМйАЪеЄЄеЦґж•≠гАНдЄКжЫЄгБНгБХгВМгБ¶гБДгБ™гБД
  const d2 = getSecondTuesday(year, month);
  if(d2===null||d2!==day) return false;
  const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  if(overrideOpen && overrideOpen.includes(ds)) return false;
  return true;
};
const fmt = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    if(!closedDates.includes(ds)) setClosedDates(p=>[...p,ds].sort());

  const getDragDates=()=>{
    if(!dragStart||!dragEnd) return [];
    const s=new Date(dragStart);const e=new Date(dragEnd);
    const [from,to]=s<=e?[s,e]:[e,s];
    const res=[];let cur=new Date(from);
    while(cur<=to){res.push(fmt(cur.getFullYear(),cur.getMonth(),cur.getDate()));cur=new Date(cur);cur.setDate(cur.getDate()+1);}
    return res;

    dates.forEach(ds=>{

const SearchModal=memo(({isOpen,onClose,inspData,schedData,closedDays,closedDates,overrideOpenDates,onNavigate,inspLimits})=>{
  const [sType,setSType]=useState('insp');

  const DOW=['жЧ•','жЬИ','зБЂ','ж∞і','жЬ®','йЗС','еЬЯ'];

  const doSearch=()=>{
    const found=[];
    const now=new Date();
    const end=new Date(now.getFullYear(),now.getMonth()+3,now.getDate());
    for(let cur=new Date(now);cur<=end&&found.length<30;cur.setDate(cur.getDate()+1)){
      const y=cur.getFullYear(),m=cur.getMonth(),d=cur.getDate(),dow=cur.getDay();
      if(closedDays.includes(dow)) continue;
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(closedDates.includes(ds)) continue;
      if(isSecondTuesdayHoliday(y,m,d,Array.isArray(overrideOpenDates)?overrideOpenDates:[])) continue;
      if(dows.length>0&&!dows.includes(dow)) continue;
      const dk=dateKey(y,m,d);
      if(sType==='insp'){
        const _limit=(inspLimits&&inspLimits[dk]!=null)?inspLimits[dk]:6;
        const rows=Array.from({length:_limit},(_,i)=>(inspData[dk]||[])[i]||null);
        const emptyIdx=rows.findIndex(r=>!r?.name);
        const empCnt=rows.filter(r=>!r?.name).length;
        if(emptyIdx>=0) found.push({y,m,d,dk,dow,label:`${m+1}/${d}пЉИ${DOW[dow]}пЉЙ`,detail:`з©ЇгБН${empCnt}еП∞`,type:'insp',slot:null,emptyIdx});
      } else {
        for(const slot of TIME_SLOTS){
          if(found.length>=30) break;
          const [h]=slot.split(':').map(Number);
          if(h<parseInt(fh)||h>parseInt(th)) continue;
          if(!(schedData[dk]?.[slot]?.name)) found.push({y,m,d,dk,dow,label:`${m+1}/${d}пЉИ${DOW[dow]}пЉЙ`,detail:slot,type:'sched',slot});
        }
      }
    }
    setResults(found);setSearched(true);
  };

        </div>
        <div style={{display:'flex',gap:9,marginBottom:14}}>
          {[{v:'insp',l:'рЯЪЧ иїКж§Ь'},{v:'sched',l:'вП∞ гВєгВ±гВЄгГ•гГЉгГЂ'}].map(t=>(
            <button key={t.v} onClick={()=>{setSType(t.v);setSearched(false);}} style={{flex:1,padding:'9px',borderRadius:7,border:`2px solid ${sType===t.v?'#c2410c':'#e5e7eb'}`,background:sType===t.v?'#eef2ff':'white',color:sType===t.v?'#c2410c':'#374151',fontWeight:700,cursor:'pointer'}}>{t.l}</button>
          ))}
        </div>
        <p style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:7}}>еЄМжЬЫжЫЬжЧ•пЉИжЬ™йБЄжКЮ=еЕ®жЧ•пЉЙ</p>
        <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:13}}>
          {DOW.map((n,i)=><button key={i} onClick={()=>setDows(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])} style={{padding:'6px 11px',borderRadius:6,border:`2px solid ${dows.includes(i)?'#c2410c':'#e5e7eb'}`,background:dows.includes(i)?'#eef2ff':'white',color:dows.includes(i)?'#c2410c':'#374151',fontWeight:700,cursor:'pointer',fontSize:12}}>{n}</button>)}
        </div>
        {sType==='sched'&&(
          <div style={{marginBottom:13}}>
            <p style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:7}}>еЄМжЬЫжЩВйЦУеЄѓ</p>

              </select>

        <button onClick={doSearch} style={{width:'100%',padding:'11px 0',background:'linear-gradient(135deg,#c2410c,#ea580c)',color:'white',border:'none',borderRadius:9,fontWeight:700,cursor:'pointer',marginBottom:14}}>
          рЯФН ж§ЬзіҐпЉИ3гГґжЬИеЕИгГїжЬАе§І30дїґпЉЙ

        {searched&&(
          <div className="fade-in">
            {results.length===0

const InspCalendarPicker=memo(({form,setForm,bmInspData,bmClosedDays,bmClosedDates,bmOverrideOpen,bmInspLimits})=>{
  const [calMonth,setCalMonth]=useState(()=>{
    if(form._bookingDate){const p=form._bookingDate.split('-');return new Date(Number(p[0]),Number(p[1])-1,1);}
    return new Date();
  });
  const cy=calMonth.getFullYear(),cm=calMonth.getMonth();
  const daysInMonth=new Date(cy,cm+1,0).getDate();
  const first=new Date(cy,cm,1).getDay();
  const weeks=[];let wk=Array(7).fill(null);
  for(let d=1;d<=daysInMonth;d++){
    const dow=(first+d-1)%7;wk[dow]=d;
    if(dow===6){weeks.push([...wk]);wk=Array(7).fill(null);}
  }
  if(wk.some(x=>x!==null))weeks.push([...wk]);
  const getDk=d=>`${cy}-${cm+1}-${d}`;
  const getCount=d=>{
    const rows=(bmInspData&&bmInspData[getDk(d)])||[];
    return rows.filter(r=>r&&r.name&&!r.pendingApproval&&r.bookingStatus!=='cancelled').length;
  };
  const getLimit=d=>(bmInspLimits&&bmInspLimits[getDk(d)])||6;
  const isClosed=d=>{
    const date=new Date(cy,cm,d);
    const days=Array.isArray(bmClosedDays)?bmClosedDays:[];
    const dates=Array.isArray(bmClosedDates)?bmClosedDates:[];
    const ov=Array.isArray(bmOverrideOpen)?bmOverrideOpen:[];
    if(days.includes(date.getDay()))return true;
    const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(dates.includes(ds))return true;
    return false;
  };
  const DOW_CAL=['жЧ•','жЬИ','зБЂ','ж∞і','жЬ®','йЗС','еЬЯ'];
  const today=new Date();
  return(
    <div style={{border:'2px solid #e5e7eb',borderRadius:9,overflow:'hidden',fontSize:11}}>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',background:'#f8fafc',borderBottom:'1px solid #e5e7eb'}}>
        <button onClick={()=>setCalMonth(new Date(cy,cm-1,1))}
          style={{padding:'3px 10px',border:'1px solid #d1d5db',borderRadius:6,background:'white',cursor:'pointer',fontSize:13}}>вАє</button>
        <span style={{fontWeight:800,color:'white',fontSize:13}}>{cy}еєі{cm+1}жЬИ</span>
        <button onClick={()=>setCalMonth(new Date(cy,cm+1,1))}
          style={{padding:'3px 10px',border:'1px solid #d1d5db',borderRadius:6,background:'white',cursor:'pointer',fontSize:13}}>вАЇ</button>
      </div>
      {/* жЫЬжЧ•гГШгГГгГАгГЉ */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',background:'#eef2ff',borderBottom:'1px solid #e5e7eb'}}>
        {DOW_CAL.map((d,i)=>(
          <div key={d} style={{textAlign:'center',padding:'5px 0',fontWeight:700,fontSize:11,
            color:i===0?'#dc2626':i===6?'#2563eb':'#374151'}}>{d}</div>
        ))}
      </div>
      {/* йА±гВ∞гГ™гГГгГЙ */}
      {weeks.map((wk,wi)=>(
        <div key={wi} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
          {wk.map((d,di)=>{
            if(!d)return<div key={di} style={{minHeight:52,borderTop:'1px solid #f3f4f6',borderLeft:di>0?'1px solid #f3f4f6':'none',background:'#f9fafb'}}/>;
            const cnt=getCount(d);
            const lmt=getLimit(d);
            const closed=isClosed(d);
            const isToday=d===today.getDate()&&cm===today.getMonth()&&cy===today.getFullYear();
            const dateStr=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isSel=form._bookingDate===dateStr;
            const isFull=cnt>=lmt;
            const numColor=di===0?'#dc2626':di===6?'#2563eb':'#111';
            let bg='white';
            if(isSel)bg='#dbeafe';
            else if(closed)bg='repeating-linear-gradient(45deg,#f9fafb,#f9fafb 3px,#f3f4f6 3px,#f3f4f6 6px)';
            else if(isFull)bg='#fef2f2';
            return(
              <div key={di}
                onClick={()=>{if(!closed)setForm({...form,_bookingDate:dateStr});}}
                style={{minHeight:52,padding:'4px 3px',cursor:closed?'not-allowed':'pointer',
                  borderTop:'1px solid #f3f4f6',borderLeft:di>0?'1px solid #f3f4f6':'none',
                  background:bg,
                  outline:isSel?'2px solid #2563eb':isToday?'2px solid #93c5fd':'none',
                  position:'relative'}}>
                <div style={{textAlign:'center',fontWeight:isToday?900:700,fontSize:12,
                  color:isSel?'#1d4ed8':closed?'#9ca3af':numColor}}>{d}</div>
                {!closed&&(

                {isSel&&<div style={{position:'absolute',top:2,right:2,width:6,height:6,borderRadius:'50%',background:'#2563eb'}}/>}
              </div>
            );
          })}
        </div>
      ))}

      <div style={{display:'flex',gap:10,padding:'6px 10px',background:'#f8fafc',borderTop:'1px solid #e5e7eb',flexWrap:'wrap'}}>
        <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#059669'}}>вЧПз©ЇгБН</span>
        <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#d97706'}}>вЧПжЃЛе∞С</span>
        <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#dc2626'}}>вЧПжЇА</span>
        <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:'#9ca3af'}}>дЉСдЉСж•≠жЧ•</span>
      </div>
    </div>
  );
});

const BookingModal=memo(({isOpen,onClose,type,initialData,isNew,dateLabel,timeSlot,onSave,onDelete,onOpenLoanerPicker,pendingLoanerId,pendingRentalId,pendingRentalRec,rentalCarsData,loanerRes,modalDk,modalIdx:modalIdxProp,onDeleteLoaner,currentUser,setItems,onOpenSetItemEdit,allCars,fromCustList,savedModalData,inspData:bmInspData,closedDays:bmClosedDays,closedDates:bmClosedDates,overrideOpenDates:bmOverrideOpen,inspLimits:bmInspLimits})=>{

    ?{outline:`3px solid ${isInsp?'#c2410c':'#0891b2'}`,outlineOffset:'2px',boxShadow:`0 0 0 4px rgba(${isInsp?'67,56,202':'8,145,178'},0.15)`}

  // жђ°/еЙНгБЃгГХгВ£гГЉгГЂгГЙгБЄ

  const goNext=(from)=>{

      const divs=Array.from(document.querySelectorAll('.booking-modal-inner div[tabIndex="0"]'));
      const target=divs.find(d=>d.dataset.kbkey===next);

    const prev=ORDER[i-1]; setKbField(prev);
    if(prev==='name')nameRef.current?.focus();
    else if(prev==='staff')staffRef.current?.focus();
    else if(prev==='car')carRef.current?.focus();
    else if(prev==='time')timeRef.current?.focus();
    else if(prev==='note')noteRef.current?.focus();

  const onTimeKb=(e)=>{

    if(e.key==='ArrowDown'){e.preventDefault();setForm(p=>({...p,time:TIME_VALS[Math.min(cur+1,TIME_VALS.length-1)]}));}
    else if(e.key==='ArrowUp'){e.preventDefault();setForm(p=>({...p,time:TIME_VALS[Math.max(cur-1,0)]}));}
    else if(e.key==='Enter'||e.key==='Escape'){e.preventDefault();setShowTmPk(false);if(e.key==='Enter')goNext('time');}

  const WIDS=WORKS.map(w=>w.id);

      else if(e.key==='ArrowDown'){e.preventDefault();goNext('work');}

    }else{
      if(!form.work){alert('дљЬж•≠еЖЕеЃєгВТйБЄжКЮгБЧгБ¶гБПгБ†гБХгБД');workRef.current?.focus();return;}
    }
    onSave(form);
  };
  // й°ІеЃҐгГ™гВєгГИгБЛгВЙгБЃдїЃдЇИзіД/жЬђдЇИзіДгГЬгВњгГ≥зФ®
  const handleSaveAs=(status)=>{

      if(!form.carType){alert('иїКз®ЃгВТеЕ•еКЫгБЧгБ¶гБПгБ†гБХгБД');carRef.current?.focus();return;}
      if(!form.course){alert('гВ≥гГЉгВєгВТйБЄжКЮгБЧгБ¶гБПгБ†гБХгБД');return;}
    }
    // дїЃдЇИзіДгБѓгГҐгГЉгГАгГЂгВТйЦЙгБШгБ™гБДпЉИ_keepOpen гГХгГ©гВ∞гБІеИґеЊ°пЉЙ
    onSave({...form, bookingStatus:status, _keepOpen: status==='provisional'});
  };
  const handleDelete=()=>{onDelete();};
  const handleStaffBlur=()=>{const r=resolveStaff(staffInput);setStaffInput(r);setForm(p=>({...p,staff:r}));};
  const ke=(e,ref)=>{if(e.key==='Enter'){e.preventDefault();ref?.current?.focus();}};
  
  // еНБе≠ЧгВ≠гГЉгБЂгВИгВЛгВЂгГЉгВљгГЂзІїеЛХ
  const handleArrowKey=(e)=>{
    if(!isInsp)return; // иїКж§ЬгБЃгБњ
    const refs=[nameRef,staffRef,carRef,tokutenRef,timeRef,noteRef];
    const currentIndex=refs.findIndex(r=>r.current===document.activeElement);
    if(currentIndex===-1)return;

  const locked=lockInfo?.lockedBy;
  const bookingKey=`insp-${dk}-${idx}`;
  // row.storeгБЂеЯЇгБ•гБДгБ¶loanerResгВТйБЄжКЮпЉИеЇЧиИЧеИЗгВКжЫњгБИгБІдї£иїКгБМе§ЙгВПгВЙгБ™гБДгВИгБЖгБЂгБЩгВЛпЉЙ

    ?(normRowStore(row.store)==='honten'?loanerResH:loanerResS)

  // storeж≠£и¶ПеМЦ: 'honten'/'жЬђеЇЧ' вЖТ 'honten'гАБ'sanda'/'дЄЙзФ∞еЇЧ' вЖТ 'sanda'

  const rowStore=normStore(row.store);
  // дїЦеЇЧиИЧгГЗгГЉгВњ: еЇЧиИЧгБМи®≠еЃЪгБХгВМгБ¶гБДгБ¶гБЛгБ§зПЊеЬ®гБЃеЇЧиИЧгБ®зХ∞гБ™гВЛе†іеРИ
  const otherStore=row.name&&rowStore&&rowStore!==vsId;
  const pending=row.pendingApproval;
  const approved=row.approved;
  const canApprove=pending&&vsId==='honten';

  const blocked=(!isEmpty&&isOverLimit)||locked||(otherStore&&!canApprove);
  const isCancelled=row.bookingStatus==='cancelled';

  const noteQItems=setItems||[];

  // и°МиГМжЩѓпЉЪеД™еЕИеЇ¶ isOverLimit > pending > locked > bookingStatus stripe
  const rowBg = isOverLimit ? '#fef2f2'
    : isCancelled ? BOOKING_STATUS_STRIPE.cancelled
    : pending ? BOOKING_STATUS_STRIPE.provisional
    : approved ? BOOKING_STATUS_STRIPE.confirmed
    : locked ? '#fff7ed'
    : isEmpty ? (idx%2===0?'white':'#f8f7ff')
    : (row.bookingStatus&&BOOKING_STATUS_STRIPE[row.bookingStatus]) || (idx%2===0?'white':'#f8f7ff');

  return (
    <tr style={{background:rowBg,opacity:isCancelled?0.75:1}}>
      <td style={{...TD,borderLeft:`3px solid ${isOverLimit?'#fca5a5':isCancelled?'#dc2626':pending?'#f59e0b':row.store==='honten'?'#2563eb':row.store==='sanda'?'#dc2626':'#e5e7eb'}`}}><span style={{fontWeight:700,color:isOverLimit?'#dc2626':isCancelled?'#dc2626':pending?'#f59e0b':row.store==='honten'?'#2563eb':row.store==='sanda'?'#dc2626':'#6366f1',padding:'0 4px'}}>{dispNo!=null?dispNo:idx+1}</span></td>
      <td style={{...TD,cursor:blocked||isCancelled?'not-allowed':'pointer'}} onClick={()=>{if(!blocked&&!isCancelled)onOpenModal('insp',dk,idx,null,false);}}>
        {isOverLimit&&!isEmpty
         ?<div style={{padding:'3px 5px'}}>
            {row.name&&<div style={{fontWeight:600,color:'#9ca3af',opacity:0.7}}>{row.name}</div>}
            <div style={{fontSize:10,color:'#ef4444',fontWeight:700,display:'flex',alignItems:'center',gap:3}}>рЯЪЂ еП∞жХ∞еИґйЩРиґЕйБОгГїдЇИзіДдЄНеПѓ</div>
          </div>
         :isCancelled?<div style={{padding:'3px 5px'}}>
            <div style={{fontWeight:600,color:'#9ca3af',textDecoration:'line-through'}}>{row.name}</div>
            <div style={{fontSize:10,color:'#dc2626',fontWeight:700,display:'flex',alignItems:'center',gap:4}}>
              вЬЧ гВ≠гГ£гГ≥гВїгГЂжЄИ
              <button onClick={e=>{e.stopPropagation();if(confirm(`гАМ${row.name}гАНгБЃдЇИзіДгВТеЙКйЩ§гБЧгБЊгБЩгБЛпЉЯ`))onOpenModal('insp',dk,idx,null,'delete');}}
                style={{padding:'1px 6px',background:'#dc2626',color:'white',border:'none',borderRadius:4,fontSize:9,cursor:'pointer',fontWeight:700}}>
                рЯЧС
              </button>
            </div>
          </div>
         :locked?<div style={{padding:'3px 5px'}}><div style={{fontWeight:600}}>{row.name||'вАФ'}</div><LockBadge lockedBy={lockInfo.lockedBy}/></div>
         :isEmpty?<div style={{color:'#d1d5db',fontSize:11,padding:'5px 7px',fontStyle:'italic',display:'flex',alignItems:'center',gap:4}}><span style={{width:18,height:18,border:'2px dashed #d1d5db',borderRadius:3,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11}}>+</span>гВѓгГ™гГГгВѓгБЧгБ¶ињљеК†</div>
         :<div style={{padding:'3px 5px'}}>
              <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                <span style={{fontWeight:700,color:pending?'#9ca3af':'#7c2d12',whiteSpace:'nowrap'}}>{row.name}</span>
                {row.store&&<span style={{padding:'1px 6px',borderRadius:20,fontSize:10,fontWeight:800,background:row.store==='honten'?'#2563eb':'#dc2626',color:'white',flexShrink:0,whiteSpace:'nowrap'}}>

                {pending&&<span style={{padding:'1px 6px',borderRadius:20,fontSize:10,fontWeight:800,background:'#f59e0b',color:'white',flexShrink:0,whiteSpace:'nowrap'}}>жЙњи™НеЊЕгБ°</span>}
                {approved&&!pending&&<span style={{padding:'1px 6px',borderRadius:20,fontSize:10,fontWeight:800,background:'#10b981',color:'white',flexShrink:0,whiteSpace:'nowrap'}}>жЙњи™НжЄИгБњ</span>}
                {canApprove&&<button onClick={(e)=>{e.stopPropagation();onApprove(dk,idx);}} style={{padding:'2px 8px',background:'#10b981',color:'white',border:'none',borderRadius:5,fontSize:10,fontWeight:700,cursor:'pointer',flexShrink:0}}>вЬУ жЙњи™Н</button>}
              </div>
              {row.staff&&<div style={{fontSize:11,color:pending?'#9ca3af':'#6b7280'}}>{row.staff}</div>}
            </div>}
      </td>
      <td style={TD}><span style={{color:pending||isOverLimit||isCancelled?'#9ca3af':'#6b7280',fontSize:12}}>{row.carType||'вАФ'}</span></td>
      <td style={TD}>{cObj&&<span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:20,background:cObj.bg,color:cObj.color,fontWeight:700,fontSize:11,opacity:pending||isOverLimit||isCancelled?0.4:1}}><span style={{width:16,height:16,borderRadius:'50%',background:cObj.color,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:900}}>{cObj.initial}</span>{cObj.name}</span>}</td>
      <td style={TD}><span style={{fontSize:11,color:row.rentalLabel?(pending||isOverLimit||isCancelled?'#9ca3af':'#065f46'):(pending||isOverLimit||isCancelled?'#9ca3af':'#6b7280'),fontWeight:(row.rentalLabel||loanerLabel||row.loaner)&&!pending&&!isOverLimit?700:400}}>{row.rentalLabel||loanerLabel||row.loaner||'вАФ'}</span></td>
      <td style={TD}><span style={{fontSize:11,color:pending||isOverLimit||isCancelled?'#9ca3af':'#374151'}}>{row.tokuten||'вАФ'}</span></td>
      <td style={TD}><span style={{fontWeight:600,fontSize:12,color:pending||isOverLimit||isCancelled?'#9ca3af':'#374151'}}>{row.time||'вАФ'}</span></td>

        ?<div style={{display:'flex',flexWrap:'wrap',gap:3,alignItems:'center'}}>

const SchedRow=memo(({row,slot,baseSlot,isFirstSub,dk,onOpenModal,lockInfo,loanerRes,vsId,restriction,setItems})=>{
  const isEmpty=!row.name&&!row.staff&&!row.carType&&!row.work;
  const locked=lockInfo?.lockedBy;
  const isHour=(baseSlot||slot).endsWith(':00');
  const isSub=slot!==baseSlot;
  const _normStore3=s=>{if(!s)return'';if(s==='honten'||s==='жЬђеЇЧ')return'honten';if(s==='sanda'||s==='дЄЙзФ∞еЇЧ')return'sanda';return s;};
  const otherStore=row.name&&_normStore3(row.store)&&_normStore3(row.store)!==vsId;
  const bookingKey=`sched-${dk}-${slot}`;
  const loanerLabel=getLoanerLabel(loanerRes,dk,row.name,bookingKey);

  const isRestricted=!!(()=>{
    try{
      if(!restriction||!restriction.startTime||!restriction.endTime)return false;
      const toMin=(t)=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
      const slotMin=toMin(baseSlot||slot);
      return slotMin>=toMin(restriction.startTime)&&slotMin<toMin(restriction.endTime);
    }catch(e){return false;}
  })();

  const contentQItems=setItems||[];

  return (
    <tr style={{background:isRestricted?'#fee2e2':locked?'#fff7ed':row.store==='sanda'?'#fff0f0':row.store==='honten'?'#eff6ff':isHour?'white':'#f0feff',cursor:locked||otherStore?'not-allowed':'pointer'}}
      onClick={()=>{if(!locked&&!otherStore){const _e=!row.name;onOpenModal('sched',dk,null,slot,_e);}}}>
      <td style={{...TD,fontWeight:isFirstSub&&isHour?800:500,color:isFirstSub&&isHour?'#0891b2':'#7dd3fc',whiteSpace:'nowrap',paddingLeft:10,fontSize:isFirstSub&&isHour?13:11,borderLeft:isSub?'3px solid #7dd3fc':''}}>
        {isFirstSub?slot:<span style={{fontSize:9,color:'#a5f3fc'}}>вЖ≥</span>}
      </td>
      <td style={TD}>
        {locked?<div style={{padding:'3px 5px'}}><div style={{fontWeight:600}}>{row.name||'вАФ'}</div><LockBadge lockedBy={lockInfo.lockedBy}/></div>
         :isEmpty?<div style={{color:'#d1d5db',fontSize:11,padding:'5px 7px',fontStyle:'italic',display:'flex',alignItems:'center',gap:4}}><span style={{width:18,height:18,border:'2px dashed #d1d5db',borderRadius:3,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11}}>+</span>гВѓгГ™гГГгВѓгБЧгБ¶ињљеК†</div>
         :<div style={{padding:'3px 5px'}}>
              <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'nowrap'}}>
                <span style={{fontWeight:600,color:'white',whiteSpace:'nowrap'}}>{row.name}</span>
                {row.store&&<span style={{padding:'1px 6px',borderRadius:20,fontSize:10,fontWeight:800,background:row.store==='honten'?'#2563eb':'#dc2626',color:'white',flexShrink:0,whiteSpace:'nowrap'}}>
                  {row.store==='honten'?'жЬђеЇЧ':'дЄЙзФ∞еЇЧ'}
                </span>}
              </div>
              {row.staff&&<div style={{fontSize:11,color:'#6b7280'}}>{row.staff}</div>}
            </div>}
      </td>
      <td style={TD}><span style={{color:'#6b7280',fontSize:12}}>{row.carType||'вАФ'}</span></td>
      <td style={TD}><span style={{fontSize:11}}>{row.work||'вАФ'}</span></td>
      <td style={TD}><span style={{fontSize:11,color:row.rentalLabel?'#065f46':'#6b7280',fontWeight:(row.rentalLabel||loanerLabel||row.loaner)?700:400}}>{row.rentalLabel||loanerLabel||row.loaner||'вАФ'}</span></td>
      <td style={TD}><span style={{fontSize:11}}>{row.shimi||'вАФ'}</span></td>
      <td style={TD}>{row.content
        ?<div style={{display:'flex',flexWrap:'wrap',gap:3,alignItems:'center'}}>
           {row.content.split('\n').map((line,i)=>{
             const m=contentQItems.find(si=>si.text&&si.text===line);
             return m
               ?<span key={i} style={{display:'inline-flex',alignItems:'center',padding:'1px 7px',background:'#ecfdf5',border:'1.5px solid #6ee7b7',borderRadius:20,fontSize:10,fontWeight:700,color:'#065f46',whiteSpace:'nowrap'}}>{m.label}</span>
               :<span key={i} style={{fontSize:11,color:'#6b7280'}}>{line}</span>;
           })}
         </div>
        :<span style={{color:'#d1d5db'}}>вАФ</span>}</td>
    </tr>
  );
});

    if(ins.completed)return{label:'еЃМдЇЖ',color:'#9ca3af',bg:'#f3f4f6',level:0};
    if(!ins.scheduledDate)return{label:'жЧ•дїШжЬ™и®≠еЃЪ',color:'#9ca3af',bg:'#f3f4f6',level:0};
    const d=new Date(ins.scheduledDate);
    const left=Math.ceil((d-today)/(1000*60*60*24));
    if(left<0)return{label:`${Math.abs(left)}жЧ•иґЕйБО`,color:'#dc2626',bg:'#fee2e2',level:3};
    if(left===0)return{label:'дїКжЧ•пЉБ',color:'#dc2626',bg:'#fee2e2',level:3};
    if(left<=7)return{label:`гБВгБ®${left}жЧ•`,color:'#dc2626',bg:'#fee2e2',level:3};
    if(left<=30)return{label:`гБВгБ®${left}жЧ•`,color:'#d97706',bg:'#fef3c7',level:2};
    if(left<=ALERT_DAYS_VEHICLE)return{label:`гБВгБ®${left}жЧ•`,color:'#d97706',bg:'#fffbeb',level:1};
    return{label:`гБВгБ®${left}жЧ•`,color:'#059669',bg:'#f0fdf4',level:0};
  };

  const getVehicleAlert=(v)=>{
    if(!Array.isArray(v.inspections))return 0;

    if(!ds)return'вАФ';

        inspections:[],note:'',

    }

  // иїКдЄ°ињљеК†

      id:'v_'+Date.now(),
      name:addForm.name.trim(),
      num:addForm.num.trim(),
      category:addForm.category,

          return d.toISOString().slice(0,10);

    setShowAddVehicle(false);
    setSelId(newV.id);

  // зВєж§ЬињљеК†
  const addInspection=(vId)=>{
    if(!addInspForm.name.trim()||!addInspForm.days)return;

      note:addInspForm.note.trim(),

          <span style={{fontSize:11,color:'#9ca3af'}}>{list.length}еП∞зЩїйМ≤</span>

            рЯУВ иїКж§Ьи®ЉгГХгВ°гВ§гГЂи™≠иЊЉ

            пЉЛ жЙЛеЛХињљеК†

  const startEdit = i => { setEditIdx(i); setEditName(items[i].name); setEditNum(items[i].num||''); };

  const saveEdit = i => {

  // ињљеК†
  const addCar = () => {
    if (!addName.trim()) return;
    const newId = isRental
      ? 'r' + Date.now()
      : (tab==='honten'?'h':'s') + Date.now();

  // дњЭе≠ШгБЧгБ¶йЦЙгБШгВЛ
  const handleSave = () => {

    color: active?'#c2410c':'#6b7280',
    marginBottom: active?'-2px':0,
  });

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:4000,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px'}}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="modal-box"
        style={{background:'white',borderRadius:14,width:'min(520px,96vw)',maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>

        {/* гГШгГГгГАгГЉ */}
        <div style={{padding:'18px 22px 10px',borderBottom:'1px solid #e5e7eb',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <h2 style={{margin:0,fontSize:16,fontWeight:800,color:'white'}}>вЪЩпЄП дї£иїКгГїгГђгГ≥гВњгВЂгГЉи®≠еЃЪ</h2>
            <button onClick={onClose} style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#6b7280'}}>√Ч</button>
          </div>
          {/* гВњгГЦ */}
          <div style={{display:'flex',gap:4,borderBottom:'2px solid #e5e7eb'}}>
            {[{v:'honten',label:'жЬђеЇЧдї£иїК'},
              {v:'sanda', label:'дЄЙзФ∞еЇЧдї£иїК'},
              {v:'rental',label:'рЯФС гГђгГ≥гВњгВЂгГЉпЉИеЕ±йАЪпЉЙ'},
            ].map(t=>(
              <button key={t.v} onClick={()=>setTab(t.v)} style={TAB_S(tab===t.v)}>{t.label}</button>
            ))}
          </div>
        </div>

        {/* гГ™гВєгГИ */}
        <div style={{flex:1,overflowY:'auto',padding:'14px 22px'}}>
          <div style={{fontSize:11,color:'#9ca3af',marginBottom:10}}>
            {isRental?'дЄ°еЇЧиИЧеЕ±йАЪгБЃгГђгГ≥гВњгВЂгГЉгБІгБЩгАВ':''}
            еП∞жХ∞пЉЪ{items.length}еП∞
          </div>

          {items.length === 0 && (
            <div style={{textAlign:'center',padding:'28px',color:'#9ca3af',fontSize:13}}>иїКдЄ°гБМгБВгВКгБЊгБЫгВУгАВдЄЛгБЃгАМињљеК†гАНгГЬгВњгГ≥гБІзЩїйМ≤гБЧгБ¶гБПгБ†гБХгБДгАВ</div>
          )}

          {items.map((car,i) => (
            <div key={car.id||i} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 10px',marginBottom:6,background:'#f8fafc',borderRadius:9,border:'1px solid #e5e7eb'}}>
              {/* й†ЖеЇПгГЬгВњгГ≥ */}
              <div style={{display:'flex',flexDirection:'column',gap:1}}>
                <button onClick={()=>moveUp(i)} disabled={i===0}
                  style={{width:20,height:18,border:'1px solid #d1d5db',borderRadius:3,background:'white',cursor:i===0?'default':'pointer',fontSize:9,color:i===0?'#d1d5db':'#374151',padding:0}}>вЦ≤</button>
                <button onClick={()=>moveDown(i)} disabled={i===items.length-1}
                  style={{width:20,height:18,border:'1px solid #d1d5db',borderRadius:3,background:'white',cursor:i===items.length-1?'default':'pointer',fontSize:9,color:i===items.length-1?'#d1d5db':'#374151',padding:0}}>вЦЉ</button>
              </div>
              {/* зХ™еПЈ */}
              <span style={{width:20,textAlign:'center',fontSize:11,fontWeight:700,color:'#9ca3af',flexShrink:0}}>{i+1}</span>

              {editIdx === i ? (
                /* зЈ®йЫЖгГҐгГЉгГЙ */
                <>
                  <input value={editName} onChange={e=>setEditName(e.target.value)}
                    placeholder="иїКдЄ°еРН" autoFocus
                    style={{flex:2,padding:'5px 8px',border:'2px solid #6366f1',borderRadius:6,fontSize:12,outline:'none',fontFamily:'inherit'}}/>
                  <input value={editNum} onChange={e=>setEditNum(e.target.value)}
                    placeholder="гГКгГ≥гГРгГЉ"
                    style={{flex:1,padding:'5px 8px',border:'2px solid #6366f1',borderRadius:6,fontSize:12,outline:'none',fontFamily:'inherit'}}/>
                  <button onClick={()=>saveEdit(i)}
                    style={{padding:'5px 10px',background:'#c2410c',color:'white',border:'none',borderRadius:6,fontWeight:700,fontSize:11,cursor:'pointer',flexShrink:0}}>вЬУ</button>
                  <button onClick={()=>setEditIdx(null)}
                    style={{padding:'5px 8px',background:'#f3f4f6',border:'none',borderRadius:6,fontSize:11,cursor:'pointer',flexShrink:0}}>√Ч</button>

                /* и°®з§ЇгГҐгГЉгГЙ */
                <>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:'white'}}>{car.name}</div>
                    <div style={{fontSize:10,color:'#9ca3af'}}>{car.num||'вАФ'}</div>
                  </div>
                  <button onClick={()=>startEdit(i)}
                    style={{padding:'4px 10px',background:'#eef2ff',border:'1px solid #c7d2fe',borderRadius:6,fontSize:11,fontWeight:700,color:'#c2410c',cursor:'pointer',flexShrink:0}}>зЈ®йЫЖ</button>
                  <button onClick={()=>remove(i)}
                    style={{padding:'4px 9px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:6,fontSize:11,fontWeight:700,color:'#dc2626',cursor:'pointer',flexShrink:0}}>еЙКйЩ§</button>
                </>
              )}
            </div>
          ))}

          {/* ињљеК†гГХгВ©гГЉгГ† */}
          {items.length < 20 && (
            <div style={{marginTop:14,padding:'12px 14px',background:'#f0fdf4',border:'2px dashed #86efac',borderRadius:10}}>
              <div style={{fontSize:11,fontWeight:700,color:'#059669',marginBottom:8}}>пЉЛ жЦ∞гБЧгБДиїКдЄ°гВТињљеК†</div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <input value={addName} onChange={e=>setAddName(e.target.value)}
                  placeholder="иїКдЄ°еРНпЉИдЊЛпЉЪгГѓгВігГ≥RпЉЙ"
                  style={{flex:2,padding:'7px 10px',border:'1px solid #d1d5db',borderRadius:7,fontSize:12,outline:'none',fontFamily:'inherit'}}/>
                <input value={addNum} onChange={e=>setAddNum(e.target.value)}
                  placeholder="гГКгГ≥гГРгГЉ"
                  style={{flex:1,padding:'7px 10px',border:'1px solid #d1d5db',borderRadius:7,fontSize:12,outline:'none',fontFamily:'inherit'}}/>
                <button onClick={addCar} disabled={!addName.trim()}
                  style={{padding:'7px 14px',background:addName.trim()?'#059669':'#e5e7eb',color:addName.trim()?'white':'#9ca3af',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:addName.trim()?'pointer':'default',flexShrink:0}}>
                  ињљеК†
                </button>
              </div>
            </div>
          )}
        </div>

        {/* гГХгГГгВњгГЉ */}
        <div style={{padding:'14px 22px',borderTop:'1px solid #e5e7eb',display:'flex',gap:8,flexShrink:0}}>
          <div style={{fontSize:11,color:'#9ca3af',flex:1,display:'flex',alignItems:'center'}}>
            вАї дњЭе≠ШеЊМгБѓдЇИзіДгГЗгГЉгВњгБЃcarIdгБМе§ЙгВПгВЛе†іеРИгБМгБВгВКгБЊгБЩ
          </div>
          <button onClick={handleSave}
            style={{padding:'10px 24px',background:'linear-gradient(135deg,#c2410c,#ea580c)',color:'white',border:'none',borderRadius:9,fontWeight:800,fontSize:13,cursor:'pointer'}}>
            вЬУ дњЭе≠Ш
          </button>
          <button onClick={onClose}
            style={{padding:'10px 16px',background:'#f3f4f6',border:'none',borderRadius:9,fontWeight:600,fontSize:12,cursor:'pointer'}}>
            гВ≠гГ£гГ≥гВїгГЂ
          </button>
        </div>
      </div>
    </div>
  );
});

// ============================================
//  дї£иїКзЃ°зРЖгВ∞гГ™гГГгГЙпЉИйЦ≤и¶Іе∞ВзФ® + гГҐгГЉгГАгГЂзЈ®йЫЖпЉЙ
// ============================================
const LoanerGrid=memo(({loanerRes,loanerMonth,setLoanerMonth,onAddRes,onDeleteRes,onUndo,selDate,onBack,onPickLoaner,pickMode,locks,currentUser,onLockCar,onUnlockCar,savedModalData,inspData,schedData,onOpenBooking,pinnedRes,setPinnedRes,hoverRes,setHoverRes,storeLoaners,storeInfo,rentalCars,rentalRes,onAddRentalRes,onDeleteRentalRes,onReplaceRentalRes,onPickRental,onOpenSettings,tireData,locationData,onOpenTireEdit,onOpenLocationEdit})=>{
  const LOANERS_LOCAL=storeLoaners||LOANERS;
  const RENTAL_LOCAL=rentalCars||DEFAULT_RENTAL_CARS;
  const rentalResLocal=rentalRes||{};
  const [editModal,setEditModal]=useState(null);
  const [editForm,setEditForm]=useState({user:'',startDate:'',endDate:''});
  const [rentalEditModal,setRentalEditModal]=useState(null);
  const [rentalEditForm,setRentalEditForm]=useState({user:'',startDate:'',endDate:''});
  // pinnedRes/hoverResгБѓи¶™гБЛгВЙеПЧгБСеПЦгВЛпЉИгВ∞гГ™гГГгГЙгБЃеЖНгГђгГ≥гГАгГ™гГ≥гВ∞гВТйШ≤гБДгБІscrollLeftгВТдњЭжМБпЉЙ
  // pickModeзФ®гГЙгГ©гГГгВ∞зКґжЕЛ
  const [drag,setDrag]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [pickUser,setPickUser]=useState('');
  const isDragging=useRef(false);
  const gridRef=useRef(null);
  const scrollLock=useRef(false); // иЗ™еЛХгВєгВѓгГ≠гГЉгГЂжЄИгБњгГХгГ©гВ∞

  // и°®з§ЇзѓДеЫ≤пЉЪselDateгБЛгВЙ-2жЧ•гАЬ+31жЧ•пЉИжЬИгВТгБЊгБЯгБРпЉЙ
  const dateRange=useMemo(()=>{
    // loanerMonthгБЃжЬИгВТдЄ≠ењГгБЂеЙНжЬИжЬЂгАЬзњМжЬИй†≠гБЊгБІи°®з§ЇпЉИйХЈжЬЯгГђгГ≥гВњгГЂеѓЊењЬпЉЙ
    const baseMonth=loanerMonth||new Date();
    const y=baseMonth.getFullYear();
    const m=baseMonth.getMonth();
    // еЙНжЬИ15жЧ•гАЬзњМгАЕжЬИ15жЧ•гБЃзіД90жЧ•йЦУгВТи°®з§Ї
    const startDate=new Date(y,m-1,15);
    const endDate=new Date(y,m+2,15);
    const range=[];
    const current=new Date(startDate);
    while(current<=endDate){
      range.push({
        year:current.getFullYear(),
        month:current.getMonth(),
        day:current.getDate(),
        date:new Date(current)
      });
      current.setDate(current.getDate()+1);
    }
    return range;
  },[loanerMonth]);

  const DOW=['жЧ•','жЬИ','зБЂ','ж∞і','жЬ®','йЗС','еЬЯ'];
  const hi=selDate?selDate.getDate():null;

  // йБЄжКЮжЧ•гБМе§ЙгВПгБ£гБЯгВЙгВєгВѓгГ≠гГЉгГЂгГ≠гГГгВѓгВТгГ™гВїгГГгГИ
  useEffect(()=>{
    scrollLock.current=false;
  },[selDate]);

  // йБЄжКЮжЧ•еИЧгВТдЄ≠е§ЃгБЂгВєгВѓгГ≠гГЉгГЂпЉИеИЭеЫЮгБЃгБњпЉЙ
  useEffect(()=>{
    if(!gridRef.current||!selDate||scrollLock.current)return;
    const thWidth=100,cellWidth=28;
    // dateRangeеЖЕгБІгБЃselDateгБЃгВ§гГ≥гГЗгГГгВѓгВєгВТеПЦеЊЧ
    const targetIndex=dateRange.findIndex(d=>
      d.year===selDate.getFullYear()&&
      d.month===selDate.getMonth()&&
      d.day===selDate.getDate()
    );
    if(targetIndex===-1)return;
    const targetX=thWidth+targetIndex*cellWidth;
    const containerW=gridRef.current.clientWidth;
    // жЬђжЧ•гБМеЈ¶зЂѓгБЛгВЙ3еИЧзЫЃгБЂжЭ•гВЛгВИгБЖи®≠еЃЪпЉИеЈ¶гБЂ2жЧ•еИЖгБЃдљЩзЩљпЉЙ
    gridRef.current.scrollLeft=targetX-thWidth-cellWidth*2;
    scrollLock.current=true;
  },[selDate]); // dateRangeгВТеЙКйЩ§пЉИselDateгБЛгВЙи®ИзЃЧгБХгВМгВЛгБЯгВБдЄНи¶БпЉЙ

  const getRes=(cid,y,m,d)=>{const num=toNum(y,m,d);return(loanerRes[cid]||[]).find(r=>num>=toNum(r.fy,r.fm,r.fd)&&num<=toNum(r.ty,r.tm,r.td));};
  const hasConflict=(cid,sy,sm,sd,ey,em,ed)=>{
    const start=new Date(sy,sm,sd);
    const end=new Date(ey,em,ed);
    const current=new Date(start);
    while(current<=end){
      if(getRes(cid,current.getFullYear(),current.getMonth(),current.getDate()))return true;
      current.setDate(current.getDate()+1);
    }
    return false;
  };

  // -- pickModeгБЃгГЙгГ©гГГгВ∞жУНдљЬ --
  const handleMD=(cid,dateObj,e)=>{
    if(!pickMode)return;
    if(getRes(cid,dateObj.year,dateObj.month,dateObj.day))return;
    isDragging.current=true;
    setDrag({carId:cid,start:dateObj,end:dateObj});
    setConfirm(null);setPickUser('');
  };
  const handleME=(cid,dateObj)=>{
    if(!pickMode||!isDragging.current||!drag||drag.carId!==cid)return;
    if(getRes(cid,dateObj.year,dateObj.month,dateObj.day))return;
    // startгВИгВКеЊМгБЃжЧ•дїШгБЃгБњ
    if(new Date(dateObj.year,dateObj.month,dateObj.day)>=new Date(drag.start.year,drag.start.month,drag.start.day)){
      setDrag(p=>({...p,end:dateObj}));
    }
  };
  const handleMU=()=>{
    if(!pickMode||!isDragging.current||!drag)return;
    isDragging.current=false;
    const {carId,start,end}=drag;
    if(hasConflict(carId,start.year,start.month,start.day,end.year,end.month,end.day)){setDrag(null);return;}
    setConfirm({carId,start,end});
    setDrag(null);
    setPickUser(savedModalData?.name||'');
  };

  // зҐЇеЃЪ
  const handlePickConfirm=()=>{
    if(!confirm)return;
    const {carId,start,end}=confirm;
    onPickLoaner(carId,start.day,end.day,pickUser||'пЉИжЬ™еЕ•еКЫпЉЙ',start.year,start.month);
    setConfirm(null);setPickUser('');
  };

  // йЦ≤и¶ІгГҐгГЉгГЙпЉЪeditModalгБІзЈ®йЫЖ
  const openEdit=(car,res)=>{
    if(res._rental){
      // гГђгГ≥гВњгВЂгГЉзЈ®йЫЖ
      setRentalEditForm({
        user:res.user,
        startDate:`${res.fy}-${String(res.fm+1).padStart(2,'0')}-${String(res.fd).padStart(2,'0')}`,
        endDate:`${res.ty}-${String(res.tm+1).padStart(2,'0')}-${String(res.td).padStart(2,'0')}`
      });
      setRentalEditModal({carId:car.id,resId:res.id,carName:car.name,color:res.color});
      return;
    }
    setEditForm({
      user:res.user,
      startDate:`${res.fy}-${String(res.fm+1).padStart(2,'0')}-${String(res.fd).padStart(2,'0')}`,
      endDate:`${res.ty}-${String(res.tm+1).padStart(2,'0')}-${String(res.td).padStart(2,'0')}`
    });
    setEditModal({carId:car.id,resId:res.id,carName:car.name});
  };
  const getState=(cid,dateObj)=>{
    if(!dateObj)return null;
    const {year:y,month:m,day:d}=dateObj;
    if(drag&&drag.carId===cid){
      const dragStart=new Date(drag.start.year,drag.start.month,drag.start.day);
      const dragEnd=new Date(drag.end.year,drag.end.month,drag.end.day);
      const current=new Date(y,m,d);
      if(current>=dragStart&&current<=dragEnd)return'drag';
    }
    if(confirm&&confirm.carId===cid){
      const confStart=new Date(confirm.start.year,confirm.start.month,confirm.start.day);
      const confEnd=new Date(confirm.end.year,confirm.end.month,confirm.end.day);
      const current=new Date(y,m,d);
      if(current>=confStart&&current<=confEnd)return'confirm';
    }
    return getRes(cid,y,m,d)||null;
  };

  // дЇИзіДжЄИгБњгВїгГЂгВѓгГ™гГГгВѓгБІи©≤ељУдЇИзіДгВТйЦЛгБП
  const handleResClick=(res)=>{
    if(pickMode)return;
    const dk=dateKey(res.fy,res.fm,res.fd);
    const inspRows=inspData[dk]||[];
    for(let i=0;i<inspRows.length;i++){
      if(inspRows[i]&&(inspRows[i].loanerId===res.carId||inspRows[i].name===res.user)){onOpenBooking('insp',dk,i,null,inspRows[i]);return;}
    }
    const schedDay=schedData[dk]||{};
    for(const slot of TIME_SLOTS){
      if(schedDay[slot]&&(schedDay[slot].loanerId===res.carId||schedDay[slot].name===res.user)){onOpenBooking('sched',dk,null,slot,schedDay[slot]);return;}
    }
  };

  // зЈ®йЫЖдњЭе≠ШпЉЪиЗ™еИЖдї•е§ЦгБЃдЇИзіДгБ®йЗНи§ЗгГБгВІгГГгВѓ
  const saveEdit=()=>{
    if(!editForm.user.trim()||!editForm.startDate||!editForm.endDate)return;
    const [fy,fm,fd]=editForm.startDate.split('-').map(Number);
    const [ty,tm,td]=editForm.endDate.split('-').map(Number);
    if(toNum(fy,fm-1,fd)>toNum(ty,tm-1,td)){alert('ињФеНіжЧ•гБѓи≤ЄеЗЇжЧ•дї•йЩНгБЂгБЧгБ¶гБПгБ†гБХгБД');return;}
    // иЗ™еИЖдї•е§ЦгБЃдЇИзіДгБ®йЗНи§ЗгБЧгБ¶гБДгБ™гБДгБЛгГБгВІгГГгВѓ
    const others=(loanerRes[editModal.carId]||[]).filter(r=>r.id!==editModal.resId);
    const conflict=others.some(r=>{
      const rs=toNum(r.fy,r.fm,r.fd),re=toNum(r.ty,r.tm,r.td);
      const ns=toNum(fy,fm-1,fd),ne=toNum(ty,tm-1,td);
      return ns<=re&&ne>=rs;
    });
    if(conflict){alert('гБЭгБЃжЬЯйЦУгБѓдїЦгБЃдЇИзіДгБ®йЗНи§ЗгБЧгБ¶гБДгБЊгБЩ');return;}
    const prev=(loanerRes[editModal.carId]||[]).find(r=>r.id===editModal.resId);
    onDeleteRes(editModal.carId,editModal.resId);
    onAddRes(editModal.carId,{id:Date.now(),fy,fm:fm-1,fd,ty,tm:tm-1,td,user:editForm.user,color:prev?.color||RES_COLORS[0]});
    setEditModal(null);
  };

  // гГђгГ≥гВњгВЂгГЉзЈ®йЫЖдњЭе≠Ш
  const saveEditRental=()=>{
    if(!rentalEditForm.user.trim()||!rentalEditForm.startDate||!rentalEditForm.endDate)return;

      :(type==='insp'?{...((inspData[dk]||[])[idx]||blankInsp()),_idx:idx||0}:{...( schedData[dk]?.[slot]||blankSched()),_slot:slot||''});
    setModalData(data);
    // жЧҐе≠ШгГЗгГЉгВњгБЂгГђгГ≥гВњгВЂгГЉжГЕе†±гБМгБВгВМгБ∞еЊ©еЕГпЉИзЈ®йЫЖжЩВгБЃеЖНи°®з§ЇзФ®пЉЙ
    const savedRentalId=data.rentalCarId??null;
    const savedRentalRec=savedRentalId?{id:'restored',carId:savedRentalId}:null;
    setPendingLoanerId(null);
    setPendingRentalId(savedRentalId);
    setPendingRentalRec(savedRentalRec);
    setPickMode(false);setModalOpen(true);
  },[currentUser,inspData,schedData,locks,isClosed,acquireLock]);

  // дї£иїКзЃ°зРЖгБЛгВЙдЇИзіДзЈ®йЫЖгВТйЦЛгБП
  const handleOpenBooking=useCallback((type,dk,idx,slot,bookingData)=>{
    if(!currentUser)return;
    const key=lockKey(type,dk,idx,slot);
    const lk=locks[key];
    if(lk&&Date.now()-lk.lockedAt<LOCK_TTL&&lk.lockedBy!==currentUser.name){
      alert(`${lk.lockedBy}гБХгВУгБМзЈ®йЫЖдЄ≠гБІгБЩ`);
      return;
    }
    acquireLock(key,currentUser.name);setCurLockKey(key);
    setModalType(type);setModalDk(dk);setModalIdx(idx||0);setModalSlot(slot||'');
    setModalIsNew(false);
    setModalData(bookingData);
    setPendingLoanerId(null);setPendingRentalId(null);setPendingRentalRec(null);setPickMode(false);
    setView('schedule');
    setSelDate(new Date(dk.split('-').map(Number)[0],dk.split('-').map(Number)[1]-1,dk.split('-').map(Number)[2]));
    setModalOpen(true);
  },[currentUser,locks,acquireLock]);

  // й°ІеЃҐгГ™гВєгГИгБЛгВЙйЦЛгБДгБЯгГҐгГЉгГАгГЂзЃ°зРЖ
  const [fromCustList,  setFromCustList] =useState(false);
  const [custModalMeta, setCustModalMeta]=useState(null); // {bkKey, custMonth, custRowIdx, mailing2}

  // й°ІеЃҐгГ™гВєгГИгБЛгВЙжЦ∞и¶ПиїКж§ЬдЇИзіДпЉИгГУгГ•гГЉйБЈзІїгБ™гБЧгГїгГ™гВєгГИзФїйЭҐгБЃгБЊгБЊгГҐгГЉгГАгГЂпЉЙ
  const handleCustBooking=useCallback((arrivalDateStr, idx, prefilledData)=>{
    if(!currentUser||!arrivalDateStr)return;
    const parts=arrivalDateStr.split('-').map(Number);
    if(parts.length<3||isNaN(parts[0]))return;
    const [y,m,d]=parts;
    const dk=`${y}-${m}-${d}`;
    // дїЃдЇИзіДгБѓinspDataгБЂжЫЄгБЛгБ™гБДгБЃгБІlockгБѓжЬђдЇИзіДзҐЇеЃЪжЩВгБЃгБњеПЦеЊЧ
    setModalType('insp');setModalDk(dk);setModalIdx(idx||0);setModalSlot('');
    setModalIsNew(true);
    setModalData({...prefilledData,_idx:idx||0,bookingStatus:'provisional'});
    setPendingLoanerId(null);setPendingRentalId(null);setPendingRentalRec(null);setPickMode(false);
    setSelDate(new Date(y,m-1,d));
    setFromCustList(true);
    const bkKey=`${(prefilledData?.name||'').trim()}::${dk}`;
    setCustModalMeta({bkKey, custMonth:prefilledData?._custMonth, custRowIdx:prefilledData?._custRowIdx, mailing2:prefilledData?._mailing2});
    setModalOpen(true);
  },[currentUser]);

  // й°ІеЃҐгГ™гВєгГИгБЛгВЙгВєгГЖгГЉгВњгВєе§ЙжЫіпЉИзҐЇеЃЪ/гВ≠гГ£гГ≥гВїгГЂ/дїЃдЇИзіДгБЂжИїгБЩпЉЙ
  const handleUpdateCustStatus=useCallback((arrivalDateStr,rowIdx,newStatus)=>{
    const parts=arrivalDateStr.split('-').map(Number);
    if(parts.length<3||isNaN(parts[0]))return;
    const [y,m,d]=parts;
    const dk=`${y}-${m}-${d}`;
    setInspData(prev=>{
      const rows=[...(prev[dk]||[])].map(r=>r||blankInsp());
      if(rows[rowIdx]) rows[rowIdx]={...rows[rowIdx],bookingStatus:newStatus};
      return {...prev,[dk]:rows};
    });
  },[setInspData]);

  // й°ІеЃҐгГ™гВєгГИе∞ВзФ®гГҐгГЉгГАгГЂдњЭе≠ШпЉИдїЃдЇИзіД / жЬђдЇИзіД / гВ≠гГ£гГ≥гВїгГЂпЉЙ
  const handleCustListSave=useCallback((mode, formData, meta)=>{
    const today=new Date();

    // вФАвФА гВ≠гГ£гГ≥гВїгГЂеЗ¶зРЖ вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
    if(mode==='_cancel_prov'){
      if(meta&&meta.bkKey) setCustBookings(prev=>{const n={...prev};delete n[meta.bkKey];return n;});
      // custFilesгБЃarrivalDateгВВгВѓгГ™гВҐ
      if(meta&&meta.custMonth!=null&&meta.custRowIdx!=null){
        setCustFiles(prev=>{
          const rows=[...(prev[meta.custMonth]||[])];
          if(!rows[meta.custRowIdx])return prev;
          rows[meta.custRowIdx]={...rows[meta.custRowIdx],arrivalDate:'',orderDate:''};
          return{...prev,[meta.custMonth]:rows};
        });
      }
      return;
    }
    if(mode==='_cancel_conf'){
      if(meta&&meta.existingDk&&meta.existingIdx>=0){
        const dk=meta.existingDk;
        // гВ≠гГ£гГ≥гВїгГЂгБЩгВЛinspгБЃи°МгВТеПЦеЊЧ
        const cancelledRow=(inspData[dk]||[])[meta.existingIdx];
        const custId=cancelledRow?.custId;
        setInspData(prev=>{
          const rows=[...(prev[dk]||[])].map(r=>r||blankInsp());
          // гВ≠гГ£гГ≥гВїгГЂ = и°МгВТеЃМеЕ®еЙКйЩ§пЉИз©Їи°МгБЂжИїгБЩпЉЙ
          if(rows[meta.existingIdx]) rows[meta.existingIdx]=blankInsp();
          // жЬЂе∞ЊгБЃз©Їи°МгВТжХізРЖ
          while(rows.length>0&&!rows[rows.length-1]?.name) rows.pop();
          return{...prev,[dk]:rows.length>0?rows:[]};
        });
        // customers-filesгБЃгВєгГЖгГЉгВњгВєгВТcancelгБЂжЫіжЦ∞пЉИгГБгГ£гГ≥гВѓжЦєеЉПпЉЙ
        // custIdгБМгБ™гБПгБ¶гВВname+noгБІгГЮгГГгГБгГ≥гВ∞
        const matchName=cancelledRow?.name;
        const matchNo=cancelledRow?.no;
        if(custId||matchName){
          syncCustStatus(custId,'cancel',{entryDate:'',linkedInspDate:''},matchName,matchNo);
        }
      }
      // custFilesгБЃarrivalDateгВТгВѓгГ™гВҐпЉИcancelledеЊМгБЂдїЦгБЃгГ¶гГЉгВґгГЉгБМеРМгВєгГ≠гГГгГИгБЂеЕ•гБ£гБ¶гВВи°®з§ЇгБМеі©гВМгБ™гБДгВИгБЖпЉЙ
      if(meta&&meta.custMonth!=null&&meta.custRowIdx!=null){
        setCustFiles(prev=>{
          const rows=[...(prev[meta.custMonth]||[])];
          if(!rows[meta.custRowIdx])return prev;
          rows[meta.custRowIdx]={...rows[meta.custRowIdx],arrivalDate:'',orderDate:''};
          return{...prev,[meta.custMonth]:rows};
        });
      }
      return;
    }

    const arrDate=formData.arrivalDate||'';

    // custFilesгБЃи°МгВТжЫіжЦ∞пЉИи©≥зі∞гГХгВ£гГЉгГЂгГЙгВТжЫЄгБНжИїгБЧпЉЙ
    const updateFiles=()=>{
      if(!meta||meta.custMonth==null||meta.custRowIdx==null)return;
      setCustFiles(prev=>{
        const rows=[...(prev[meta.custMonth]||[])];
        if(!rows[meta.custRowIdx])return prev;
        const row={...rows[meta.custRowIdx]};
        if(formData._f_reserve1) row.reserve1=formData._f_reserve1;
        if(formData._f_reserve2) row.reserve2=formData._f_reserve2;
        if(arrDate) row.arrivalDate=arrDate;
        if(formData.orderDate) row.orderDate=formData.orderDate;
        if(formData.tokuten) row.tokuten=formData.tokuten;
        if(formData.store)   row.store=formData.store;
        if(formData.staff)   row.staff=formData.staff;
        if(formData.course)  row.course=formData.course;
        if(formData.note!=null) row.note=formData.note;
        rows[meta.custRowIdx]=row;
        return {...prev,[meta.custMonth]:rows};
      });
    };

    const clean={...formData};
    delete clean._f_reserve1; delete clean._f_reserve2;

    if(mode==='provisional'){
      const dk=arrDate
        ?(()=>{const[y,m,d]=arrDate.split('-').map(Number);return`${y}-${m}-${d}`;})()
        :`${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
      const bkKey=(meta&&meta.bkKey)||`${(clean.name||'').trim()}::${dk}`;
      if(meta&&meta.bkKey&&meta.bkKey!==bkKey)
        setCustBookings(prev=>{const n={...prev};delete n[meta.bkKey];return n;});
      setCustBookings(prev=>({...prev,[bkKey]:{
        status:'provisional', formData:{...clean},
        custMonth:meta?meta.custMonth:null, custRowIdx:meta?meta.custRowIdx:null,
        dk, idx:0, savedAt:Date.now(),
      }}));
      updateFiles();
    } else {
      if(!arrDate){alert('еЕ•еЇЂжЧ•гБМењЕи¶БгБІгБЩ');return;}
      const[iy,im,id]=arrDate.split('-').map(Number);
      const dk=`${iy}-${im}-${id}`;
      const cs={...clean};
      // гАРйЗНи¶БгАСжЧҐе≠ШгВєгГ≠гГГгГИгБЄгБЃдЄКжЫЄгБНгБѓеРМдЄАгГ¶гГЉгВґгГЉгБЃзЈ®йЫЖжЩВгБЃгБњгАВ
      // гВ≠гГ£гГ≥гВїгГЂжЄИгБњгВєгГ≠гГГгГИгБѓеЖНеИ©зФ®гБЫгБЪгАБжЬђељУгБЂз©ЇгБЃгВєгГ≠гГГгГИгВТдљњгБЖгАВ
      const existIdx=(meta&&meta.existingDk===dk&&meta.existingIdx!=null&&meta.existingIdx>=0)
        ?meta.existingIdx:-1;
      setInspData(prev=>{
        const prev_rows=(prev[dk]||[]).map(r=>r||blankInsp());
        const rows=[...prev_rows];
        const ui=existIdx>=0?existIdx:(()=>{
          // гВ≠гГ£гГ≥гВїгГЂжЄИгБњгБѓйЩ§е§ЦгБЧгАБжЬђељУгБЂеРНеЙНгБМгБ™гБДгВєгГ≠гГГгГИгБЃгБњеѓЊи±°
          const i=rows.findIndex(r=>!r||!r.name);
          return i>=0?i:rows.length;
        })();
        while(rows.length<=ui)rows.push(blankInsp());
        // жЙњи™НжЄИгБњеП∞жХ∞гГБгВІгГГгВѓпЉИгВ≠гГ£гГ≥гВїгГЂжЄИгБњгВТйЩ§е§ЦпЉЙ
        const approved=rows.filter((r,i)=>i!==ui&&r.name&&r.course&&!r.pendingApproval&&r.bookingStatus!=='cancelled').length;
        const lim=inspLimits[dk]??6;
        if(approved>=lim){cs.pendingApproval=true;alert(`вЪ†пЄП еИґйЩРеП∞жХ∞пЉИ${lim}еП∞пЉЙгВТиґЕгБИгБЊгБЧгБЯгАВжЬђеЇЧжЙњи™НгБМењЕи¶БгБІгБЩгАВ`);}
        // гГђгВЃгГ•гГ©гГЉиїКж§ЬпЉИcourse=3пЉЙгБЃ1жЧ•3еП∞дЄКйЩРгГБгВІгГГгВѓ
        if(Number(cs.course)===3){
          const regularCount=rows.filter((r,i)=>i!==ui&&r.name&&Number(r.course)===3&&!r.pendingApproval&&r.bookingStatus!=='cancelled').length;
          if(regularCount>=3){cs.pendingApproval=true;alert(`вЪ†пЄП гГђгВЃгГ•гГ©гГЉиїКж§ЬгБѓ1жЧ•жЬАе§І3еП∞гБЊгБІгБІгБЩпЉИдЄ°еЇЧеРИи®ИпЉЙгАВ\nжЬђеЇЧгБІгБЃжЙњи™НгБМењЕи¶БгБІгБЩгАВ`);}
        }
        rows[ui]={...cs,bookingStatus:'confirmed'};
        return{...prev,[dk]:rows};
      });
      if(meta&&meta.bkKey)setCustBookings(prev=>{const n={...prev};delete n[meta.bkKey];return n;});
      updateFiles();
      // customers-files гБЃйА£еЛХжЫіжЦ∞пЉИcustId гБМгБВгВМгБ∞пЉЙ
      {
        const existingRow=meta?.existingDk&&meta?.existingIdx>=0
          ?(inspData[meta.existingDk]||[])[meta.existingIdx]:null;
        const custId=existingRow?.custId||clean.custId;
        if(custId){
          const newStatus=mode==='provisional'?'temp':'confirm';
          const newEntry=arrDate||'';
          syncCustStatus(custId,newStatus,{
            entryDate:newEntry,linkedInspDate:newEntry,
            course:clean.course,store:clean.store,
            staff:clean.staff,tokuten:clean.tokuten,note:clean.note,
          });
        }
      }
    }
  },[inspLimits,setInspData,setCustBookings,setCustFiles,inspData]);

  // й°ІеЃҐгГ™гВєгГИгБЛгВЙжЧҐе≠ШдЇИзіДгВТзЈ®йЫЖпЉИгГУгГ•гГЉйБЈзІїгБ™гБЧпЉЙ
  const handleCustEditBooking=useCallback((type,dk,idx,slot,bookingData,custMeta)=>{
    if(!currentUser)return;
    if(idx>=0){
      const key=lockKey(type,dk,idx,slot);
      const lk=locks[key];
      if(lk&&Date.now()-lk.lockedAt<LOCK_TTL&&lk.lockedBy!==currentUser.name){
        alert(`${lk.lockedBy}гБХгВУгБМзЈ®йЫЖдЄ≠гБІгБЩ`);return;
      }
      acquireLock(key,currentUser.name);setCurLockKey(key);
    }
    setModalType(type);setModalDk(dk);setModalIdx(idx>=0?idx:0);setModalSlot(slot||'');
    setModalIsNew(idx<0); // custBookingsдїЃдЇИзіДгБЃеЖНзЈ®йЫЖгБѓisNewжЙ±гБД
    setModalData(bookingData);
    setPendingLoanerId(null);setPendingRentalId(null);setPendingRentalRec(null);setPickMode(false);
    const [dy,dm,dd]=dk.split('-').map(Number);
    setSelDate(new Date(dy,dm-1,dd));
    setFromCustList(true);
    setCustModalMeta(custMeta||null);
    setModalOpen(true);
  },[currentUser,locks,acquireLock]);

  const handleCloseModal=useCallback(()=>{
    releaseLock(curLockKey);setCurLockKey(null);setModalOpen(false);setPickMode(false);
    setPendingLoanerData(null);setPendingLoanerId(null);
    setPendingRentalId(null);setPendingRentalRec(null);
    setFromCustList(false);setCustModalMeta(null);
  },[curLockKey,releaseLock]);

  const handleSaveModal=useCallback((formData)=>{
    // _idx/_slot/_slotNewгБѓеЖЕйГ®зЃ°зРЖгГХгВ£гГЉгГЂгГЙгБ™гБЃгБІдњЭе≠ШгГЗгГЉгВњгБЛгВЙйЩ§еОї
    const {_idx,_slot,...cleanData}=formData;

    // вШЕдњЃж≠£1: гГҐгГЉгГАгГЂзҐЇеЃЪжЩВгБЂpendingLoanerDataгВТloanerResгБЂжЫЄгБНиЊЉгВА
    if(pendingLoanerData){
      const {carId,startDay,endDay,startYear,startMonth,user,color,bookingKey,carName,carNum}=pendingLoanerData;
      const finalUser=cleanData.name||user;
      setLoanerRes(prev=>{
        const cleaned={};
        for(const cid of Object.keys(prev)){
          cleaned[cid]=(prev[cid]||[]).filter(r=>r.bookingKey!==bookingKey);
        }
        return{...cleaned,[carId]:[...(cleaned[carId]||[]),{
          id:Date.now(),fy:startYear,fm:startMonth,fd:startDay,ty:startYear,tm:startMonth,td:endDay,
          user:finalUser,color,bookingKey,carName,carNum
        }]};
      });
      cleanData.rentalLabel='';
      cleanData.rentalCarId=null;
      setPendingLoanerData(null);
      setPendingLoanerId(null);
    }

    // гГђгГ≥гВњгВЂгГЉгБМйБЄжКЮгБХгВМгБ¶гБДгВЛе†іеРИгАБгГ©гГЩгГЂгВТгГЗгГЉгВњгБЂдїШеК†
    if(pendingRentalId!=null&&pendingRentalRec){
      const rcar=dynRentalCars.find(c=>c.id===pendingRentalId)||{name:'гГђгГ≥гВњгВЂгГЉ',num:''};
      cleanData.rentalLabel=`рЯФС ${rcar.name}${rcar.num?` (${rcar.num})`:''}`;
      cleanData.rentalCarId=pendingRentalId;
      cleanData.loaner='';cleanData.loanerId=null;
      setPendingRentalId(null);setPendingRentalRec(null);
    } else if(pendingLoanerId==null&&!pendingLoanerData){
      cleanData.rentalLabel='';
      cleanData.rentalCarId=null;
    }

    const keepOpen = !!formData._keepOpen;
    if(cleanData._keepOpen !== undefined) delete cleanData._keepOpen;

    if(!keepOpen) setModalOpen(false);
    if(modalType==='insp'){
      const cleanWithStore={...cleanData,store:vsId};

      if(fromCustList && cleanData.bookingStatus==='provisional'){
        // вФАвФА дїЃдЇИзіДпЉЪcustBookingsгБЃгБњдњЭе≠ШпЉИгВєгВ±гВЄгГ•гГЉгГЂгБЂжЫЄгБЛгБ™гБДпЉЙвФАвФА
        const bkKey=custModalMeta?.bkKey||`${cleanData.name}::${modalDk}`;
        setCustBookings(prev=>({...prev,[bkKey]:{
          status:'provisional', formData:{...cleanWithStore},
          custMonth:custModalMeta?.custMonth, custRowIdx:custModalMeta?.custRowIdx,
          dk:modalDk, idx:modalIdx, savedAt:Date.now(),
        }}));
        // keepOpenжЩВ: custModalMetaгБЃbkKeyгВТжЫіжЦ∞гБЧгАБгГҐгГЉгГАгГЂгБЂдњЭе≠ШжЄИгБњгГРгГКгГЉгВТеПНжШ†
        if(keepOpen){
          setCustModalMeta(prev=>({...prev, bkKey}));
          setModalData(prev=>({...prev, bookingStatus:'provisional', _savedAsProvisional:true}));
        }
      } else {
        // вФАвФА жЬђдЇИзіДпЉИгБЊгБЯгБѓгВєгВ±гВЄгГ•гГЉгГЂзФїйЭҐгБЛгВЙпЉЙпЉЪinspDataгБЂжЫЄгБП вФАвФА
        setInspData(prev=>{
          const prev_rows=(prev[modalDk]||[]).map(r=>r||blankInsp());
          const rows=[...prev_rows];
          while(rows.length<=modalIdx)rows.push(blankInsp());
          const approvedCount=rows.filter((r,i)=>i!==modalIdx&&r.name&&r.course&&!r.pendingApproval).length;
          const dayLimit=inspLimits[modalDk]??6;
          if(approvedCount>=dayLimit){
            cleanWithStore.pendingApproval=true;
            alert(`вЪ†пЄП 1жЧ•гБЃиїКж§ЬеП∞жХ∞гБМеИґйЩРеП∞жХ∞пЉИ${dayLimit}еП∞пЉЙгВТиґЕгБИгБЊгБЧгБЯгАВ\nжЬђеЇЧгБІгБЃжЙњи™НгБМењЕи¶БгБІгБЩгАВ`);
          }
          // гГђгВЃгГ•гГ©гГЉиїКж§ЬпЉИcourse=3пЉЙгБЃ1жЧ•3еП∞дЄКйЩРгГБгВІгГГгВѓ
          if(Number(cleanWithStore.course)===3){
            const regularCount=rows.filter((r,i)=>i!==modalIdx&&r.name&&Number(r.course)===3&&!r.pendingApproval).length;

                                </td>
                              </tr>
                            )}
                          </React.Fragment>

                      }).filter(Boolean)}

                </div>{/* /еП≥гВЂгГ©гГ† */}

      <SetItemEditModal
        isOpen={showSetItemEdit}
        onClose={()=>setShowSetItemEdit(false)}
