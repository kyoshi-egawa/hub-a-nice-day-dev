// ╔══════════════════════════════════════════════════════════════════╗
// ║  BLOCK-C: コアロジック・行表示                                  ║
// ║  【変更禁止】7台目承認・店舗判定・ロック処理が含まれる          ║
// ║  含まれる内容:                                                  ║
// ║  - InspRow（車検行コンポーネント）                              ║
// ║  - SchedRow（スケジュール行コンポーネント）                     ║
// ║  - 7台目承認待ちロジック（waitingRows / normalRows）            ║
// ║  - 店舗判定ロジック（otherStore / canApprove）                  ║
// ║  ⚠️  変更が必要な場合は必ずdev環境で十分テストすること          ║
// ╚══════════════════════════════════════════════════════════════════╝

const InspRow=memo(({row,idx,dispNo,dk,onOpenModal,lockInfo,loanerRes,loanerResH,loanerResS,vsId,onApprove,isOverLimit,setItems,onPrintJobSheet})=>{
  const cObj=row.course?COURSES.find(c=>c.id===row.course):null;
  const isEmpty=!row.name&&!row.staff&&!row.carType&&!row.course;
  const locked=lockInfo?.lockedBy;
  const bookingKey=`insp-${dk}-${idx}`;
  // row.storeに基づいてloanerResを選択（店舗切り替えで代車が変わらないようにする）
  const normRowStore=s=>{if(!s)return vsId;if(s==='honten'||s==='本店')return'honten';if(s==='sanda'||s==='三田店')return'sanda';return vsId;};
  const rowLoanerRes=(loanerResH&&loanerResS)
    ?(normRowStore(row.store)==='honten'?loanerResH:loanerResS)
    :loanerRes;
  const loanerLabel=getLoanerLabel(rowLoanerRes,dk,row.name,bookingKey);
  // store正規化: 'honten'/'本店' → 'honten'、'sanda'/'三田店' → 'sanda'
  const normStore=s=>{if(!s)return'';if(s==='honten'||s==='本店')return'honten';if(s==='sanda'||s==='三田店')return'sanda';return s;};
  const rowStore=normStore(row.store);
  // 他店舗データ: 店舗が設定されていてかつ現在の店舗と異なる場合
  const otherStore=row.name&&rowStore&&rowStore!==vsId;
  const pending=row.pendingApproval;
  const approved=row.approved;
  const canApprove=pending&&vsId==='honten';
  // 承認待ち行は本店ユーザーが承認・編集できる必要があるため otherStore でブロックしない
  const blocked=(!isEmpty&&isOverLimit)||locked||(otherStore&&!canApprove);
  const isCancelled=row.bookingStatus==='cancelled';

  const noteQItems=setItems||[];

  // 行背景：優先度 isOverLimit > pending > locked > bookingStatus stripe
  const rowBg = isOverLimit ? '#fef2f2'
    : isCancelled ? BOOKING_STATUS_STRIPE.cancelled
    : pending ? BOOKING_STATUS_STRIPE.provisional
    : approved ? BOOKING_STATUS_STRIPE.confirmed
    : locked ? '#fff7ed'
    : isEmpty ? (idx%2===0?'white':'#f8f7ff')
    : (row.bookingStatus&&BOOKING_STATUS_STRIPE[row.bookingStatus]) || (idx%2===0?'white':'#f8f7ff');

  return (
    <tr style={{background:rowBg,opacity:isCancelled?0.75:1}}>
      <td style={{...TD,borderLeft:`3px solid ${isOverLimit?'#fca5a5':isCancelled?'#dc2626':pending?'#f59e0b':row.store==='honten'?'#2563eb':row.store==='sanda'?'#dc2626':'#e5e7eb'}`}}><span style={{fontWeight:700,color:isOverLimit?'#dc2626':isCancelled?'#dc2626':pending?'#f59e0b':row.store==='honten'?'#2563eb':row.store==='sanda'?'#dc2626':'#6366f1',padding:'0 4px'}}>{dispNo!=null?dispNo:idx+1}</span></td>
      <td style={{...TD,cursor:blocked||isCancelled?'not-allowed':'pointer'}} onClick={()=>{if(!blocked&&!isCancelled)onOpenModal('insp',dk,idx,null,false);}}>
        {isOverLimit&&!isEmpty
         ?<div style={{padding:'3px 5px'}}>
            {row.name&&<div style={{fontWeight:600,color:'#9ca3af',opacity:0.7}}>{row.name}</div>}
            <div style={{fontSize:10,color:'#ef4444',fontWeight:700,display:'flex',alignItems:'center',gap:3}}>🚫 台数制限超過・予約不可</div>
          </div>
         :isCancelled?<div style={{padding:'3px 5px'}}>
            <div style={{fontWeight:600,color:'#9ca3af',textDecoration:'line-through'}}>{row.name}</div>
            <div style={{fontSize:10,color:'#dc2626',fontWeight:700,display:'flex',alignItems:'center',gap:4}}>
              ✗ キャンセル済
              <button onClick={e=>{e.stopPropagation();if(confirm(`「${row.name}」の予約を削除しますか？`))onOpenModal('insp',dk,idx,null,'delete');}}
                style={{padding:'1px 6px',background:'#dc2626',color:'white',border:'none',borderRadius:4,fontSize:9,cursor:'pointer',fontWeight:700}}>
                🗑
              </button>
            </div>
          </div>
         :locked?<div style={{padding:'3px 5px'}}><div style={{fontWeight:600}}>{row.name||'—'}</div><LockBadge lockedBy={lockInfo.lockedBy}/></div>
         :isEmpty?<div style={{color:'#d1d5db',fontSize:11,padding:'5px 7px',fontStyle:'italic',display:'flex',alignItems:'center',gap:4}}><span style={{width:18,height:18,border:'2px dashed #d1d5db',borderRadius:3,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11}}>+</span>クリックして追加</div>
         :<div style={{padding:'3px 5px'}}>
              <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                <span style={{fontWeight:700,color:pending?'#9ca3af':'#1e1b4b',whiteSpace:'nowrap'}}>{row.name}</span>
                {row.store&&<span style={{padding:'1px 6px',borderRadius:20,fontSize:10,fontWeight:800,background:row.store==='honten'?'#2563eb':'#dc2626',color:'white',flexShrink:0,whiteSpace:'nowrap'}}>
                  {row.store==='honten'?'本店':'三田店'}
                </span>}
                {pending&&<span style={{padding:'1px 6px',borderRadius:20,fontSize:10,fontWeight:800,background:'#f59e0b',color:'white',flexShrink:0,whiteSpace:'nowrap'}}>承認待ち</span>}
                {approved&&!pending&&<span style={{padding:'1px 6px',borderRadius:20,fontSize:10,fontWeight:800,background:'#10b981',color:'white',flexShrink:0,whiteSpace:'nowrap'}}>承認済み</span>}
                {canApprove&&<button onClick={(e)=>{e.stopPropagation();onApprove(dk,idx);}} style={{padding:'2px 8px',background:'#10b981',color:'white',border:'none',borderRadius:5,fontSize:10,fontWeight:700,cursor:'pointer',flexShrink:0}}>✓ 承認</button>}
              </div>
              {row.staff&&<div style={{fontSize:11,color:pending?'#9ca3af':'#6b7280'}}>{row.staff}</div>}
            </div>}
      </td>
      <td style={TD}><span style={{color:pending||isOverLimit||isCancelled?'#9ca3af':'#6b7280',fontSize:12}}>{row.carType||'—'}</span></td>
      <td style={TD}>{cObj&&<span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:20,background:cObj.bg,color:cObj.color,fontWeight:700,fontSize:11,opacity:pending||isOverLimit||isCancelled?0.4:1}}><span style={{width:16,height:16,borderRadius:'50%',background:cObj.color,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:900}}>{cObj.initial}</span>{cObj.name}</span>}</td>
      <td style={TD}><span style={{fontSize:11,color:row.rentalLabel?(pending||isOverLimit||isCancelled?'#9ca3af':'#065f46'):(pending||isOverLimit||isCancelled?'#9ca3af':'#6b7280'),fontWeight:(row.rentalLabel||loanerLabel||row.loaner)&&!pending&&!isOverLimit?700:400}}>{row.rentalLabel||loanerLabel||row.loaner||'—'}</span></td>
      <td style={TD}><span style={{fontSize:11,color:pending||isOverLimit||isCancelled?'#9ca3af':'#374151'}}>{row.tokuten||'—'}</span></td>
      <td style={TD}><span style={{fontWeight:600,fontSize:12,color:pending||isOverLimit||isCancelled?'#9ca3af':'#374151'}}>{row.time||'—'}</span></td>
      <td style={TD}>{row.note
        ?<div style={{display:'flex',flexWrap:'wrap',gap:3,alignItems:'center'}}>
           {row.note.split('\n').map((line,i)=>{
             const m=noteQItems.find(si=>si.text&&si.text===line);
             return m
               ?<span key={i} style={{display:'inline-flex',alignItems:'center',padding:'1px 7px',background:'#ecfdf5',border:'1.5px solid #6ee7b7',borderRadius:20,fontSize:10,fontWeight:700,color:'#065f46',whiteSpace:'nowrap',opacity:pending||isOverLimit?0.5:1}}>{m.label}</span>
               :<span key={i} style={{fontSize:11,color:pending||isOverLimit||isCancelled?'#9ca3af':'#6b7280'}}>{line}</span>;
           })}
         </div>
        :<span style={{color:pending||isOverLimit||isCancelled?'#9ca3af':'#d1d5db'}}>—</span>}</td>
      <td style={{...TD,padding:'2px 4px',textAlign:'center',width:28}}>
        {!isEmpty&&!isCancelled&&!isOverLimit&&onPrintJobSheet&&(
          <button
            title="作業指示書を印刷"
            onClick={e=>{e.stopPropagation();onPrintJobSheet(row,dk);}}
            style={{padding:'2px 5px',background:'#f8fafc',border:'1px solid #cbd5e1',borderRadius:4,cursor:'pointer',fontSize:13,lineHeight:1,opacity:pending?0.5:1}}
          >🖨</button>
        )}
      </td>
    </tr>
  );
});

// ============================================
//  SchedRow
// ============================================
const SchedRow=memo(({row,slot,baseSlot,isFirstSub,dk,onOpenModal,lockInfo,loanerRes,vsId,restriction,setItems})=>{
  const isEmpty=!row.name&&!row.staff&&!row.carType&&!row.work;
  const locked=lockInfo?.lockedBy;
  const isHour=(baseSlot||slot).endsWith(':00');
  const isSub=slot!==baseSlot;
  const _normStore3=s=>{if(!s)return'';if(s==='honten'||s==='本店')return'honten';if(s==='sanda'||s==='三田店')return'sanda';return s;};
  const otherStore=row.name&&_normStore3(row.store)&&_normStore3(row.store)!==vsId;
  const bookingKey=`sched-${dk}-${slot}`;
  const loanerLabel=getLoanerLabel(loanerRes,dk,row.name,bookingKey);

  const isRestricted=!!(()=>{
    try{
      if(!restriction||!restriction.startTime||!restriction.endTime)return false;
      const toMin=(t)=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
      const slotMin=toMin(baseSlot||slot);
      return slotMin>=toMin(restriction.startTime)&&slotMin<toMin(restriction.endTime);
    }catch(e){return false;}
  })();

  const contentQItems=setItems||[];

  return (
    <tr style={{background:isRestricted?'#fee2e2':locked?'#fff7ed':row.store==='sanda'?'#fff0f0':row.store==='honten'?'#eff6ff':isHour?'white':'#f0feff',cursor:locked||otherStore?'not-allowed':'pointer'}}
      onClick={()=>{if(!locked&&!otherStore)onOpenModal('sched',dk,null,slot,false);}}>
      <td style={{...TD,fontWeight:isFirstSub&&isHour?800:500,color:isFirstSub&&isHour?'#0891b2':'#7dd3fc',whiteSpace:'nowrap',paddingLeft:10,fontSize:isFirstSub&&isHour?13:11,borderLeft:isSub?'3px solid #7dd3fc':''}}>
        {isFirstSub?slot:<span style={{fontSize:9,color:'#a5f3fc'}}>↳</span>}
      </td>
      <td style={TD}>
        {locked?<div style={{padding:'3px 5px'}}><div style={{fontWeight:600}}>{row.name||'—'}</div><LockBadge lockedBy={lockInfo.lockedBy}/></div>
         :isEmpty?<div style={{color:'#d1d5db',fontSize:11,padding:'5px 7px',fontStyle:'italic',display:'flex',alignItems:'center',gap:4}}><span style={{width:18,height:18,border:'2px dashed #d1d5db',borderRadius:3,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11}}>+</span>クリックして追加</div>
         :<div style={{padding:'3px 5px'}}>
              <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'nowrap'}}>
                <span style={{fontWeight:600,color:'#1e1b4b',whiteSpace:'nowrap'}}>{row.name}</span>
                {row.store&&<span style={{padding:'1px 6px',borderRadius:20,fontSize:10,fontWeight:800,background:row.store==='honten'?'#2563eb':'#dc2626',color:'white',flexShrink:0,whiteSpace:'nowrap'}}>
                  {row.store==='honten'?'本店':'三田店'}
                </span>}
              </div>
              {row.staff&&<div style={{fontSize:11,color:'#6b7280'}}>{row.staff}</div>}
            </div>}
      </td>
      <td style={TD}><span style={{color:'#6b7280',fontSize:12}}>{row.carType||'—'}</span></td>
      <td style={TD}><span style={{fontSize:11}}>{row.work||'—'}</span></td>
      <td style={TD}><span style={{fontSize:11,color:row.rentalLabel?'#065f46':'#6b7280',fontWeight:(row.rentalLabel||loanerLabel||row.loaner)?700:400}}>{row.rentalLabel||loanerLabel||row.loaner||'—'}</span></td>
      <td style={TD}><span style={{fontSize:11}}>{row.shimi||'—'}</span></td>
      <td style={TD}>{row.content
        ?<div style={{display:'flex',flexWrap:'wrap',gap:3,alignItems:'center'}}>
           {row.content.split('\n').map((line,i)=>{
             const m=contentQItems.find(si=>si.text&&si.text===line);
             return m
               ?<span key={i} style={{display:'inline-flex',alignItems:'center',padding:'1px 7px',background:'#ecfdf5',border:'1.5px solid #6ee7b7',borderRadius:20,fontSize:10,fontWeight:700,color:'#065f46',whiteSpace:'nowrap'}}>{m.label}</span>
               :<span key={i} style={{fontSize:11,color:'#6b7280'}}>{line}</span>;
           })}
         </div>
        :<span style={{color:'#d1d5db'}}>—</span>}</td>
    </tr>
  );
});

];

          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',color:'white',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={14}/></button>

                    <div style={{display:'flex',gap:5,flexShrink:0}}>

                          style={{padding:'5px 10px',borderRadius:7,border:`2px solid ${cur===t.id?t.border:'#e5e7eb'}`,
                            background:cur===t.id?t.bg:'white',color:cur===t.id?t.color:'#9ca3af',
                            fontWeight:cur===t.id?800:500,fontSize:12,cursor:'pointer',
                            display:'flex',alignItems:'center',gap:4,transition:'all 0.1s',whiteSpace:'nowrap'}}>
                          <span style={{fontSize:14}}>{t.icon}</span>{t.label}
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
        <div style={{padding:'13px 22px',borderTop:'1px solid #e5e7eb',display:'flex',gap:8,flexShrink:0}}>
          <button onClick={handleSave} style={{flex:1,padding:'11px 0',background:'linear-gradient(135deg,#f59e0b,#d97706)',color:'white',border:'none',borderRadius:9,fontWeight:800,fontSize:13,cursor:'pointer'}}>✓ 保存</button>
          <button onClick={onClose} style={{padding:'11px 16px',background:'#f3f4f6',border:'none',borderRadius:9,fontWeight:600,fontSize:12,cursor:'pointer'}}>キャンセル</button>
        </div>
      </div>
    </div>
  );
});

// ============================================
//  車両管理画面（車検証＋点検管理）
// ============================================
const ALERT_DAYS_VEHICLE = 90; // 90日前からアラート

const VEHICLE_CATS=[
  {id:'loaner',  label:'代車',   icon:'🚗', color:'#2563eb'},
  {id:'rental',  label:'レンタカー', icon:'🔑', color:'#7c3aed'},
  {id:'company', label:'社用車', icon:'🏢', color:'#0891b2'},
  {id:'exhibit', label:'展示車', icon:'🏪', color:'#d97706'},
  {id:'trial',   label:'試乗車', icon:'🎯', color:'#059669'},
  {id:'other',   label:'その他', icon:'📋', color:'#6b7280'},
];

const VehicleView=memo(({vehicleData,setVehicleData})=>{
  const [filterCat,setFilterCat]=useState('all');
  const [filterAlert,setFilterAlert]=useState(false);
  const [selId,setSelId]=useState(null); // 選択中の車両ID
  const [showAddVehicle,setShowAddVehicle]=useState(false);
  const [addForm,setAddForm]=useState({name:'',num:'',category:'loaner',regDate:'',inspName:'',inspDays:'',note:''});
  const [showAddInsp,setShowAddInsp]=useState(false);
  const [addInspForm,setAddInspForm]=useState({name:'',days:'',note:''});
  const fileInputRef=useRef(null);
  const list=Array.isArray(vehicleData)?vehicleData:[];

  const today=new Date();today.setHours(0,0,0,0);

  const getInspStatus=(ins)=>{
    if(ins.completed)return{label:'完了',color:'#9ca3af',bg:'#f3f4f6',level:0};
    if(!ins.scheduledDate)return{label:'日付未設定',color:'#9ca3af',bg:'#f3f4f6',level:0};
    const d=new Date(ins.scheduledDate);
    const left=Math.ceil((d-today)/(1000*60*60*24));
    if(left<0)return{label:`${Math.abs(left)}日超過`,color:'#dc2626',bg:'#fee2e2',level:3};
    if(left===0)return{label:'今日！',color:'#dc2626',bg:'#fee2e2',level:3};
    if(left<=7)return{label:`あと${left}日`,color:'#dc2626',bg:'#fee2e2',level:3};
    if(left<=30)return{label:`あと${left}日`,color:'#d97706',bg:'#fef3c7',level:2};
    if(left<=ALERT_DAYS_VEHICLE)return{label:`あと${left}日`,color:'#d97706',bg:'#fffbeb',level:1};
    return{label:`あと${left}日`,color:'#059669',bg:'#f0fdf4',level:0};
  };

  const getVehicleAlert=(v)=>{
    if(!Array.isArray(v.inspections))return 0;
    return Math.max(0,...v.inspections.map(ins=>getInspStatus(ins).level),0);
  };

  const fmtDate=(ds)=>{
    if(!ds)return'—';
    const d=new Date(ds);
    return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  };

  // 車検証ファイル一括読み込み
  const handleFiles=(files)=>{
    const newVehicles=[];
    Array.from(files).forEach(f=>{
      // ファイル名から車両情報を推定（例：「ワゴンR_1234.pdf」→ 名前・ナンバー）
      const base=f.name.replace(/\.[^.]+$/,''); // 拡張子除去
      const parts=base.split(/[_\-\s・]/);
      const name=parts[0]||base;
      const num=parts[1]||'';
      // 登録日は今日
      const regDate=today.toISOString().slice(0,10);
      newVehicles.push({
        id:'v_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
        name,num,category:'other',regDate,
        fileName:f.name,fileSize:f.size,
        inspections:[],note:'',
        createdAt:new Date().toISOString(),
      });
    });
    if(newVehicles.length>0){
      setVehicleData(p=>[...(Array.isArray(p)?p:[]),...newVehicles]);
      alert(`${newVehicles.length}台の車両を登録しました。\n車両名・ナンバー・区分・点検情報を確認・編集してください。`);
    }
  };

  // 車両追加
  const addVehicle=()=>{
    if(!addForm.name.trim())return;
    const newV={
      id:'v_'+Date.now(),
      name:addForm.name.trim(),
      num:addForm.num.trim(),
      category:addForm.category,
      regDate:addForm.regDate,
      note:addForm.note.trim(),
      inspections:addForm.inspName.trim()&&addForm.inspDays?[{
        id:'ins_'+Date.now(),
        name:addForm.inspName.trim(),
        scheduledDate:(()=>{
          if(!addForm.regDate)return'';
          const d=new Date(addForm.regDate);
          d.setDate(d.getDate()+Number(addForm.inspDays));
          return d.toISOString().slice(0,10);
        })(),
        completed:false,completedAt:null,note:'',
      }]:[],
      createdAt:new Date().toISOString(),
    };
    setVehicleData(p=>[...(Array.isArray(p)?p:[]),newV]);
    setAddForm({name:'',num:'',category:'loaner',regDate:'',inspName:'',inspDays:'',note:''});
    setShowAddVehicle(false);
    setSelId(newV.id);
  };

  // 点検追加
  const addInspection=(vId)=>{
    if(!addInspForm.name.trim()||!addInspForm.days)return;
    const vehicle=list.find(v=>v.id===vId);
    if(!vehicle)return;
    const ins={
      id:'ins_'+Date.now(),
      name:addInspForm.name.trim(),
      scheduledDate:(()=>{
        if(!vehicle.regDate)return addInspForm.customDate||'';
        const d=new Date(vehicle.regDate);
        d.setDate(d.getDate()+Number(addInspForm.days));
        return d.toISOString().slice(0,10);
      })(),
      completed:false,completedAt:null,
      note:addInspForm.note.trim(),
    };
    setVehicleData(p=>p.map(v=>v.id===vId?{...v,inspections:[...(v.inspections||[]),ins]}:v));
    setAddInspForm({name:'',days:'',note:''});
    setShowAddInsp(false);
  };

  // 点検完了トグル
  const toggleInsp=(vId,insId)=>{
    setVehicleData(p=>p.map(v=>v.id!==vId?v:{
      ...v,inspections:(v.inspections||[]).map(ins=>ins.id!==insId?ins:{
        ...ins,completed:!ins.completed,completedAt:!ins.completed?new Date().toISOString():null
      })
    }));
  };

  // 点検削除
  const deleteInsp=(vId,insId)=>{
    if(!confirm('この点検記録を削除しますか？'))return;
    setVehicleData(p=>p.map(v=>v.id!==vId?v:{...v,inspections:(v.inspections||[]).filter(ins=>ins.id!==insId)}));
  };

  // 車両削除
  const deleteVehicle=(vId)=>{
    if(!confirm('この車両の全データを削除しますか？'))return;
    setVehicleData(p=>p.filter(v=>v.id!==vId));
    if(selId===vId)setSelId(null);
  };

  // 車両情報編集
  const [editVehicle,setEditVehicle]=useState(null);
  const saveVehicleEdit=(vId,updates)=>{
    setVehicleData(p=>p.map(v=>v.id===vId?{...v,...updates}:v));
    setEditVehicle(null);
  };

  const filtered=list
    .filter(v=>filterCat==='all'||v.category===filterCat)
    .filter(v=>!filterAlert||getVehicleAlert(v)>0)
    .sort((a,b)=>getVehicleAlert(b)-getVehicleAlert(a));

  const selVehicle=list.find(v=>v.id===selId);
  const alertTotal=list.filter(v=>getVehicleAlert(v)>0).length;

  const INP_S={width:'100%',padding:'7px 10px',border:'2px solid #e5e7eb',borderRadius:7,fontSize:12,outline:'none',fontFamily:'inherit',boxSizing:'border-box'};

  return(
    <div style={{background:'white',borderRadius:13,boxShadow:'0 10px 40px rgba(0,0,0,.18)',borderTop:'4px solid #4338ca',display:'flex',flexDirection:'column',height:'calc(100vh - var(--header-h,90px) - 40px)',overflow:'hidden'}}>

      {/* ヘッダー */}
      <div style={{padding:'12px 18px',borderBottom:'2px solid #e5e7eb',display:'flex',alignItems:'center',gap:10,flexShrink:0,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:20}}>🔔</span>
          <span style={{fontWeight:900,fontSize:16,color:'#1e1b4b'}}>車両管理</span>
          {alertTotal>0&&<span style={{padding:'2px 10px',borderRadius:20,background:'#fee2e2',color:'#dc2626',fontSize:11,fontWeight:700}}>⚠️ {alertTotal}台アラート</span>}
          <span style={{fontSize:11,color:'#9ca3af'}}>{list.length}台登録</span>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center',marginLeft:'auto',flexWrap:'wrap'}}>
          {/* フォルダ一括読み込み */}
          <input ref={fileInputRef} type="file" accept=".pdf,image/*" multiple style={{display:'none'}} onChange={e=>handleFiles(e.target.files)}/>
          <button onClick={()=>fileInputRef.current?.click()}
            style={{display:'flex',alignItems:'center',gap:4,padding:'6px 12px',background:'linear-gradient(135deg,#0891b2,#0e7490)',color:'white',border:'none',borderRadius:7,fontWeight:700,fontSize:11,cursor:'pointer'}}>
            📂 車検証ファイル読込
          </button>
          <button onClick={()=>{setShowAddVehicle(p=>!p);setSelId(null);}}
            style={{display:'flex',alignItems:'center',gap:4,padding:'6px 12px',background:'#f0fdf4',border:'2px solid #86efac',borderRadius:7,fontWeight:700,fontSize:11,color:'#065f46',cursor:'pointer'}}>
            ＋ 手動追加
          </button>
        </div>
      </div>

      {/* フィルター */}
      <div style={{padding:'8px 18px',borderBottom:'1px solid #f1f5f9',display:'flex',gap:5,flexWrap:'wrap',flexShrink:0,background:'#fafafa',alignItems:'center'}}>
        <button onClick={()=>setFilterCat('all')} style={{padding:'3px 10px',borderRadius:20,border:`1.5px solid ${filterCat==='all'?'#4338ca':'#e5e7eb'}`,background:filterCat==='all'?'#eef2ff':'white',color:filterCat==='all'?'#4338ca':'#6b7280',fontSize:11,fontWeight:filterCat==='all'?700:400,cursor:'pointer'}}>全て</button>
        {VEHICLE_CATS.map(cat=>{
          const cnt=list.filter(v=>v.category===cat.id).length;
          if(cnt===0)return null;
          return <button key={cat.id} onClick={()=>setFilterCat(cat.id)} style={{padding:'3px 10px',borderRadius:20,border:`1.5px solid ${filterCat===cat.id?cat.color:'#e5e7eb'}`,background:filterCat===cat.id?cat.color+'22':'white',color:filterCat===cat.id?cat.color:'#6b7280',fontSize:11,fontWeight:filterCat===cat.id?700:400,cursor:'pointer'}}>{cat.icon}{cat.label}({cnt})</button>;
        })}
        <button onClick={()=>setFilterAlert(p=>!p)} style={{marginLeft:'auto',padding:'3px 10px',borderRadius:20,border:`1.5px solid ${filterAlert?'#dc2626':'#e5e7eb'}`,background:filterAlert?'#fee2e2':'white',color:filterAlert?'#dc2626':'#6b7280',fontSize:11,fontWeight:filterAlert?700:400,cursor:'pointer'}}>⚠️ アラートのみ</button>
      </div>

      <div style={{flex:1,display:'flex',overflow:'hidden',minHeight:0}}>
        {/* 左：車両リスト */}
        <div style={{width:280,flexShrink:0,borderRight:'2px solid #e5e7eb',overflowY:'auto',display:'flex',flexDirection:'column'}}>

          {/* 手動追加フォーム */}
          {showAddVehicle&&(
            <div style={{padding:'12px 14px',background:'#f0f9ff',borderBottom:'2px solid #7dd3fc'}}>
              <div style={{fontWeight:700,fontSize:12,color:'#0369a1',marginBottom:8}}>＋ 車両を追加</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                <input value={addForm.name} onChange={e=>setAddForm(p=>({...p,name:e.target.value}))} placeholder="車両名 *" style={INP_S} onFocus={e=>e.target.style.borderColor='#0891b2'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                <input value={addForm.num} onChange={e=>setAddForm(p=>({...p,num:e.target.value}))} placeholder="ナンバー" style={INP_S} onFocus={e=>e.target.style.borderColor='#0891b2'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                <select value={addForm.category} onChange={e=>setAddForm(p=>({...p,category:e.target.value}))} style={{...INP_S,background:'white'}}>
                  {VEHICLE_CATS.map(c=><option key={c.id} value={c.id}>{c.icon}{c.label}</option>)}
                </select>
                <input type="date" value={addForm.regDate} onChange={e=>setAddForm(p=>({...p,regDate:e.target.value}))} style={INP_S} onFocus={e=>e.target.style.borderColor='#0891b2'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                <div style={{background:'#ecfdf5',border:'1px solid #a7f3d0',borderRadius:6,padding:'6px 8px'}}>
                  <div style={{fontSize:10,color:'#065f46',fontWeight:700,marginBottom:4}}>最初の点検を設定（任意）</div>
                  <input value={addForm.inspName} onChange={e=>setAddForm(p=>({...p,inspName:e.target.value}))} placeholder="点検名（例：1ヶ月点検）" style={{...INP_S,marginBottom:4}} onFocus={e=>e.target.style.borderColor='#059669'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                  <input type="number" value={addForm.inspDays} onChange={e=>setAddForm(p=>({...p,inspDays:e.target.value}))} placeholder="登録日から何日後？（例：30）" style={INP_S} onFocus={e=>e.target.style.borderColor='#059669'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                </div>
                <div style={{display:'flex',gap:5}}>
                  <button onClick={addVehicle} disabled={!addForm.name.trim()} style={{flex:1,padding:'7px 0',background:addForm.name.trim()?'#4338ca':'#e5e7eb',color:addForm.name.trim()?'white':'#9ca3af',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:addForm.name.trim()?'pointer':'default'}}>追加</button>
                  <button onClick={()=>setShowAddVehicle(false)} style={{padding:'7px 12px',background:'#f3f4f6',border:'none',borderRadius:7,fontSize:11,cursor:'pointer'}}>×</button>
                </div>
              </div>
            </div>
          )}

          {filtered.length===0&&(
            <div style={{padding:24,textAlign:'center',color:'#9ca3af',fontSize:12}}>
              <div style={{fontSize:32,marginBottom:8}}>🚗</div>
              {list.length===0?'「車検証ファイル読込」または「手動追加」で車両を登録してください':'該当する車両がありません'}
            </div>
          )}

          {filtered.map(v=>{
            const alertLv=getVehicleAlert(v);
            const cat=VEHICLE_CATS.find(c=>c.id===v.category);
            const isSelected=selId===v.id;
            const urgentInsp=(v.inspections||[]).filter(ins=>!ins.completed&&getInspStatus(ins).level>0);
            return(
              <div key={v.id} onClick={()=>setSelId(isSelected?null:v.id)}
                style={{padding:'10px 14px',borderBottom:'1px solid #f1f5f9',background:isSelected?'#eef2ff':alertLv>=3?'#fff5f5':alertLv>=1?'#fffbeb':'white',cursor:'pointer',borderLeft:`3px solid ${isSelected?'#4338ca':alertLv>=3?'#dc2626':alertLv>=1?'#f59e0b':'transparent'}`,transition:'all .1s'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:16}}>{cat?.icon||'🚗'}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:'#1e293b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v.name}</div>
                    <div style={{fontSize:10,color:'#6b7280'}}>{v.num||'—'} · {cat?.label}</div>
                  </div>
                  {alertLv>=3&&<span style={{fontSize:14}}>🔴</span>}
                  {alertLv===2&&<span style={{fontSize:14}}>🟡</span>}
                  {alertLv===1&&<span style={{fontSize:14}}>🔶</span>}
                </div>
                {urgentInsp.length>0&&(
                  <div style={{marginTop:4,fontSize:10,color:alertLv>=3?'#dc2626':'#d97706',fontWeight:600}}>
                    {urgentInsp.slice(0,2).map(ins=>`${ins.name}：${getInspStatus(ins).label}`).join(' / ')}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* 右：詳細パネル */}
        <div style={{flex:1,overflowY:'auto',padding:'16px 20px',minWidth:0}}>
          {!selVehicle?(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:'#9ca3af',gap:8}}>
              <span style={{fontSize:48}}>👈</span>
              <span style={{fontSize:13}}>左から車両を選択してください</span>
            </div>
          ):(()=>{
            const cat=VEHICLE_CATS.find(c=>c.id===selVehicle.category);
            const isEditing=editVehicle?.id===selVehicle.id;
            return(
              <div>
                {/* 車両ヘッダー */}
                <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:16,paddingBottom:14,borderBottom:'2px solid #e5e7eb'}}>
                  <div style={{width:48,height:48,borderRadius:12,background:cat?.color+'22',border:`2px solid ${cat?.color||'#e5e7eb'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>{cat?.icon||'🚗'}</div>
                  <div style={{flex:1}}>
                    {isEditing?(
                      <div style={{display:'flex',flexDirection:'column',gap:6}}>
                        <input value={editVehicle.name} onChange={e=>setEditVehicle(p=>({...p,name:e.target.value}))} style={{...INP_S,fontSize:16,fontWeight:700}} onFocus={e=>e.target.style.borderColor='#4338ca'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                        <div style={{display:'flex',gap:6}}>
                          <input value={editVehicle.num} onChange={e=>setEditVehicle(p=>({...p,num:e.target.value}))} placeholder="ナンバー" style={{...INP_S,flex:1}} onFocus={e=>e.target.style.borderColor='#4338ca'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                          <select value={editVehicle.category} onChange={e=>setEditVehicle(p=>({...p,category:e.target.value}))} style={{...INP_S,flex:1,background:'white'}}>
                            {VEHICLE_CATS.map(c=><option key={c.id} value={c.id}>{c.icon}{c.label}</option>)}
                          </select>
                        </div>
                        <div style={{display:'flex',gap:6,alignItems:'center'}}>
                          <label style={{fontSize:11,color:'#374151',fontWeight:600,whiteSpace:'nowrap'}}>登録日</label>
                          <input type="date" value={editVehicle.regDate||''} onChange={e=>setEditVehicle(p=>({...p,regDate:e.target.value}))} style={INP_S} onFocus={e=>e.target.style.borderColor='#4338ca'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                        </div>
                        <textarea value={editVehicle.note||''} onChange={e=>setEditVehicle(p=>({...p,note:e.target.value}))} placeholder="メモ" rows={2} style={{...INP_S,resize:'vertical'}} onFocus={e=>e.target.style.borderColor='#4338ca'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                        <div style={{display:'flex',gap:6}}>
                          <button onClick={()=>saveVehicleEdit(selVehicle.id,{name:editVehicle.name,num:editVehicle.num,category:editVehicle.category,regDate:editVehicle.regDate,note:editVehicle.note})} style={{flex:1,padding:'7px',background:'#4338ca',color:'white',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:'pointer'}}>✓ 保存</button>
                          <button onClick={()=>setEditVehicle(null)} style={{padding:'7px 12px',background:'#f3f4f6',border:'none',borderRadius:7,fontSize:11,cursor:'pointer'}}>キャンセル</button>
                        </div>
                      </div>
                    ):(
                      <>
                        <div style={{fontWeight:900,fontSize:18,color:'#1e293b'}}>{selVehicle.name}</div>
                        <div style={{display:'flex',gap:8,marginTop:3,flexWrap:'wrap',alignItems:'center'}}>
                          {selVehicle.num&&<span style={{fontSize:11,background:'#f1f5f9',padding:'1px 7px',borderRadius:5,color:'#374151'}}>{selVehicle.num}</span>}
                          <span style={{fontSize:11,background:cat?.color+'22',color:cat?.color,padding:'1px 7px',borderRadius:5,fontWeight:700}}>{cat?.icon}{cat?.label}</span>
                          {selVehicle.regDate&&<span style={{fontSize:11,color:'#6b7280'}}>登録日：{fmtDate(selVehicle.regDate)}</span>}
                          {selVehicle.fileName&&<span style={{fontSize:10,color:'#0891b2',background:'#e0f2fe',padding:'1px 6px',borderRadius:4}}>📄 {selVehicle.fileName}</span>}
                        </div>
                        {selVehicle.note&&<div style={{marginTop:5,fontSize:12,color:'#6b7280'}}>📝 {selVehicle.note}</div>}
                      </>
                    )}
                  </div>
                  {!isEditing&&(
                    <div style={{display:'flex',gap:4,flexShrink:0}}>
                      <button onClick={()=>setEditVehicle({...selVehicle})} style={{padding:'5px 10px',background:'#eef2ff',border:'1px solid #c7d2fe',borderRadius:6,fontSize:11,color:'#4338ca',fontWeight:700,cursor:'pointer'}}>編集</button>
                      <button onClick={()=>deleteVehicle(selVehicle.id)} style={{padding:'5px 8px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:6,fontSize:11,color:'#dc2626',cursor:'pointer'}}>削除</button>
                    </div>
                  )}
                </div>

                {/* 点検リスト */}
                <div style={{marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontWeight:800,fontSize:13,color:'#1e1b4b'}}>🔧 点検スケジュール</span>
                  <button onClick={()=>setShowAddInsp(p=>!p)} style={{padding:'3px 10px',background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:6,fontSize:11,color:'#065f46',fontWeight:700,cursor:'pointer'}}>＋ 追加</button>
                </div>

                {/* 点検追加フォーム */}
                {showAddInsp&&(
                  <div style={{padding:'10px 12px',background:'#f0fdf4',border:'2px solid #86efac',borderRadius:9,marginBottom:10}}>
                    <div style={{display:'flex',flexDirection:'column',gap:6}}>
                      <input value={addInspForm.name} onChange={e=>setAddInspForm(p=>({...p,name:e.target.value}))} placeholder="点検名（例：6ヶ月点検、車検、保険更新 など）" style={INP_S} onFocus={e=>e.target.style.borderColor='#059669'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                      <div style={{display:'flex',gap:6,alignItems:'center'}}>
                        <input type="number" value={addInspForm.days} onChange={e=>setAddInspForm(p=>({...p,days:e.target.value}))} placeholder={selVehicle.regDate?`登録日から何日後？（登録日：${fmtDate(selVehicle.regDate)}）`:'登録日から何日後？'} style={{...INP_S,flex:1}} onFocus={e=>e.target.style.borderColor='#059669'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                      </div>
                      {selVehicle.regDate&&addInspForm.days&&(
                        <div style={{fontSize:11,color:'#065f46',background:'white',padding:'4px 8px',borderRadius:5,border:'1px solid #a7f3d0'}}>
                          📅 点検予定日：{fmtDate((()=>{const d=new Date(selVehicle.regDate);d.setDate(d.getDate()+Number(addInspForm.days));return d.toISOString();})())}
                        </div>
                      )}
                      <input value={addInspForm.note} onChange={e=>setAddInspForm(p=>({...p,note:e.target.value}))} placeholder="メモ（任意）" style={INP_S} onFocus={e=>e.target.style.borderColor='#059669'} onBlur={e=>e.target.style.borderColor='#e5e7eb'}/>
                      <div style={{display:'flex',gap:5}}>
                        <button onClick={()=>addInspection(selVehicle.id)} disabled={!addInspForm.name.trim()||!addInspForm.days} style={{flex:1,padding:'7px',background:addInspForm.name.trim()&&addInspForm.days?'#059669':'#e5e7eb',color:addInspForm.name.trim()&&addInspForm.days?'white':'#9ca3af',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:addInspForm.name.trim()&&addInspForm.days?'pointer':'default'}}>追加</button>
                        <button onClick={()=>setShowAddInsp(false)} style={{padding:'7px 12px',background:'#f3f4f6',border:'none',borderRadius:7,fontSize:11,cursor:'pointer'}}>×</button>
                      </div>
                    </div>
                  </div>
                )}

                {(!selVehicle.inspections||selVehicle.inspections.length===0)&&(
                  <div style={{padding:'16px',textAlign:'center',color:'#9ca3af',fontSize:12,background:'#f9fafb',borderRadius:8,border:'2px dashed #e5e7eb'}}>
                    「＋ 追加」で点検スケジュールを登録してください<br/>
                    <span style={{fontSize:10}}>（例：1ヶ月点検・6ヶ月点検・車検・保険更新 など）</span>
                  </div>
                )}

                {(selVehicle.inspections||[]).map(ins=>{
                  const st=getInspStatus(ins);
                  return(
                    <div key={ins.id} style={{padding:'10px 12px',marginBottom:8,background:ins.completed?'#f8fafc':st.bg,border:`2px solid ${ins.completed?'#e5e7eb':st.level>=3?'#fca5a5':st.level>=1?'#fde68a':'#e5e7eb'}`,borderRadius:9,display:'flex',alignItems:'center',gap:10}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:13,color:ins.completed?'#9ca3af':'#1e293b',textDecoration:ins.completed?'line-through':''}}>{ins.name}</div>
                        <div style={{fontSize:11,color:'#6b7280',marginTop:2,display:'flex',gap:8,flexWrap:'wrap'}}>
                          {ins.scheduledDate&&<span>予定日：{fmtDate(ins.scheduledDate)}</span>}
                          {ins.completed&&ins.completedAt&&<span style={{color:'#059669'}}>✓ {fmtDate(ins.completedAt)}完了</span>}
                          {ins.note&&<span style={{color:'#4338ca'}}>📝 {ins.note}</span>}
                        </div>
                      </div>
                      <span style={{padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:st.bg,color:st.color,whiteSpace:'nowrap',border:`1px solid ${st.color}44`}}>{st.label}</span>
                      <button onClick={()=>toggleInsp(selVehicle.id,ins.id)}
                        style={{padding:'4px 10px',borderRadius:7,border:`1.5px solid ${ins.completed?'#6b7280':'#10b981'}`,background:ins.completed?'#f3f4f6':'#f0fdf4',color:ins.completed?'#6b7280':'#065f46',fontSize:11,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
                        {ins.completed?'戻す':'✓ 完了'}
                      </button>
                      <button onClick={()=>deleteInsp(selVehicle.id,ins.id)} style={{width:26,height:26,borderRadius:5,border:'1px solid #fecaca',background:'#fef2f2',color:'#dc2626',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>×</button>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      </div>

      {/* アラートバナー（90日以内の点検一覧） */}
      {(()=>{
        const alerts=list.flatMap(v=>(v.inspections||[])
          .filter(ins=>!ins.completed&&getInspStatus(ins).level>0)
          .map(ins=>({...ins,vehicleName:v.name,vehicleNum:v.num,vehicleId:v.id,st:getInspStatus(ins)}))
        ).sort((a,b)=>new Date(a.scheduledDate)-new Date(b.scheduledDate));
        if(alerts.length===0)return null;
        return(
          <div style={{flexShrink:0,padding:'8px 16px',borderTop:'2px solid #fecaca',background:'#fff5f5',display:'flex',gap:8,overflowX:'auto',alignItems:'center'}}>
            <span style={{fontSize:11,fontWeight:800,color:'#dc2626',flexShrink:0}}>⚠️ アラート</span>
            {alerts.map((a,i)=>(
              <div key={i} onClick={()=>setSelId(a.vehicleId)}
                style={{display:'flex',gap:4,alignItems:'center',padding:'3px 10px',background:a.st.bg,border:`1.5px solid ${a.st.color}`,borderRadius:20,cursor:'pointer',flexShrink:0,transition:'opacity .15s'}}
                onMouseEnter={e=>e.currentTarget.style.opacity='.75'}
                onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                <span style={{fontSize:11,fontWeight:700,color:a.st.color}}>{a.vehicleName}</span>
                <span style={{fontSize:10,color:'#6b7280'}}>{a.name}</span>
                <span style={{fontSize:10,fontWeight:700,color:a.st.color}}>{a.st.label}</span>
              </div>
            ))}
          </div>
        );
      })()}
    </div>
  );
});

// ============================================
//  代車設定モーダル
// ============================================
const LoanerSettingsModal = memo(({isOpen, onClose, listH, listS, onSaveH, onSaveS, rentalList, onSaveRental}) => {
  const [tab, setTab] = useState('honten'); // 'honten' | 'sanda' | 'rental'
  const [items, setItems] = useState([]);
  const [editIdx, setEditIdx] = useState(null);
  const [editName, setEditName] = useState('');
  const [editNum,  setEditNum]  = useState('');
  const [addName,  setAddName]  = useState('');
  const [addNum,   setAddNum]   = useState('');

  // タブ変更時にリストを同期
  useEffect(() => {
    if (!isOpen) return;
    if (tab === 'honten')  setItems(listH.map((c,i)=>({...c,_key:i})));
    else if (tab === 'sanda')   setItems(listS.map((c,i)=>({...c,_key:i})));
    else                        setItems(rentalList.map((c,i)=>({...c,_key:i})));
    setEditIdx(null); setAddName(''); setAddNum('');
  }, [tab, isOpen, listH, listS, rentalList]);

  useEffect(() => { if (isOpen) setTab('honten'); }, [isOpen]);

  if (!isOpen) return null;

  const storeLabel = tab==='honten'?'本店':tab==='sanda'?'三田店':'共通';
  const isRental   = tab === 'rental';

  // 並び替え
  const moveUp   = i => { if(i===0) return; const a=[...items]; [a[i-1],a[i]]=[a[i],a[i-1]]; setItems(a); };
  const moveDown = i => { if(i===items.length-1) return; const a=[...items]; [a[i],a[i+1]]=[a[i+1],a[i]]; setItems(a); };

  // 削除
  const remove = i => {
    if (!window.confirm(`「${items[i].name}」を削除しますか？
※ 削除すると予約データのリンクが切れます`)) return;
    setItems(p => p.filter((_,idx)=>idx!==i));
    if (editIdx===i) setEditIdx(null);
  };

  // 編集開始
  const startEdit = i => { setEditIdx(i); setEditName(items[i].name); setEditNum(items[i].num||''); };
  // 編集保存
  const saveEdit = i => {
    if (!editName.trim()) return;
    setItems(p => p.map((c,idx)=>idx===i?{...c,name:editName.trim(),num:editNum.trim()}:c));
    setEditIdx(null);
  };

  // 追加
  const addCar = () => {
    if (!addName.trim()) return;
    const newId = isRental
      ? 'r' + Date.now()
      : (tab==='honten'?'h':'s') + Date.now();
    const newCar = isRental
      ? {id:newId, name:addName.trim(), num:addNum.trim()}
      : {id:newId, name:addName.trim(), num:addNum.trim(), store:tab};
    setItems(p => [...p, newCar]);
    setAddName(''); setAddNum('');
  };

  // 保存して閉じる
  const handleSave = () => {
    const clean = items.map(({_key,...c})=>c);
    if (tab==='honten')  onSaveH(clean);
    else if (tab==='sanda')   onSaveS(clean);
    else                      onSaveRental(clean);
    onClose();
  };

  const TAB_S = (active) => ({
    padding:'7px 16px', borderRadius:'7px 7px 0 0', fontWeight:700, fontSize:12, cursor:'pointer',
    border:`2px solid ${active?'#4338ca':'#e5e7eb'}`,
    borderBottom: active?'2px solid white':'2px solid #e5e7eb',
    background: active?'white':'#f8fafc',
    color: active?'#4338ca':'#6b7280',
    marginBottom: active?'-2px':0,
  });

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:4000,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px'}}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="modal-box"
        style={{background:'white',borderRadius:14,width:'min(520px,96vw)',maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>

        {/* ヘッダー */}
        <div style={{padding:'18px 22px 10px',borderBottom:'1px solid #e5e7eb',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <h2 style={{margin:0,fontSize:16,fontWeight:800,color:'#1e1b4b'}}>⚙️ 代車・レンタカー設定</h2>
            <button onClick={onClose} style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'#6b7280'}}>×</button>
          </div>
          {/* タブ */}
          <div style={{display:'flex',gap:4,borderBottom:'2px solid #e5e7eb'}}>
            {[{v:'honten',label:'本店代車'},
              {v:'sanda', label:'三田店代車'},
              {v:'rental',label:'🔑 レンタカー（共通）'},
            ].map(t=>(
              <button key={t.v} onClick={()=>setTab(t.v)} style={TAB_S(tab===t.v)}>{t.label}</button>
            ))}
          </div>
        </div>

        {/* リスト */}
        <div style={{flex:1,overflowY:'auto',padding:'14px 22px'}}>
          <div style={{fontSize:11,color:'#9ca3af',marginBottom:10}}>
            {isRental?'両店舗共通のレンタカーです。':''}
            台数：{items.length}台
          </div>

          {items.length === 0 && (
            <div style={{textAlign:'center',padding:'28px',color:'#9ca3af',fontSize:13}}>車両がありません。下の「追加」ボタンで登録してください。</div>
          )}

          {items.map((car,i) => (
            <div key={car.id||i} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 10px',marginBottom:6,background:'#f8fafc',borderRadius:9,border:'1px solid #e5e7eb'}}>
              {/* 順序ボタン */}
              <div style={{display:'flex',flexDirection:'column',gap:1}}>
                <button onClick={()=>moveUp(i)} disabled={i===0}
                  style={{width:20,height:18,border:'1px solid #d1d5db',borderRadius:3,background:'white',cursor:i===0?'default':'pointer',fontSize:9,color:i===0?'#d1d5db':'#374151',padding:0}}>▲</button>
                <button onClick={()=>moveDown(i)} disabled={i===items.length-1}
                  style={{width:20,height:18,border:'1px solid #d1d5db',borderRadius:3,background:'white',cursor:i===items.length-1?'default':'pointer',fontSize:9,color:i===items.length-1?'#d1d5db':'#374151',padding:0}}>▼</button>
              </div>
              {/* 番号 */}
              <span style={{width:20,textAlign:'center',fontSize:11,fontWeight:700,color:'#9ca3af',flexShrink:0}}>{i+1}</span>

              {editIdx === i ? (
                /* 編集モード */
                <>
                  <input value={editName} onChange={e=>setEditName(e.target.value)}
                    placeholder="車両名" autoFocus
                    style={{flex:2,padding:'5px 8px',border:'2px solid #6366f1',borderRadius:6,fontSize:12,outline:'none',fontFamily:'inherit'}}/>
                  <input value={editNum} onChange={e=>setEditNum(e.target.value)}
                    placeholder="ナンバー"
                    style={{flex:1,padding:'5px 8px',border:'2px solid #6366f1',borderRadius:6,fontSize:12,outline:'none',fontFamily:'inherit'}}/>
                  <button onClick={()=>saveEdit(i)}
                    style={{padding:'5px 10px',background:'#4338ca',color:'white',border:'none',borderRadius:6,fontWeight:700,fontSize:11,cursor:'pointer',flexShrink:0}}>✓</button>
                  <button onClick={()=>setEditIdx(null)}
                    style={{padding:'5px 8px',background:'#f3f4f6',border:'none',borderRadius:6,fontSize:11,cursor:'pointer',flexShrink:0}}>×</button>
                </>
              ) : (
                /* 表示モード */
                <>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:'#1e1b4b'}}>{car.name}</div>
                    <div style={{fontSize:10,color:'#9ca3af'}}>{car.num||'—'}</div>
                  </div>
                  <button onClick={()=>startEdit(i)}
                    style={{padding:'4px 10px',background:'#eef2ff',border:'1px solid #c7d2fe',borderRadius:6,fontSize:11,fontWeight:700,color:'#4338ca',cursor:'pointer',flexShrink:0}}>編集</button>
                  <button onClick={()=>remove(i)}
                    style={{padding:'4px 9px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:6,fontSize:11,fontWeight:700,color:'#dc2626',cursor:'pointer',flexShrink:0}}>削除</button>
                </>
              )}
            </div>
          ))}

          {/* 追加フォーム */}
          {items.length < 20 && (
            <div style={{marginTop:14,padding:'12px 14px',background:'#f0fdf4',border:'2px dashed #86efac',borderRadius:10}}>
              <div style={{fontSize:11,fontWeight:700,color:'#059669',marginBottom:8}}>＋ 新しい車両を追加</div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <input value={addName} onChange={e=>setAddName(e.target.value)}
                  placeholder="車両名（例：ワゴンR）"
                  style={{flex:2,padding:'7px 10px',border:'1px solid #d1d5db',borderRadius:7,fontSize:12,outline:'none',fontFamily:'inherit'}}/>
                <input value={addNum} onChange={e=>setAddNum(e.target.value)}
                  placeholder="ナンバー"
                  style={{flex:1,padding:'7px 10px',border:'1px solid #d1d5db',borderRadius:7,fontSize:12,outline:'none',fontFamily:'inherit'}}/>
                <button onClick={addCar} disabled={!addName.trim()}
                  style={{padding:'7px 14px',background:addName.trim()?'#059669':'#e5e7eb',color:addName.trim()?'white':'#9ca3af',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:addName.trim()?'pointer':'default',flexShrink:0}}>
                  追加
                </button>
              </div>
            </div>
          )}
        </div>

        {/* フッター */}
        <div style={{padding:'14px 22px',borderTop:'1px solid #e5e7eb',display:'flex',gap:8,flexShrink:0}}>
          <div style={{fontSize:11,color:'#9ca3af',flex:1,display:'flex',alignItems:'center'}}>
            ※ 保存後は予約データのcarIdが変わる場合があります
          </div>
          <button onClick={handleSave}
            style={{padding:'10px 24px',background:'linear-gradient(135deg,#4338ca,#6d28d9)',color:'white',border:'none',borderRadius:9,fontWeight:800,fontSize:13,cursor:'pointer'}}>
            ✓ 保存
          </button>
          <button onClick={onClose}
            style={{padding:'10px 16px',background:'#f3f4f6',border:'none',borderRadius:9,fontWeight:600,fontSize:12,cursor:'pointer'}}>
            キャンセル
          </button>
        </div>
      </div>
    </div>
  );
});

// ============================================
//  代車管理グリッド（閲覧専用 + モーダル編集）
// ============================================
const LoanerGrid=memo(({loanerRes,loanerMonth,setLoanerMonth,onAddRes,onDeleteRes,onUndo,selDate,onBack,onPickLoaner,pickMode,locks,currentUser,onLockCar,onUnlockCar,savedModalData,inspData,schedData,onOpenBooking,pinnedRes,setPinnedRes,hoverRes,setHoverRes,storeLoaners,storeInfo,rentalCars,rentalRes,onAddRentalRes,onDeleteRentalRes,onReplaceRentalRes,onPickRental,onOpenSettings,tireData,locationData,onOpenTireEdit,onOpenLocationEdit})=>{
  const LOANERS_LOCAL=storeLoaners||LOANERS;
  const RENTAL_LOCAL=rentalCars||DEFAULT_RENTAL_CARS;
  const rentalResLocal=rentalRes||{};
  const [editModal,setEditModal]=useState(null);
  const [editForm,setEditForm]=useState({user:'',startDate:'',endDate:''});
  const [rentalEditModal,setRentalEditModal]=useState(null);
  const [rentalEditForm,setRentalEditForm]=useState({user:'',startDate:'',endDate:''});
  // pinnedRes/hoverResは親から受け取る（グリッドの再レンダリングを防いでscrollLeftを保持）
  // pickMode用ドラッグ状態
  const [drag,setDrag]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [pickUser,setPickUser]=useState('');
  const isDragging=useRef(false);
  const gridRef=useRef(null);
  const scrollLock=useRef(false); // 自動スクロール済みフラグ

  // 表示範囲：selDateから-2日〜+31日（月をまたぐ）
  const dateRange=useMemo(()=>{
    // loanerMonthの月を中心に前月末〜翌月頭まで表示（長期レンタル対応）
    const baseMonth=loanerMonth||new Date();
    const y=baseMonth.getFullYear();
    const m=baseMonth.getMonth();
    // 前月15日〜翌々月15日の約90日間を表示
    const startDate=new Date(y,m-1,15);
    const endDate=new Date(y,m+2,15);
    const range=[];
    const current=new Date(startDate);
    while(current<=endDate){
      range.push({
        year:current.getFullYear(),
        month:current.getMonth(),
        day:current.getDate(),
        date:new Date(current)
      });
      current.setDate(current.getDate()+1);
    }
    return range;
  },[loanerMonth]);

  const DOW=['日','月','火','水','木','金','土'];
  const hi=selDate?selDate.getDate():null;

  // 選択日が変わったらスクロールロックをリセット
  useEffect(()=>{
    scrollLock.current=false;
  },[selDate]);

  // 選択日列を中央にスクロール（初回のみ）
  useEffect(()=>{
    if(!gridRef.current||!selDate||scrollLock.current)return;
    const thWidth=100,cellWidth=28;
    // dateRange内でのselDateのインデックスを取得
    const targetIndex=dateRange.findIndex(d=>
      d.year===selDate.getFullYear()&&
      d.month===selDate.getMonth()&&
      d.day===selDate.getDate()
    );
    if(targetIndex===-1)return;
    const targetX=thWidth+targetIndex*cellWidth;
    const containerW=gridRef.current.clientWidth;
    gridRef.current.scrollLeft=targetX-containerW/2+cellWidth/2;
    scrollLock.current=true;
  },[selDate]); // dateRangeを削除（selDateから計算されるため不要）

  const getRes=(cid,y,m,d)=>{const num=toNum(y,m,d);return(loanerRes[cid]||[]).find(r=>num>=toNum(r.fy,r.fm,r.fd)&&num<=toNum(r.ty,r.tm,r.td));};
  const hasConflict=(cid,sy,sm,sd,ey,em,ed)=>{
    const start=new Date(sy,sm,sd);
    const end=new Date(ey,em,ed);
    const current=new Date(start);
    while(current<=end){
      if(getRes(cid,current.getFullYear(),current.getMonth(),current.getDate()))return true;
      current.setDate(current.getDate()+1);
    }
    return false;
  };

  // -- pickModeのドラッグ操作 --
  const handleMD=(cid,dateObj,e)=>{
    if(!pickMode)return;
    if(getRes(cid,dateObj.year,dateObj.month,dateObj.day))return;
    isDragging.current=true;
    setDrag({carId:cid,start:dateObj,end:dateObj});
    setConfirm(null);setPickUser('');
  };
  const handleME=(cid,dateObj)=>{
    if(!pickMode||!isDragging.current||!drag||drag.carId!==cid)return;
    if(getRes(cid,dateObj.year,dateObj.month,dateObj.day))return;
    // startより後の日付のみ
    if(new Date(dateObj.year,dateObj.month,dateObj.day)>=new Date(drag.start.year,drag.start.month,drag.start.day)){
      setDrag(p=>({...p,end:dateObj}));
    }
  };
  const handleMU=()=>{
    if(!pickMode||!isDragging.current||!drag)return;
    isDragging.current=false;
    const {carId,start,end}=drag;
    if(hasConflict(carId,start.year,start.month,start.day,end.year,end.month,end.day)){setDrag(null);return;}
    setConfirm({carId,start,end});
    setDrag(null);
    setPickUser(savedModalData?.name||'');
  };

  // 確定
  const handlePickConfirm=()=>{
    if(!confirm)return;
    const {carId,start,end}=confirm;
    onPickLoaner(carId,start.day,end.day,pickUser||'（未入力）',start.year,start.month);
    setConfirm(null);setPickUser('');
  };

  // 閲覧モード：editModalで編集
  const openEdit=(car,res)=>{
    if(res._rental){
      // レンタカー編集
      setRentalEditForm({
        user:res.user,
        startDate:`${res.fy}-${String(res.fm+1).padStart(2,'0')}-${String(res.fd).padStart(2,'0')}`,
        endDate:`${res.ty}-${String(res.tm+1).padStart(2,'0')}-${String(res.td).padStart(2,'0')}`
      });
      setRentalEditModal({carId:car.id,resId:res.id,carName:car.name,color:res.color});
      return;
    }
    setEditForm({
      user:res.user,
      startDate:`${res.fy}-${String(res.fm+1).padStart(2,'0')}-${String(res.fd).padStart(2,'0')}`,
      endDate:`${res.ty}-${String(res.tm+1).padStart(2,'0')}-${String(res.td).padStart(2,'0')}`
    });
    setEditModal({carId:car.id,resId:res.id,carName:car.name});
  };
  const getState=(cid,dateObj)=>{
    if(!dateObj)return null;
    const {year:y,month:m,day:d}=dateObj;
    if(drag&&drag.carId===cid){
      const dragStart=new Date(drag.start.year,drag.start.month,drag.start.day);
      const dragEnd=new Date(drag.end.year,drag.end.month,drag.end.day);
      const current=new Date(y,m,d);
      if(current>=dragStart&&current<=dragEnd)return'drag';
    }
    if(confirm&&confirm.carId===cid){
      const confStart=new Date(confirm.start.year,confirm.start.month,confirm.start.day);
      const confEnd=new Date(confirm.end.year,confirm.end.month,confirm.end.day);
      const current=new Date(y,m,d);
      if(current>=confStart&&current<=confEnd)return'confirm';
    }
    return getRes(cid,y,m,d)||null;
  };

  // 予約済みセルクリックで該当予約を開く
  const handleResClick=(res)=>{
    if(pickMode)return;
    const dk=dateKey(res.fy,res.fm,res.fd);
    const inspRows=inspData[dk]||[];
    for(let i=0;i<inspRows.length;i++){
      if(inspRows[i]&&(inspRows[i].loanerId===res.carId||inspRows[i].name===res.user)){onOpenBooking('insp',dk,i,null,inspRows[i]);return;}
    }
    const schedDay=schedData[dk]||{};
    for(const slot of TIME_SLOTS){
      if(schedDay[slot]&&(schedDay[slot].loanerId===res.carId||schedDay[slot].name===res.user)){onOpenBooking('sched',dk,null,slot,schedDay[slot]);return;}
    }
  };

  // 編集保存：自分以外の予約と重複チェック
  const saveEdit=()=>{
    if(!editForm.user.trim()||!editForm.startDate||!editForm.endDate)return;
    const [fy,fm,fd]=editForm.startDate.split('-').map(Number);
    const [ty,tm,td]=editForm.endDate.split('-').map(Number);
    if(toNum(fy,fm-1,fd)>toNum(ty,tm-1,td)){alert('返却日は貸出日以降にしてください');return;}
    // 自分以外の予約と重複していないかチェック
    const others=(loanerRes[editModal.carId]||[]).filter(r=>r.id!==editModal.resId);
    const conflict=others.some(r=>{
      const rs=toNum(r.fy,r.fm,r.fd),re=toNum(r.ty,r.tm,r.td);
      const ns=toNum(fy,fm-1,fd),ne=toNum(ty,tm-1,td);
      return ns<=re&&ne>=rs;
    });
    if(conflict){alert('その期間は他の予約と重複しています');return;}
    const prev=(loanerRes[editModal.carId]||[]).find(r=>r.id===editModal.resId);
    onDeleteRes(editModal.carId,editModal.resId);
    onAddRes(editModal.carId,{id:Date.now(),fy,fm:fm-1,fd,ty,tm:tm-1,td,user:editForm.user,color:prev?.color||RES_COLORS[0]});
    setEditModal(null);
  };

  // レンタカー編集保存
  const saveEditRental=()=>{
    if(!rentalEditForm.user.trim()||!rentalEditForm.startDate||!rentalEditForm.endDate)return;
    const [fy,fm,fd]=rentalEditForm.startDate.split('-').map(Number);
    const [ty,tm,td]=rentalEditForm.endDate.split('-').map(Number);
    if(toNum(fy,fm-1,fd)>toNum(ty,tm-1,td)){alert('返却日は貸出日以降にしてください');return;}
    // 重複チェック
    const rentalResLocal=rentalRes||{};
    const others=(rentalResLocal[rentalEditModal.carId]||[]).filter(r=>r.id!==rentalEditModal.resId);
    const conflict=others.some(r=>{
      const rs=toNum(r.fy,r.fm,r.fd),re=toNum(r.ty,r.tm,r.td);
      const ns=toNum(fy,fm-1,fd),ne=toNum(ty,tm-1,td);
      return ns<=re&&ne>=rs;
    });
    if(conflict){alert('その期間は他の予約と重複しています');return;}
    // 1回のatomic更新で既存レコードを差し替え（delete+addの競合を防ぐ）
    onReplaceRentalRes(rentalEditModal.carId,rentalEditModal.resId,{
      fy,fm:fm-1,fd,ty,tm:tm-1,td,
      user:rentalEditForm.user,
      color:rentalEditModal.color||RES_COLORS[0],
    });
    setRentalEditModal(null);
  };

  return (
    <div>
      {/* ヘッダー */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,flexWrap:'wrap'}}>
        <button onClick={onBack} style={BACK_S}><ChevronLeft size={16}/>{pickMode?'モーダルに戻る':'カレンダーへ'}</button>
        <h2 style={{fontSize:18,fontWeight:800,color:'#1e1b4b',margin:0}}>
          🚗 代車管理
          {!pickMode&&<span style={{fontSize:12,color:'#6b7280',marginLeft:8,fontWeight:500}}>（閲覧専用）</span>}
        </h2>
        {!pickMode&&<div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
          <button onClick={onUndo} style={{padding:'6px 13px',background:'#f59e0b',color:'white',border:'none',borderRadius:6,fontWeight:700,cursor:'pointer',fontSize:12}}>↶ 戻す</button>
          <button onClick={onOpenTireEdit} title="タイヤ種別 一括設定"
            style={{padding:'6px 10px',background:'#fef3c7',border:'2px solid #fbbf24',borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontSize:11,fontWeight:700,color:'#d97706'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#f59e0b';e.currentTarget.style.background='#fef08a';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#fbbf24';e.currentTarget.style.background='#fef3c7';}}>
            ☀❄ タイヤ
          </button>
          <button onClick={onOpenLocationEdit} title="レンタカー所在地 一括設定"
            style={{padding:'6px 10px',background:'#d1fae5',border:'2px solid #6ee7b7',borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontSize:11,fontWeight:700,color:'#059669'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#10b981';e.currentTarget.style.background='#a7f3d0';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#6ee7b7';e.currentTarget.style.background='#d1fae5';}}>
            📍 所在地
          </button>
          <button onClick={onOpenSettings} title="代車・レンタカー設定"
            style={{padding:'6px 10px',background:'#f3f4f6',border:'2px solid #d1d5db',borderRadius:6,cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontSize:11,fontWeight:700,color:'#374151'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#4338ca';e.currentTarget.style.color='#4338ca';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#d1d5db';e.currentTarget.style.color='#374151';}}>
            <Settings size={13}/>設定
          </button>
        </div>}
      </div>

      {/* グリッド：overflow:hiddenでズレ防止 */}
      <div ref={gridRef} 
        style={{overflowX:'auto',userSelect:'none',WebkitUserSelect:'none',willChange:'scroll-position',transform:'translateZ(0)'}}
        onMouseUp={handleMU}
        onMouseLeave={()=>{if(isDragging.current){isDragging.current=false;setDrag(null);}}}>
        <table style={{borderCollapse:'collapse',fontSize:12,tableLayout:'fixed',width:'max-content'}}>
          <thead>
            <tr>
              <th style={{width:100,minWidth:100,maxWidth:100,background:'#eef2ff',padding:'7px 9px',textAlign:'left',fontWeight:700,border:'1px solid #e5e7eb',position:'sticky',left:0,zIndex:10,fontSize:11,boxSizing:'border-box',transform:'translateZ(0)',backfaceVisibility:'hidden'}}>代車</th>
              {dateRange.map((dateObj,i)=>{
                if(!dateObj)return null;
                const {year,month,day}=dateObj;
                const dow=new Date(year,month,day).getDay();
                const h2=selDate&&year===selDate.getFullYear()&&month===selDate.getMonth()&&day===selDate.getDate();
                const isHol=isHoliday(year,month,day);
                // 月が変わるタイミング
                const isMonthStart=i===0||(dateRange[i-1]&&dateRange[i-1].month!==month);
                return <th key={i} style={{width:44,minWidth:44,maxWidth:44,textAlign:'center',padding:'3px 0',border:'1px solid #e5e7eb',fontSize:9,background:h2?'#fef08a':isMonthStart?'#ddd6fe':'#eef2ff',color:dow===0||isHol?'#dc2626':dow===6?'#1d4ed8':'#374151',fontWeight:h2?800:600,boxSizing:'border-box'}}>
                  {isMonthStart&&<div style={{fontSize:7,fontWeight:800,color:'#4338ca'}}>{month+1}月</div>}
                  <div>{day}</div><div style={{fontSize:7}}>{DOW[dow]}</div>
                </th>;
              })}
            </tr>
          </thead>
          <tbody>
            {LOANERS_LOCAL.map(car=>{
              return (
                <tr key={car.id}>
                  <td style={{background:'#f9fafb',border:'1px solid #e5e7eb',padding:'5px 9px',fontWeight:600,fontSize:11,whiteSpace:'nowrap',position:'sticky',left:0,zIndex:5,transform:'translateZ(0)',backfaceVisibility:'hidden',height:40,boxSizing:'border-box'}}>
                    {(()=>{
                      const tireId=tireData&&tireData[String(car.id)];
                      const tireInfo=TIRE_TYPES.find(x=>x.id===tireId);
                      return(
                        <div style={{display:'flex',alignItems:'center',gap:5}}>
                          {tireInfo&&<span title={tireInfo.label} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:22,height:18,borderRadius:4,background:tireInfo.bg,color:tireInfo.color,fontSize:9,fontWeight:900,flexShrink:0,letterSpacing:'-0.5px'}}>{tireInfo.icon}</span>}
                          <div>
                            <div style={{fontWeight:700,color:'#1e1b4b'}}>{car.name}</div>
                            <div style={{color:'#9ca3af',fontSize:9}}>{car.num}</div>
                          </div>
                        </div>
                      );
                    })()}
                  </td>
                  {dateRange.map((dateObj,i)=>{
                    if(!dateObj)return null;
                    const {year,month,day}=dateObj;
                    const st=getState(car.id,dateObj);
                    const isObj=st&&typeof st==='object';
                    const isDrag=st==='drag';
                    const isConf=st==='confirm';
                    const h2=selDate&&year===selDate.getFullYear()&&month===selDate.getMonth()&&day===selDate.getDate();
                    const isStart=isObj&&st.fd===day&&st.fm===month&&st.fy===year;
                    const isEnd=isObj&&st.td===day&&st.tm===month&&st.ty===year;
                    const bg=isDrag?'#bef264':isConf?'#93c5fd':isObj?st.color:h2?'#fef08a':'white';
                    const isFree=pickMode&&!isObj&&!isDrag&&!isConf;
                    const isBlocked=pickMode&&isObj;
                    return (
                      <td key={i}
                        onMouseDown={e=>{
                          e.preventDefault();
                          if(!isBlocked)handleMD(car.id,dateObj,e);
                        }}
                        onMouseEnter={()=>{
                          if(!isBlocked)handleME(car.id,dateObj);
                          if(!pickMode&&isObj)setHoverRes({car,res:st});
                        }}
                        onMouseLeave={()=>{
                          if(!pickMode&&isObj)setHoverRes(null);
                        }}
                        onClick={(e)=>{
                          if(!pickMode&&isObj){
                            e.preventDefault();
                            e.stopPropagation();
                            setPinnedRes({car,res:st});
                            setHoverRes(null);
                          }
                        }}
                        style={{
                          width:44,minWidth:44,maxWidth:44,height:40,
                          border:'1px solid #e5e7eb',
                          boxShadow:isDrag?'inset 0 0 0 2px #65a30d':isConf?'inset 0 0 0 2px #2563eb':'none',
                          background:bg,
                          cursor:isBlocked?'not-allowed':isFree?'crosshair':!pickMode&&isObj?'pointer':'default',
                          padding:0,
                          overflow:'hidden',
                          position:'relative',
                          boxSizing:'border-box'
                        }}>
                        {/* ユーザー名を常時表示 */}
