                          </div>
                        )}
                        {/* 月をまたぐ場合、または前のセルが違う予約の場合も表示 */}
                        {isObj&&!isStart&&i>0&&(()=>{
                          const prevDate=dateRange[i-1];
                          if(!prevDate)return false;
                          const prevSt=getState(car.id,prevDate);
                          // 前のセルが空 or 違う予約 or 月が変わった場合に表示
                          const isDifferent=!prevSt||(prevSt&&typeof prevSt==='object'&&prevSt.id!==st.id);
                          const isMonthBoundary=prevDate.month!==dateObj.month;
                          return isDifferent||isMonthBoundary;
                        })()&&(
                          <div style={{position:'absolute',left:2,top:'50%',transform:'translateY(-50%)',fontSize:8,color:'white',fontWeight:700,whiteSpace:'nowrap',textShadow:'0 1px 2px rgba(0,0,0,.5)',zIndex:2,pointerEvents:'none'}}>
                            {st.user.length>6?st.user.slice(0,6)+'…':st.user}
                          </div>
                        )}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* ホバープレビュー（軽量・消えやすい） */}
      {!pickMode&&hoverRes&&!pinnedRes&&(
        <div style={{position:'fixed',bottom:24,right:24,zIndex:1900,background:'rgba(30,27,74,0.92)',color:'white',borderRadius:8,padding:'8px 14px',fontSize:12,pointerEvents:'none',boxShadow:'0 4px 16px rgba(0,0,0,0.3)'}}>
          🚙 {hoverRes.car.name}　{hoverRes.res.fm+1}/{hoverRes.res.fd}〜{hoverRes.res.tm+1}/{hoverRes.res.td}　{hoverRes.res.user}
          <div style={{fontSize:10,opacity:0.7,marginTop:2}}>クリックで編集・削除</div>
        </div>
      )}

      {/* 固定編集パネル（予約済みバーをクリックで開く） */}
      {!pickMode&&pinnedRes&&pinnedRes.res&&(
        <div style={{position:'fixed',bottom:24,right:24,zIndex:2000,background:'white',border:`2px solid ${pinnedRes.res._rental?'#059669':'#4338ca'}`,borderRadius:12,padding:'16px 18px',boxShadow:'0 8px 40px rgba(0,0,0,0.25)',minWidth:260}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:800,color:pinnedRes.res._rental?'#065f46':'#1e1b4b'}}>
              {pinnedRes.res._rental?'🔑':'🚙'} {pinnedRes.car.name}
            </div>
            <button onClick={()=>setPinnedRes(null)}
              style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:24,height:24,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',color:'#6b7280'}}>×</button>
          </div>
          <div style={{fontSize:12,color:'#374151',marginBottom:4}}>
            📅 {pinnedRes.res.fm+1}/{pinnedRes.res.fd}〜{pinnedRes.res.tm+1}/{pinnedRes.res.td}
          </div>
          <div style={{fontSize:12,color:'#6b7280',marginBottom:12}}>👤 {pinnedRes.res.user}</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>{openEdit(pinnedRes.car,pinnedRes.res);setPinnedRes(null);}}
              style={{flex:1,padding:'8px 0',background:'#4338ca',color:'white',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:'pointer'}}>✎ 編集</button>
            <button onClick={()=>{
              if(window.confirm(`「${pinnedRes.car.name}」の予約（${pinnedRes.res.fm+1}/${pinnedRes.res.fd}〜${pinnedRes.res.tm+1}/${pinnedRes.res.td} ${pinnedRes.res.user}）を削除しますか？`)){
                if(pinnedRes.res._rental){
                  onDeleteRentalRes(pinnedRes.car.id,pinnedRes.res.id);
                }else{
                  onDeleteRes(pinnedRes.car.id,pinnedRes.res.id);
                }
                setPinnedRes(null);
              }
            }}
              style={{flex:1,padding:'8px 0',background:'#ef4444',color:'white',border:'none',borderRadius:7,fontWeight:700,fontSize:12,cursor:'pointer'}}>🗑 削除</button>
          </div>
        </div>
      )}


      {/* -- 画面下部fixed固定パネル群 -- */}

      {/* ドラッグ中バナー：bottom center */}
      {pickMode&&drag&&(()=>{
        const {start,end}=drag;
        const days=Math.floor((new Date(end.year,end.month,end.day)-new Date(start.year,start.month,start.day))/(1000*60*60*24))+1;
        return(
          <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:1800,background:'rgba(146,64,14,0.95)',color:'white',borderRadius:10,padding:'10px 20px',fontSize:13,fontWeight:700,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',pointerEvents:'none',whiteSpace:'nowrap'}}>
            🚙 {LOANERS_LOCAL.find(c=>String(c.id)===String(drag.carId))?.name}　{start.month+1}/{start.day}〜{end.month+1}/{end.day}（{days}日間）　← 離して確定
          </div>
        );
      })()}

      {/* 確定パネル：bottom center（大） */}
      {pickMode&&confirm&&(()=>{
        const {start,end}=confirm;
        const days=Math.floor((new Date(end.year,end.month,end.day)-new Date(start.year,start.month,start.day))/(1000*60*60*24))+1;
        return(
          <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:1900,background:'white',border:'2px solid #3b82f6',borderRadius:14,padding:'16px 24px',boxShadow:'0 8px 40px rgba(0,0,0,0.25)',minWidth:340,maxWidth:'90vw'}}>
            <div style={{fontWeight:800,color:'#1d4ed8',fontSize:14,marginBottom:12,textAlign:'center'}}>
              🚙 {LOANERS_LOCAL.find(c=>String(c.id)===String(confirm.carId))?.name}　{start.month+1}/{start.day}〜{end.month+1}/{end.day}（{days}日間）
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input value={pickUser} onChange={e=>setPickUser(e.target.value)}
                placeholder="利用者名を入力" autoFocus
                style={{flex:1,padding:'9px 12px',border:'2px solid #93c5fd',borderRadius:8,fontSize:13,outline:'none',fontFamily:'inherit'}}
                onKeyDown={e=>{if(e.key==='Enter')handlePickConfirm();}}/>
              <button onClick={handlePickConfirm}
                style={{padding:'9px 20px',background:'#2563eb',color:'white',border:'none',borderRadius:8,fontWeight:800,cursor:'pointer',fontSize:13,whiteSpace:'nowrap'}}>✓ 確定</button>
              <button onClick={()=>{setConfirm(null);setPickUser('');}}
                style={{padding:'9px 14px',background:'#f3f4f6',border:'none',borderRadius:8,cursor:'pointer',fontSize:13}}>取消</button>
            </div>
          </div>
        );
      })()}

      {/* 使い方ヒント：ヘッダー直下インライン */}
      {pickMode&&!confirm&&!drag&&(
        <div style={{background:'rgba(240,253,244,0.97)',border:'1px solid #86efac',borderRadius:8,padding:'6px 12px',fontSize:11,color:'#166534',marginBottom:8,display:'inline-flex',alignItems:'center',gap:4}}>
          💡 空きセルをクリック→右にスライド→離して日数確定
        </div>
      )}
      {!pickMode&&(
        <div style={{fontSize:11,color:'#9ca3af',marginBottom:4}}>
          予約バーをクリックで編集・削除
        </div>
      )}

      {/* == レンタカーセクション == */}
      {RENTAL_LOCAL.length > 0 && (()=>{
        // レンタカー専用ドラッグ状態
        const [rDrag,setRDrag]=React.useState(null);
        const [rConfirm,setRConfirm]=React.useState(null);
        const [rPickUser,setRPickUser]=React.useState('');
        const rDragging=React.useRef(false);

        const getRState=(carId,dateObj)=>{
          const {year,month,day}=dateObj;
          const dn=toNum(year,month,day);
          const resList=rentalResLocal[carId]||[];
          for(const r of resList){
            if(dn>=toNum(r.fy,r.fm,r.fd)&&dn<=toNum(r.ty,r.tm,r.td))return r;
          }
          return null;
        };

        const getRDragState=(carId,dateObj)=>{
          if(!pickMode)return getRState(carId,dateObj);
          const {year,month,day}=dateObj;
          const dn=toNum(year,month,day);
          if(rDrag&&rDrag.carId===carId){
            const s=toNum(rDrag.start.year,rDrag.start.month,rDrag.start.day);
            const e=toNum(rDrag.end.year,rDrag.end.month,rDrag.end.day);
            if(dn>=s&&dn<=e)return'drag';
          }
          if(rConfirm&&rConfirm.carId===carId){
            const s=toNum(rConfirm.start.year,rConfirm.start.month,rConfirm.start.day);
            const e=toNum(rConfirm.end.year,rConfirm.end.month,rConfirm.end.day);
            if(dn>=s&&dn<=e)return'confirm';
          }
          return getRState(carId,dateObj);
        };

        const rHandleMD=(carId,dateObj)=>{
          if(!pickMode)return;
          if(getRState(carId,dateObj))return;
          rDragging.current=true;
          setRDrag({carId,start:dateObj,end:dateObj});
        };
        const rHandleME=(carId,dateObj)=>{
          if(!pickMode||!rDragging.current||!rDrag||rDrag.carId!==carId)return;
          const s=toNum(rDrag.start.year,rDrag.start.month,rDrag.start.day);
          const e=toNum(dateObj.year,dateObj.month,dateObj.day);
          if(e>=s)setRDrag(p=>({...p,end:dateObj}));
        };
        const rHandleMU=()=>{
          if(!rDragging.current||!rDrag)return;
          rDragging.current=false;
          setRConfirm({...rDrag});
          setRDrag(null);
          setRPickUser(savedModalData?.name||'');
        };
        const rHandleConfirm=()=>{
          if(!rPickUser.trim()||!rConfirm)return;
          const {carId,start,end}=rConfirm;
          const id='rr'+Date.now();
          const rec={id,carId,user:rPickUser.trim(),
            fy:start.year,fm:start.month,fd:start.day,
            ty:end.year,tm:end.month,td:end.day,
            color:RES_COLORS[Object.keys(rentalResLocal).length%RES_COLORS.length]};
          onAddRentalRes(carId,rec);
          setRConfirm(null);setRPickUser('');
          // pickModeならモーダルに戻る（onPickRentalがあれば呼ぶ）
          if(pickMode&&onPickRental){
            onPickRental(carId,rec);
          }
        };

        return(
          <div style={{marginTop:22}}
            onMouseUp={rHandleMU}
            onMouseLeave={()=>{if(rDragging.current){rDragging.current=false;setRDrag(null);}}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <h3 style={{margin:0,fontSize:14,fontWeight:800,color:'#059669'}}>🔑 レンタカー（両店共通）</h3>
              <span style={{padding:'2px 8px',borderRadius:12,background:'#d1fae5',color:'#065f46',fontSize:10,fontWeight:700}}>{RENTAL_LOCAL.length}台</span>
              {pickMode&&<span style={{fontSize:11,color:'#059669',fontWeight:600}}></span>}
            </div>
            <div style={{overflowX:'auto',userSelect:'none',WebkitUserSelect:'none'}}>
              <table style={{borderCollapse:'collapse',fontSize:12,tableLayout:'fixed',width:'max-content'}}>
                <thead>
                  <tr>
                    <th style={{width:120,minWidth:120,maxWidth:120,background:'#d1fae5',padding:'7px 9px',textAlign:'left',fontWeight:700,border:'1px solid #a7f3d0',position:'sticky',left:0,zIndex:10,fontSize:11,boxSizing:'border-box'}}>レンタカー</th>
                    {dateRange.map((dateObj,i)=>{
                      if(!dateObj)return null;
                      const {year,month,day}=dateObj;
                      const dow=new Date(year,month,day).getDay();
                      const h2=selDate&&year===selDate.getFullYear()&&month===selDate.getMonth()&&day===selDate.getDate();
                      const isHol=isHoliday(year,month,day);
                      const isMonthStart=i===0||(dateRange[i-1]&&dateRange[i-1].month!==month);
                      return <th key={i} style={{width:44,minWidth:44,maxWidth:44,textAlign:'center',padding:'3px 0',border:'1px solid #a7f3d0',fontSize:9,background:h2?'#fef08a':isMonthStart?'#d1fae5':'#ecfdf5',color:dow===0||isHol?'#dc2626':dow===6?'#1d4ed8':'#374151',fontWeight:h2?800:600,boxSizing:'border-box'}}>
                        {isMonthStart&&<div style={{fontSize:7,fontWeight:800,color:'#059669'}}>{month+1}月</div>}
                        <div>{day}</div><div style={{fontSize:7}}>{DOW[dow]}</div>
                      </th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {RENTAL_LOCAL.map(car=>{
                    const tireId=tireData?tireData[String(car.id)]:null;
                    const tireInfo=TIRE_TYPES.find(x=>x.id===tireId);
                    const locId=locationData?locationData[String(car.id)]:null;
                    return (
                      <tr key={car.id}>
                        <td style={{background:'#f0fdf4',border:'1px solid #a7f3d0',padding:'5px 9px',fontWeight:600,fontSize:11,whiteSpace:'nowrap',position:'sticky',left:0,zIndex:5,height:40,boxSizing:'border-box'}}>
                          <div style={{display:'flex',alignItems:'center',gap:4,flexWrap:'nowrap',overflow:'hidden'}}>
                            {tireInfo&&<span title={tireInfo.label} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:22,height:16,borderRadius:3,background:tireInfo.bg,color:tireInfo.color,fontSize:9,fontWeight:900,flexShrink:0}}>{tireInfo.icon}</span>}
                            <div style={{minWidth:0,overflow:'hidden'}}>
                              <div style={{fontWeight:700,color:'#065f46',overflow:'hidden',textOverflow:'ellipsis'}}>{car.name}</div>
                              <div style={{color:'#9ca3af',fontSize:9}}>{car.num}</div>
                            </div>
                            {locId==='honten'&&<span title="本店" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:18,height:18,borderRadius:3,background:'#2563eb',color:'white',fontSize:10,fontWeight:900,flexShrink:0,lineHeight:1}}>本</span>}
                            {locId==='sanda' &&<span title="三田店" style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:18,height:18,borderRadius:3,background:'#dc2626',color:'white',fontSize:10,fontWeight:900,flexShrink:0,lineHeight:1}}>三</span>}
                            {locId==='out'   &&<span title="貸出中" style={{padding:'1px 4px',borderRadius:3,background:'#6b7280',color:'white',fontSize:9,fontWeight:700,flexShrink:0}}>🔑</span>}
                          </div>
                        </td>
                        {dateRange.map((dateObj,i)=>{
                          if(!dateObj)return null;
                          const {year,month,day}=dateObj;
                          const st=getRDragState(car.id,dateObj);
                          const isObj=st&&typeof st==='object';
                          const isDrag=st==='drag';
                          const isConf=st==='confirm';
                          const h2=selDate&&year===selDate.getFullYear()&&month===selDate.getMonth()&&day===selDate.getDate();
                          const isStart=isObj&&st.fd===day&&st.fm===month&&st.fy===year;
                          const bg=isDrag?'#bef264':isConf?'#93c5fd':isObj?(st.color||'#86efac'):h2?'#fef08a':'white';
                          const isFree=pickMode&&!isObj&&!isDrag&&!isConf;
                          const isBlocked=pickMode&&isObj;
                          return (
                            <td key={i}
                              onMouseDown={e=>{e.preventDefault();if(!isBlocked)rHandleMD(car.id,dateObj);}}
                              onMouseEnter={()=>{rHandleME(car.id,dateObj);if(!pickMode&&isObj)setHoverRes({car,res:{...st,_rental:true}});}}
                              onMouseLeave={()=>{if(!pickMode&&isObj)setHoverRes(null);}}
                              onClick={e=>{
                                if(!pickMode&&isObj){e.preventDefault();e.stopPropagation();setPinnedRes({car,res:{...st,_rental:true}});}
                              }}
                              style={{
                                width:44,minWidth:44,maxWidth:44,height:40,
                                border:'1px solid #a7f3d0',
                                boxShadow:isDrag?'inset 0 0 0 2px #65a30d':isConf?'inset 0 0 0 2px #2563eb':'none',
                                background:bg,
                                cursor:isBlocked?'not-allowed':isFree?'crosshair':!pickMode&&isObj?'pointer':'default',
                                padding:0,overflow:'hidden',position:'relative',boxSizing:'border-box'}}>
                              {isObj&&isStart&&(
                                <div style={{position:'absolute',left:2,top:'50%',transform:'translateY(-50%)',fontSize:8,color:'white',fontWeight:700,whiteSpace:'nowrap',textShadow:'0 1px 2px rgba(0,0,0,.5)',zIndex:2,pointerEvents:'none'}}>
                                  {st.user.length>6?st.user.slice(0,6)+'…':st.user}
                                </div>
                              )}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* レンタカー確定パネル */}
            {pickMode&&rConfirm&&(()=>{
              const {start,end}=rConfirm;
              const days=Math.floor((new Date(end.year,end.month,end.day)-new Date(start.year,start.month,start.day))/(1000*60*60*24))+1;
              return(
                <div style={{position:'fixed',bottom:80,left:'50%',transform:'translateX(-50%)',zIndex:1950,background:'white',border:'2px solid #059669',borderRadius:14,padding:'16px 24px',boxShadow:'0 8px 40px rgba(0,0,0,0.25)',minWidth:340,maxWidth:'90vw'}}>
                  <div style={{fontWeight:800,color:'#065f46',fontSize:14,marginBottom:12,textAlign:'center'}}>
                    🔑 {RENTAL_LOCAL.find(c=>c.id===rConfirm.carId)?.name}　{start.month+1}/{start.day}〜{end.month+1}/{end.day}（{days}日間）
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <input value={rPickUser} onChange={e=>setRPickUser(e.target.value)}
                      placeholder="利用者名を入力" autoFocus
                      style={{flex:1,padding:'9px 12px',border:'2px solid #6ee7b7',borderRadius:8,fontSize:13,outline:'none',fontFamily:'inherit'}}
                      onKeyDown={e=>{if(e.key==='Enter')rHandleConfirm();}}/>
                    <button onClick={rHandleConfirm}
                      style={{padding:'9px 20px',background:'#059669',color:'white',border:'none',borderRadius:8,fontWeight:800,cursor:'pointer',fontSize:13,whiteSpace:'nowrap'}}>✓ 確定</button>
                    <button onClick={()=>{setRConfirm(null);setRPickUser('');}}
                      style={{padding:'9px 14px',background:'#f3f4f6',border:'none',borderRadius:8,cursor:'pointer',fontSize:13}}>取消</button>
                  </div>
                </div>
              );
            })()}

            {/* レンタカードラッグ中バナー */}
            {pickMode&&rDrag&&(()=>{
              const {start,end}=rDrag;
              const days=Math.floor((new Date(end.year,end.month,end.day)-new Date(start.year,start.month,start.day))/(1000*60*60*24))+1;
              return(
                <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:1800,background:'rgba(5,150,105,0.95)',color:'white',borderRadius:10,padding:'10px 20px',fontSize:13,fontWeight:700,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',pointerEvents:'none',whiteSpace:'nowrap'}}>
                  🔑 {RENTAL_LOCAL.find(c=>c.id===rDrag.carId)?.name}　{start.month+1}/{start.day}〜{end.month+1}/{end.day}（{days}日間）　← 離して確定
                </div>
              );
            })()}
          </div>
        );
      })()}

      {/* 編集モーダル（代車） */}
      {editModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setEditModal(null)}>
          <div onClick={e=>e.stopPropagation()} className="modal-box" style={{background:'white',borderRadius:15,padding:'24px 28px',width:'min(420px,92vw)',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <h2 style={{fontSize:16,fontWeight:800,color:'#1e1b4b',margin:0}}>✎ 代車予約の編集 - {editModal.carName}</h2>
              <button onClick={()=>setEditModal(null)} style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={14}/></button>
            </div>
            <div style={{display:'grid',gap:12}}>
              <div><label style={LBL}>利用者名</label><input value={editForm.user} onChange={e=>setEditForm(p=>({...p,user:e.target.value}))} style={INP} autoFocus/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><label style={LBL}>貸出日</label><input type="date" value={editForm.startDate} onChange={e=>setEditForm(p=>({...p,startDate:e.target.value}))} style={INP}/></div>
                <div><label style={LBL}>返却日</label><input type="date" value={editForm.endDate} onChange={e=>setEditForm(p=>({...p,endDate:e.target.value}))} style={INP}/></div>
              </div>
              {/* 他の予約状況ミニプレビュー */}
              <div style={{background:'#f8fafc',borderRadius:6,padding:'8px 10px',fontSize:11,color:'#6b7280'}}>
                <strong style={{color:'#374151'}}>📅 {editModal.carName} の既存予約：</strong>
                {(loanerRes[editModal.carId]||[]).filter(r=>r.id!==editModal.resId).length===0
                  ?<span style={{marginLeft:6}}>なし</span>
                  :(loanerRes[editModal.carId]||[]).filter(r=>r.id!==editModal.resId).map(r=>(
                    <div key={r.id} style={{marginTop:3,color:'#dc2626'}}>
                      🚫 {r.user}：{r.fm+1}/{r.fd}〜{r.tm+1}/{r.td}
                    </div>
                  ))
                }
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginTop:18}}>
              <button onClick={saveEdit} style={{flex:1,padding:'11px 0',background:'linear-gradient(135deg,#4338ca,#6d28d9)',color:'white',border:'none',borderRadius:9,fontWeight:700,cursor:'pointer'}}>✓ 更新</button>
              <button onClick={()=>{onDeleteRes(editModal.carId,editModal.resId);setEditModal(null);}} style={{padding:'11px 14px',background:'#fee2e2',color:'#dc2626',border:'2px solid #fca5a5',borderRadius:9,fontWeight:700,cursor:'pointer'}}>🗑</button>
              <button onClick={()=>setEditModal(null)} style={{padding:'11px 14px',background:'#f3f4f6',border:'none',borderRadius:9,fontWeight:600,cursor:'pointer'}}>戻る</button>
            </div>
          </div>
        </div>
      )}

      {/* 編集モーダル（レンタカー） */}
      {rentalEditModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:3000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setRentalEditModal(null)}>
          <div onClick={e=>e.stopPropagation()} className="modal-box" style={{background:'white',borderRadius:15,padding:'24px 28px',width:'min(420px,92vw)',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <h2 style={{fontSize:16,fontWeight:800,color:'#065f46',margin:0}}>🔑 レンタカー予約の編集 - {rentalEditModal.carName}</h2>
              <button onClick={()=>setRentalEditModal(null)} style={{background:'#f3f4f6',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><X size={14}/></button>
            </div>
            <div style={{display:'grid',gap:12}}>
              <div><label style={LBL}>利用者名</label><input value={rentalEditForm.user} onChange={e=>setRentalEditForm(p=>({...p,user:e.target.value}))} style={INP} autoFocus/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><label style={LBL}>貸出日</label><input type="date" value={rentalEditForm.startDate} onChange={e=>setRentalEditForm(p=>({...p,startDate:e.target.value}))} style={INP}/></div>
                <div><label style={LBL}>返却日</label><input type="date" value={rentalEditForm.endDate} onChange={e=>setRentalEditForm(p=>({...p,endDate:e.target.value}))} style={INP}/></div>
              </div>
              <div style={{background:'#f0fdf4',borderRadius:6,padding:'8px 10px',fontSize:11,color:'#6b7280'}}>
                <strong style={{color:'#065f46'}}>📅 {rentalEditModal.carName} の既存予約：</strong>
                {((rentalRes||{})[rentalEditModal.carId]||[]).filter(r=>r.id!==rentalEditModal.resId).length===0
                  ?<span style={{marginLeft:6}}>なし</span>
                  :((rentalRes||{})[rentalEditModal.carId]||[]).filter(r=>r.id!==rentalEditModal.resId).map(r=>(
                    <div key={r.id} style={{marginTop:3,color:'#dc2626'}}>
                      🚫 {r.user}：{r.fm+1}/{r.fd}〜{r.tm+1}/{r.td}
                    </div>
                  ))
                }
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginTop:18}}>
              <button onClick={saveEditRental} style={{flex:1,padding:'11px 0',background:'linear-gradient(135deg,#059669,#047857)',color:'white',border:'none',borderRadius:9,fontWeight:700,cursor:'pointer'}}>✓ 更新</button>
              <button onClick={()=>{onDeleteRentalRes(rentalEditModal.carId,rentalEditModal.resId);setRentalEditModal(null);}} style={{padding:'11px 14px',background:'#fee2e2',color:'#dc2626',border:'2px solid #fca5a5',borderRadius:9,fontWeight:700,cursor:'pointer'}}>🗑</button>
              <button onClick={()=>setRentalEditModal(null)} style={{padding:'11px 14px',background:'#f3f4f6',border:'none',borderRadius:9,fontWeight:600,cursor:'pointer'}}>戻る</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
});

// ============================================
//  メインアプリ
// ============================================

// ╔══════════════════════════════════════════════════════════════════╗
// ║  BLOCK-E: メインアプリ・画面レイアウト                          ║
// ║  【要注意】カレンダー・スケジュール・ヘッダー固定が含まれる     ║
// ║  含まれる内容:                                                  ║

function AppInner() {
  const nowDate = new Date();
  // -- ログイン後は今日のスケジュールからスタート --
  // ★修正4: sessionStorageでログイン状態を保持（リロード後も維持）
  const [currentUser,setCurrentUser]=useState(()=>{
    try{
      // sessionStorage：ブラウザ（タブ）を閉じたらログアウト
      const saved=sessionStorage.getItem('hub_currentUser');
      return saved?JSON.parse(saved):null;
    }catch{return null;}
  });
  const setCurrentUserPersist=useCallback((user)=>{
    setCurrentUser(user);
    try{
      if(user) sessionStorage.setItem('hub_currentUser',JSON.stringify(user));
      else sessionStorage.removeItem('hub_currentUser');
    }catch{}
  },[]);

  // ── 共有PC：10分無操作でスタッフ選択画面に戻る ──
  const _idleTimer = useRef(null);
  const _idleDesktop = useRef(null); // タイムアウト時に戻る共有PC情報

  const resetIdleTimer = useCallback(() => {
    if(!_idleDesktop.current) return;
    clearTimeout(_idleTimer.current);
    _idleTimer.current = setTimeout(() => {
      // スタッフのみログアウト（共有PC情報は保持）
      setCurrentUser(null);
      try{ sessionStorage.removeItem('hub_currentUser'); }catch{}
    }, 10 * 60 * 1000); // 10分
  }, []);

  // 共有PCログイン時にタイマー開始、個人PCはタイマー不要
  useEffect(() => {
    if(currentUser?.desktopName) {
      // 共有PCログイン：デスクトップ情報を記憶してタイマー開始
      _idleDesktop.current = {
        name: currentUser.desktopName,
        store: currentUser.store?.id || currentUser.store,
      };
      // 操作イベントでタイマーリセット
      const events = ['mousedown','mousemove','keydown','touchstart','scroll','click'];
      events.forEach(e => window.addEventListener(e, resetIdleTimer, {passive:true}));
      resetIdleTimer();
      return () => {
        events.forEach(e => window.removeEventListener(e, resetIdleTimer));
        clearTimeout(_idleTimer.current);
      };
    } else {
      // 個人PCまたはログアウト：タイマー不要
      _idleDesktop.current = null;
      clearTimeout(_idleTimer.current);
    }
  }, [currentUser?.desktopName, resetIdleTimer]);
  const [curMonth,setCurMonth]=useState(new Date(nowDate.getFullYear(),nowDate.getMonth(),1));
  const [loanerMonth,setLoanerMonth]=useState(new Date(nowDate.getFullYear(),nowDate.getMonth(),1));
  const [selDate,setSelDate]=useState(new Date(nowDate.getFullYear(),nowDate.getMonth(),nowDate.getDate()));
  const [view,setView]=useState('schedule');
  const [scale,setScale]=useState(100);
  const [schedCollapsed,setSchedCollapsed]=useState(false); // スケジュール畳む/開く（デフォルト：開く）

  // 車検は両店舗共通
  const [inspData,   setInspData]  =useShared(STOR+'insp',{});
  // 顧客リストからの仮予約（スケジュール未登録）専用ストレージ
  // キー: "名前::YYYY-M-D"  値: {status:'provisional', formData:{...}, custMonth, custRowIdx, savedAt}
  const [custBookings, setCustBookings]=useShared(STOR+'custbk',{});
  // 表示中の店舗（ログイン後に切り替え可能）
  const [viewStore,  setViewStore] =useState(()=>{
    // 初期値：ログイン済みユーザーの店舗を復元
    try{const u=JSON.parse(sessionStorage.getItem('hub_currentUser')||'null');return u?.store?.id||u?.store||null;}catch{return null;}
  }); // 'honten' | 'sanda'
  const vsId = viewStore||'honten';
  // 店舗別データ（本店）
  const [schedDataH, setSchedDataH]=useShared(storKey('sched','honten'),{});
  const [memoDataH,  setMemoDataH] =useShared(storKey('memo', 'honten'),{});
  const [loanerResH, setLoanerResH]=useShared(storKey('lres', 'honten'),{});
  const [closedDaysH,setClosedDaysH]=useShared(storKey('cdow', 'honten'),[],60000);
  const [closedDatesH,setClosedDatesH]=useShared(storKey('cdate','honten'),[],60000);
  const [dayOffDataH, setDayOffDataH] =useShared(storKey('dayoff','honten'),{},60000);
  // 店舗別データ（三田店）

  // 第2火曜日を「通常営業」に戻す日付一覧（両店共通）

  const [dayOffDataS, setDayOffDataS] =useShared(storKey('dayoff','sanda'),{},60000);
  const [paidLeaveDataH,setPaidLeaveDataH]=useShared(storKey('pleave','honten'),{},30000);
  const [paidLeaveDataS,setPaidLeaveDataS]=useShared(storKey('pleave','sanda'),{},30000);
  // -- 動的スタッフリスト --
  const [staffListH,setStaffListH]=useShared(storKey('staff-v2','honten'),DEFAULT_STAFF_HONTEN,60000);
  const [staffListS,setStaffListS]=useShared(storKey('staff-v2','sanda'),DEFAULT_STAFF_SANDA,60000);
  const [desktopListH,setDesktopListH]=useShared(STOR+'desktops-honten',[],60000);
  const [desktopListS,setDesktopListS]=useShared(STOR+'desktops-sanda',[],60000);
  const [showStaffRegister,setShowStaffRegister]=useState(false);
  const [showStaffSettings,setShowStaffSettings]=useState(false);
  // 現在の表示店舗に応じたデータ・setter
  const schedData    = vsId==='honten'?schedDataH   :schedDataS;
  const setSchedData = vsId==='honten'?setSchedDataH:setSchedDataS;
  const memoData     = vsId==='honten'?memoDataH    :memoDataS;
  const setMemoData  = vsId==='honten'?setMemoDataH :setMemoDataS;
  const loanerRes    = vsId==='honten'?loanerResH   :loanerResS;
  const setLoanerRes = vsId==='honten'?setLoanerResH:setLoanerResS;
  const closedDays   = vsId==='honten'?closedDaysH  :closedDaysS;
  const setClosedDays= vsId==='honten'?setClosedDaysH:setClosedDaysS;
  const closedDates  = vsId==='honten'?closedDatesH :closedDatesS;
  const setClosedDates=vsId==='honten'?setClosedDatesH:setClosedDatesS;
  const dayOffData   = vsId==='honten'?dayOffDataH  :dayOffDataS;
  const setDayOffData= vsId==='honten'?setDayOffDataH:setDayOffDataS;
  const paidLeaveData   = vsId==='honten'?paidLeaveDataH:paidLeaveDataS;
  const setPaidLeaveData= vsId==='honten'?setPaidLeaveDataH:setPaidLeaveDataS;
  // 動的代車リスト（店舗別）・レンタカー
  const [loanerListH,  setLoanerListH]  = useShared(storKey('cars','honten'),DEFAULT_LOANERS_HONTEN,60000);
  const [loanerListS,  setLoanerListS]  = useShared(storKey('cars','sanda'),DEFAULT_LOANERS_SANDA,60000);
  const [rentalCars,   setRentalCars]   = useShared(STOR+'rentalcars',DEFAULT_RENTAL_CARS,60000);
  const [rentalResData,setRentalResData]= useShared(STOR+'rres',              {});
  const [carTireData,  setCarTireData]  = useShared(STOR+'tiredata',{},60000); // {carId: 'summer'|'winter'|'all'}
  const [rentalLocData,setRentalLocData]= useShared(STOR+'rentaloc',          {}); // {carId: 'honten'|'sanda'|'out'}
  const [vehicleData,  setVehicleData]  = useShared(STOR+'vehicles', []);          // 車両管理（車検証＋点検）
  const [showLoanerSettings, setShowLoanerSettings] = useState(false);
  const [showTireEdit,       setShowTireEdit]        = useState(false);
  const [showLocationEdit,   setShowLocationEdit]    = useState(false);
  const dynLoanerListH = (loanerListH&&loanerListH.length>0) ? loanerListH : DEFAULT_LOANERS_HONTEN;
  const dynLoanerListS = (loanerListS&&loanerListS.length>0) ? loanerListS : DEFAULT_LOANERS_SANDA;
  const dynRentalCars  = (rentalCars &&rentalCars.length >0) ? rentalCars  : DEFAULT_RENTAL_CARS;
  // 表示中の代車リスト（店舗別）
  const currentLoaners = vsId==='honten' ? dynLoanerListH : dynLoanerListS;
  const [locks,      setLocks]     =useShared(STOR+'locks',{},3000);
  const addRentalRes    = useCallback((carId,rec) => setRentalResData(p=>({...p,[carId]:[...(p[carId]||[]),rec]})),[setRentalResData]);
  const deleteRentalRes = useCallback((carId,resId) => setRentalResData(p=>({...p,[carId]:(p[carId]||[]).filter(r=>r.id!==resId)})),[setRentalResData]);
  const replaceRentalRes = useCallback((carId,resId,newRec) => setRentalResData(p=>({...p,[carId]:(p[carId]||[]).map(r=>r.id===resId?{...r,...newRec}:r)})),[setRentalResData]);
  const [loanerUndo, setLoanerUndo]=useState([]);
  // LoanerGridのpinnedRes/hoverResを親で管理（グリッドの再レンダリング防止→scrollLeft保持）
  const [loanerPinnedRes, setLoanerPinnedRes]=useState(null);
  const [loanerHoverRes,  setLoanerHoverRes] =useState(null);
  // useCallbackで安定化→memo()境界を越えても再レンダリングしない
  const stablePinnedSetter=useCallback(v=>setLoanerPinnedRes(v),[]);
  const stableHoverSetter =useCallback(v=>setLoanerHoverRes(v),[]);

  // モーダル状態
  const [modalOpen,  setModalOpen] =useState(false);
  const [modalType,  setModalType] =useState('insp');
  const [modalDk,    setModalDk]   =useState('');
  const [modalIdx,   setModalIdx]  =useState(0);
  const [modalSlot,  setModalSlot] =useState('');
  const [modalData,  setModalData] =useState(blankInsp());
  const [modalIsNew, setModalIsNew]=useState(false);
  const [curLockKey, setCurLockKey]=useState(null);

  const [pickMode,       setPickMode]      =useState(false);
  const [pendingLoanerId,setPendingLoanerId]=useState(null);
  const [pendingLoanerData,setPendingLoanerData]=useState(null); // 一時保存（モーダル確定まで反映しない）
  const [pendingRentalId,setPendingRentalId]=useState(null);
  const [pendingRentalRec,setPendingRentalRec]=useState(null);
  const [savedModalData, setSavedModalData] =useState(null);
  const [showHoliday,    setShowHoliday]    =useState(false);
  const [showDayOff,     setShowDayOff]     =useState(false);
  const headerRef=useRef(null);
  const [headerH, setHeaderH]=useState(90); // ヘッダー高さ（デフォルト90px）
  // ヘッダー高さをstate＋CSS変数の両方にセット
  useEffect(()=>{
    const update=()=>{
      const hh=headerRef.current?.offsetHeight||90;
      setHeaderH(hh);
      document.documentElement.style.setProperty('--header-h', hh+'px');
    };
    update();
    const ro=new ResizeObserver(update);
    if(headerRef.current)ro.observe(headerRef.current);
    return()=>ro.disconnect();
  },[]);
  // 現在表示中の店舗のスタッフリスト
  // 動的スタッフリスト（初期データのフォールバック付き）
  const dynStaffH = (staffListH&&staffListH.length>0)?staffListH:DEFAULT_STAFF_HONTEN;
  const dynStaffS = (staffListS&&staffListS.length>0)?staffListS:DEFAULT_STAFF_SANDA;
  const allDynStaff = [...dynStaffH,...dynStaffS];
  const currentStaffList = (vsId==='honten'?dynStaffH:dynStaffS).filter(s=>s.badge!=='president'&&s.myNumber!==0);
  // 表示中の店舗テーマ（全画面の色分けに使用）
  const vsStore = STORES.find(s=>s.id===vsId)||STORES[0];
  const [showSearch,     setShowSearch]     =useState(false);
  const [inspSlots,      setInspSlots]      =useState(1);
  const [showAllInsp,    setShowAllInsp]    =useState(true);
  const [memoModal,      setMemoModal]      =useState(false); // 備考モーダル
  const [schedRestrictions, setSchedRestrictions] = useShared('schedRestrictions', {}); // 入庫制限データ
  const [restrictionModal, setRestrictionModal] = useState(false); // 入庫制限モーダル
  const [inspLimits, setInspLimits] = useShared(STOR+'inspLimits', {}); // 車検台数制限 {dk: number}
  const [showInspLimitModal, setShowInspLimitModal] = useState(false); // 台数制限モーダル
  const [showCalSettings,    setShowCalSettings]    = useState(false);
  const [showStaffCal,       setShowStaffCal]       = useState(false);
  const [calView,            setCalView]            = useState('insp'); // 'insp' | 'staff'
  const [calStaffFilter,     setCalStaffFilter]     = useState(null);  // null=全員 or スタッフ名
  // クイックアイテム（古いwork/content形式→text形式に自動変換）
  const [quickItemsRaw, setQuickItemsRaw] = useShared(STOR+'setItems', DEFAULT_SET_ITEMS);
  const setItems = useMemo(()=>{
    const raw = Array.isArray(quickItemsRaw)&&quickItemsRaw.length>0 ? quickItemsRaw : DEFAULT_SET_ITEMS;
    return raw.map(si=>({
      ...si,
      text: si.text ?? si.content ?? si.label ?? '',
    }));
  },[quickItemsRaw]);
  const setSetItems = useCallback(v=>setQuickItemsRaw(v),[setQuickItemsRaw]);
  const [showSetItemEdit, setShowSetItemEdit] = useState(false);
  // 備考・メモ用クイックアイテム（スケジュール内容欄とは独立）
  const [memoItemsRaw, setMemoItemsRaw] = useShared(STOR+'memoItems', DEFAULT_MEMO_ITEMS);
  const memoItems = useMemo(()=>{
    const raw = Array.isArray(memoItemsRaw) ? memoItemsRaw : DEFAULT_MEMO_ITEMS;
    return raw.map(si=>({...si, text: si.text ?? si.content ?? si.label ?? ''}));
  },[memoItemsRaw]);
  const setMemoItems = useCallback(v=>setMemoItemsRaw(v),[setMemoItemsRaw]);
  const [showMemoItemEdit, setShowMemoItemEdit] = useState(false);
  // 左右スプリットパネル
  const [splitRatio,         setSplitRatio]         = useState(50);    // 左カラム幅 % (5〜95)
  const splitContainerRef    = useRef(null);
  const isDraggingRef        = useRef(false);

  // 過去の台数制限を自動クリーンアップ（起動時 + 日付変わった時）
  useEffect(()=>{
    if(!currentUser)return;
    const today=new Date();
    const todayNum=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
    setInspLimits(prev=>{
      const cleaned={};let changed=false;
      Object.entries(prev).forEach(([dk,limit])=>{
        const parts=dk.split('-').map(Number);
        const num=parts[0]*10000+parts[1]*100+parts[2];
        if(num>=todayNum){cleaned[dk]=limit;}
        else{changed=true;}
      });
      return changed?cleaned:prev;
    });
  },[currentUser,setInspLimits]);

  // ロック管理：setLocksはuseSharedのupdateなのでsSetは自動で呼ばれる
  const acquireLock=useCallback((key,userName)=>{
    setLocks(prev=>({...prev,[key]:{lockedBy:userName,lockedAt:Date.now()}}));
  },[setLocks]);
  const releaseLock=useCallback((key)=>{
    if(!key)return;
    setLocks(prev=>{const cur={...prev};delete cur[key];return cur;});
  },[setLocks]);

  // -- データエクスポート（クリップボードにコピー） --
  const [exportStatus,setExportStatus]=useState(null); // null | 'ok' | 'err'
  const [gasStatus,setGasStatus]=useState(GAS_READY?'connecting':'unconfigured');
  // 顧客リスト（5ヶ月分エクセル）
  const [custFiles, setCustFiles] = useState(() => {
    try { const v=localStorage.getItem('hub_cust_files'); return v?JSON.parse(v):{}; } catch{return {};}
  }); // {month: [{...}, ...]}
  const [custView, setCustView] = useState('list'); // 'list'|'detail'
  const [custFilter, setCustFilter] = useState('');
  const [custMonth, setCustMonth] = useState('all');
  const [custDetail, setCustDetail] = useState(null);
  const [custStoreFilter, setCustStoreFilter] = useState('all');
 // 'unconfigured'|'connecting'|'ok'|'error'

  // GAS接続確認（起動時）
  useEffect(()=>{
    if(!GAS_READY){setGasStatus('unconfigured');return;}
    setGasStatus('connecting');
    sGet('hub-v8-gasping').then(()=>setGasStatus('ok')).catch(()=>setGasStatus('error'));
  },[]);

  // customers.htmlから戻ってきたとき即リフレッシュ
  useEffect(()=>{
    const onVisible=()=>{
      if(document.visibilityState==='visible'){
        // inspDataを即再取得
        sGet(STOR+'insp').then(v=>{if(v&&typeof v==='object')setInspData(v);});
        // customers.htmlから戻ったとき店舗をログインユーザーに合わせて復元
        try{
          const saved=sessionStorage.getItem('hub_currentUser');
          if(saved){const u=JSON.parse(saved);const sid=u?.store?.id||u?.store||null;if(sid)setViewStore(sid);}
        }catch(e){}
      }
    };
    document.addEventListener('visibilitychange',onVisible);
    return()=>document.removeEventListener('visibilitychange',onVisible);
  },[]);

  // 顧客リストデータのバックグラウンドプリロード
  useEffect(()=>{
    const preload=async()=>{
      try{
        const idx=await sGet(STOR+'cf-index');
        if(!Array.isArray(idx)||idx.length===0)return;
        // cf-indexをlocalStorageに保存
        localStorage.setItem('hub-cf-index',JSON.stringify(idx));
        // 各ファイルのチャンクを順番にバックグラウンド取得
        const SAFE=n=>n.replace(/[^a-zA-Z0-9\u3000-\u9fff\u30a0-\u30ff\u3040-\u309f]/g,'_').slice(0,30);
        for(const fi of idx){
          const sn=SAFE(fi.name);
          const chunkIdx=await sGet(STOR+'cf-'+sn+'-index');
          if(!chunkIdx)continue;
          const chunks=await Promise.all(
            Array.from({length:chunkIdx.chunks},(_,i)=>sGet(STOR+'cf-'+sn+'-chunk-'+i))
          );
          const customers=chunks.filter(Boolean).flat();
          // チャンクデータをlocalStorageに保存
          localStorage.setItem('hub-cf-'+sn,JSON.stringify({name:fi.name,customers}));
        }
      }catch(e){/* プリロード失敗は無視 */}
    };
    // 起動3秒後にバックグラウンドで開始（メイン処理を妨げない）
    const timer=setTimeout(preload,3000);
    return()=>clearTimeout(timer);
  },[]);
  const handleExport=useCallback(()=>{
    const now=new Date();
    const data={
      exportedAt:now.toISOString(),
      exportedBy:currentUser?.name||'',
      exportedStore:vsId,
      version:'hub-v8',
      inspData,
      schedDataHonten:schedDataH, schedDataSanda:schedDataS,
      memoDataHonten:memoDataH,   memoDataSanda:memoDataS,
      loanerResHonten:loanerResH, loanerResSanda:loanerResS,
    };
    const json=JSON.stringify(data,null,2);
    navigator.clipboard.writeText(json).then(()=>{
      setExportStatus('ok');
      setTimeout(()=>setExportStatus(null),3000);
    }).catch(()=>{
      setExportStatus('err');
      setTimeout(()=>setExportStatus(null),4000);
    });
  },[currentUser,inspData,schedData,memoData,loanerRes,closedDays,closedDates]);

  // ── 印刷・PDF出力 ──────────────────────────────────────────
  const handlePrint = useCallback((dk, inspData, schedData, dateLabel, vsId, loanerRes, COURSES, LOANERS, TIME_SLOTS, staffList, dayOffData, closedDays, closedDates, memoData) => {
    const storeName = vsId==='honten'?'本店':'三田店';
    const storeColor = vsId==='honten'?'#2563eb':'#dc2626';
    const inspRows = inspData[dk]||[];
    const normSt = s=>{if(!s)return'';if(s==='honten'||s==='本店')return'honten';if(s==='sanda'||s==='三田店')return'sanda';return s;};
    const myRows = inspRows.filter(r=>r&&r.name&&normSt(r.store)===vsId);
    const otherRows = inspRows.filter(r=>r&&r.name&&normSt(r.store)&&normSt(r.store)!==vsId);
    const noStoreRows = inspRows.filter(r=>r&&r.name&&!normSt(r.store));
    const sortedInsp = [...myRows, ...noStoreRows, ...otherRows];

    const courseLabel = id => {const c=COURSES.find(c=>c.id===Number(id));return c?c.name:'';};
    const getLoanerLabel = (dk, name) => {
      for(const cid of Object.keys(loanerRes)){
        for(const r of (loanerRes[cid]||[])){
          if(r.user===name){
            const car=LOANERS.find(c=>String(c.id)===String(cid));
            return car?car.name:'代車';
          }
        }
      }
      return '';
    };

    const dayOff = dayOffData[dk]||[];
    const workStaff = staffList.filter(s=>!dayOff.includes(s.name));

    // タイムスケジュール：9:00〜18:00 全枠（空き含む）
    const PRINT_SLOTS = TIME_SLOTS.filter(s=>{
      const h=parseInt(s.split(':')[0]);
      return h>=9 && h<=18;
    });

    const schedRows = [];
    for(const slot of PRINT_SLOTS){
      const subKeys = Object.keys(schedData[dk]||{}).filter(k=>k===slot||k.startsWith(slot+'-'));
      const dataKeys = subKeys.filter(k=>{const r=schedData[dk][k];return r&&r.name;});
      if(dataKeys.length===0){
        schedRows.push({slot, name:'', carType:'', work:'', loaner:'', note:'', isEmpty:true});
      } else {
        dataKeys.forEach((k,i)=>{
          const r=schedData[dk][k];
          schedRows.push({slot:i===0?slot:'', name:r.name||'', carType:r.carType||'', work:r.workType||'', loaner:r.loanerLabel||'', note:r.content||'', isEmpty:false});
        });
      }
    }

    // 備考・メモ
    const memos = (memoData&&memoData[dk])||[];
    const memoHtml = memos.length>0

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>${dateLabel} ${storeName} スケジュール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .left { width: 46%; display: flex; flex-direction: column; gap: 7px; }

  .slot-empty td:first-child { color: #94a3b8; font-weight: 700; }
  .has-data td { background: white; }
  .staff-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; font-size: 9px; }
  .chip { padding: 1px 6px; border-radius: 10px; font-weight: 700; }
  .chip-work { background: #e0f2fe; color: #0369a1; }
  .chip-off { background: #f1f5f9; color: #94a3b8; }
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; border-bottom: 2px solid #1e293b; padding-bottom: 4px; }
  h1 { font-size: 15px; font-weight: 800; }
  .print-info { font-size: 8px; color: #94a3b8; }
  .section-box { border: 1px solid #e5e7eb; border-radius: 5px; overflow: hidden; }
  .memo-body { padding: 5px 8px; min-height: 30px; }
</style>
</head>
<body>
<div class="page">
  <div class="left">
    <div class="header">
      <h1>🚗 ${dateLabel}　${storeName}</h1>
      <span class="print-info">印刷：${new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
    </div>

    <div class="section-box">

        <thead><tr class="insp-head">
          <th style="width:16px">No</th>
          <th style="width:68px">氏名</th>
          <th style="width:58px">車種</th>
          <th style="width:52px">コース</th>
          <th style="width:42px">代車</th>
          <th style="width:18px">特典</th>
          <th>備考</th>
        </tr></thead>
        <tbody>
          ${sortedInsp.length===0?'<tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:8px">予約なし</td></tr>':
            sortedInsp.map((r,i)=>{
              const isOther = normSt(r.store)&&normSt(r.store)!==vsId;
              const storeTag = normSt(r.store)==='honten'?'本':normSt(r.store)==='sanda'?'三':'';
              const loaner = getLoanerLabel(dk, r.name);
              const tagColor = normSt(r.store)==='honten'?'#2563eb':'#dc2626';
              return `<tr class="${isOther?'store-other':'store-my'}">
                <td style="font-weight:700;color:${isOther?'#94a3b8':storeColor}">${i+1}</td>
                <td style="font-weight:700">${r.name||''}${storeTag?`<span style="font-size:7px;background:${tagColor};color:white;padding:1px 3px;border-radius:2px;margin-left:2px">${storeTag}</span>`:''}</td>
                <td>${r.carType||''}</td>
                <td>${courseLabel(r.course)}</td>
                <td>${loaner}</td>
                <td style="text-align:center">${r.tokuten||''}</td>
                <td>${r.note||''}</td>
              </tr>`;
            }).join('')
          }
        </tbody>
      </table>
    </div>

    <div class="staff-row">
      <span style="font-weight:700;color:#374151">出勤：</span>
      ${workStaff.map(s=>`<span class="chip chip-work">${s.name}</span>`).join('')}
      ${dayOff.length>0?`<span style="color:#94a3b8;margin-left:4px">休：</span>${dayOff.map(n=>`<span class="chip chip-off">${n}</span>`).join('')}`:''}
    </div>

    <div class="section-box">
      <h2 class="memo-head">📝 備考・メモ</h2>
      <div class="memo-body">${memoHtml}</div>
    </div>
  </div>

  <div class="right">
    <div style="margin-top:28px"></div>
    <div class="section-box">
      <h2 class="sched-head">⏰ タイムスケジュール（9:00〜18:00）</h2>
      <table>
        <thead><tr class="sched-head">
          <th style="width:34px">時間</th>
          <th style="width:65px">氏名</th>
          <th style="width:55px">車種</th>
          <th style="width:45px">作業</th>
          <th style="width:50px">代車</th>
          <th>内容</th>
        </tr></thead>
        <tbody>
          ${schedRows.map(r=>`
            <tr class="${r.isEmpty?'slot-empty':'has-data'}">
              <td style="font-weight:700;color:#0e7490;white-space:nowrap">${r.slot||''}</td>
              <td style="font-weight:${r.name?'700':'400'}">${r.name||''}</td>
              <td>${r.carType||''}</td>
              <td>${r.work||''}</td>
              <td>${r.loaner||''}</td>
              <td>${r.note||''}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>
</div>
</body></html>`;

          dk:modalDk, idx:modalIdx, savedAt:Date.now(),

      } else {
        // ── 本予約（またはスケジュール画面から）：inspDataに書く ──

          while(rows.length<=modalIdx)rows.push(blankInsp());
          const approvedCount=rows.filter((r,i)=>i!==modalIdx&&r.name&&r.course&&!r.pendingApproval).length;
          const dayLimit=inspLimits[modalDk]??6;
          if(approvedCount>=dayLimit){

            alert(`⚠️ 1日の車検台数が制限台数（${dayLimit}台）を超えました。\n本店での承認が必要です。`);
          }
          // レギュラー車検（course=3）の1日3台上限チェック
          if(Number(cleanWithStore.course)===3){
            const regularCount=rows.filter((r,i)=>i!==modalIdx&&r.name&&Number(r.course)===3&&!r.pendingApproval).length;
            if(regularCount>=3){
              cleanWithStore.pendingApproval=true;
              alert(`⚠️ レギュラー車検は1日最大3台までです（両店合計）。\n本店での承認が必要です。`);
            }

          rows[modalIdx]={...cleanWithStore,bookingStatus:'confirmed'};
          return{...prev,[modalDk]:rows};
        });
        // 本予約確定 → custBookingsの仮予約エントリを削除
        if(fromCustList && custModalMeta?.bkKey){
          setCustBookings(prev=>{const n={...prev};delete n[custModalMeta.bkKey];return n;});
        }
        // 本予約確定 → 受注日をcustFilesのreserve①or②に書き込む
        if(fromCustList && custModalMeta?.custMonth && custModalMeta?.custRowIdx!=null){
          const today=new Date();
          const ts=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
          setCustFiles(prev=>{
            const rows=[...(prev[custModalMeta.custMonth]||[])];
            if(!rows[custModalMeta.custRowIdx])return prev;
            const row={...rows[custModalMeta.custRowIdx]};

          }
          return next;
        });
      }
    }

    setCurLockKey(null);
    setTimeout(()=>releaseLock(keyToRelease),200);
    setFromCustList(false);setCustModalMeta(null);
  },[modalType,modalDk,modalIdx,modalSlot,vsId,curLockKey,releaseLock,setInspData,setSchedData,setLoanerRes,schedRestrictions,setModalOpen,inspLimits,pendingRentalId,pendingRentalRec,pendingLoanerId,pendingLoanerData,dynRentalCars,fromCustList,custModalMeta,setCustBookings,setCustFiles]);

                          </span>

                            📋 有給&nbsp;<span style={{fontSize:18,fontWeight:900}}>{staffMonthStats.leaves}</span>&nbsp;日

                          <span style={{fontSize:12,color:'#4338ca',fontWeight:800,padding:'5px 10px',background:'#eef2ff',border:'1px solid #a5b4fc',borderRadius:16}}>

                          </span>
                        </div>
                      </div>

                  </div>
                );
              })()

            </div>

        })()}

        {/* -- スケジュール -- */}
        {view==='schedule'&&_selDate&&(()=>{
          const inspRows=getInsps(dk);
          return (
            <div style={{background:'white',borderRadius:0,boxShadow:'none',borderTop:`4px solid ${vsStore.color}`,flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minHeight:0}}>
              <div id="sec-top"/>
              {/* 固定ヘッダー：日付ナビ〜スタッフバー */}

                {/* 1行目：ナビ - 日付を中央、ズームを右 */}

                  <div style={{display:'flex',gap:3,alignItems:'center',justifyContent:'center'}}>
                      <button onClick={()=>moveDate(-30)} style={{...NAV_S,padding:'4px 7px',fontSize:10}} title="先月">««</button>
                      <button onClick={()=>moveDate(-7)} style={{...NAV_S,padding:'4px 7px',fontSize:10}} title="前週">«</button>

                      <div style={{position:'relative',display:'inline-flex',alignItems:'center'}}>
                        <span
                          onClick={()=>{const el=document.getElementById('sched-date-input');if(el){try{el.showPicker();}catch{el.click();}}}}

                          {_selDate?`${_selDate.getMonth()+1}月${_selDate.getDate()}日（${['日','月','火','水','木','金','土'][_selDate.getDay()]}）`:''}

                          onChange={e=>{const p=e.target.value.split('-').map(Number);if(p.length===3&&!isNaN(p[0]))setSelDate(new Date(p[0],p[1]-1,p[2]));}}
                          style={{position:'absolute',opacity:0,width:'1px',height:'1px',top:0,left:0,pointerEvents:'none'}}

                      </div>

                      <button onClick={()=>moveDate(30)} style={{...NAV_S,padding:'4px 7px',fontSize:10}} title="翌月">»»</button>
                    </div>
                  
                  {dayMemos.length>0&&(
                    <div style={{position:'absolute',left:'25%',transform:'translateX(-50%)',pointerEvents:'none',display:'flex',alignItems:'center'}}>
                      <span style={{display:'flex',alignItems:'center',gap:5,padding:'4px 13px',background:'#fbbf24',border:'2px solid #d97706',borderRadius:7,fontSize:12,fontWeight:800,color:'#1c1917',whiteSpace:'nowrap',boxShadow:'0 2px 6px rgba(217,119,6,0.35)',pointerEvents:'auto',cursor:'pointer',userSelect:'none'}}
                        onClick={()=>document.getElementById('sec-notes')?.scrollIntoView({behavior:'smooth'})}>
                        📝 備考 {dayMemos.length}件
                      </span>
                    </div>
                  )}
                  <div style={{position:'absolute',right:0,display:'flex',alignItems:'center',gap:6}}>
                    <button onClick={()=>setScale(s=>Math.max(70,s-10))} style={{...NAV_S,padding:'4px 7px'}}><ZoomOut size={13}/></button>
                    <span style={{fontSize:11,fontWeight:700,color:'#374151',minWidth:34,textAlign:'center'}}>{scale}%</span>
                    <button onClick={()=>setScale(s=>Math.min(150,s+10))} style={{...NAV_S,padding:'4px 7px'}}><ZoomIn size={13}/></button>
                    <button onClick={()=>setScale(100)} style={{padding:'4px 8px',background:'#f3f4f6',border:'none',borderRadius:5,cursor:'pointer',fontSize:10,color:'#374151'}}>100%</button>
                  </div>
                </div>
                {/* 2行目：スタッフバー（固定） */}
                {(()=>{
                  // 店舗休日の場合はスタッフ全員を休み扱い
                  const storeHoliday=isClosed(new Date(...dk.split('-').map((v,i)=>i===1?Number(v)-1:Number(v))));
                  const manualOffs=dayOffData[dk]||[];
                  const offs=storeHoliday?currentStaffList.map(s=>s.name):manualOffs;
                  const working=storeHoliday?[]:currentStaffList.filter(s=>!manualOffs.includes(s.name));
                  const dayoff=storeHoliday?currentStaffList:currentStaffList.filter(s=>manualOffs.includes(s.name));
                  return(
                    <div style={{display:'flex',alignItems:'stretch',border:'1px solid #e5e7eb',borderRadius:8,overflow:'hidden',marginBottom:6}}>
                      <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 12px',background:storeHoliday?'#f3f4f6':vsStore.bg,flex:1,flexWrap:'wrap',minWidth:0}}>
                        <span style={{fontSize:12}}>👤</span>
                        <span style={{fontWeight:700,fontSize:11,color:'#374151',whiteSpace:'nowrap'}}>本日</span>
                        {storeHoliday
                          ? <span style={{fontSize:11,color:'#9ca3af',fontStyle:'italic'}}>店休日（全員休み）</span>
                          : working.length>0
                            ? working.map(s=>(
                                <span key={s.id} style={{padding:'2px 9px',borderRadius:20,background:vsStore.bg,color:vsStore.accent,fontWeight:700,fontSize:11,border:`1px solid ${vsStore.color}55`,whiteSpace:'nowrap'}}>
                                  {s.name}
                                </span>
                              ))
                            : <span style={{fontSize:11,color:'#9ca3af',fontStyle:'italic'}}>—</span>
                        }
                      </div>
                      <div onClick={storeHoliday?undefined:()=>setShowDayOff(true)} title={storeHoliday?'店休日のため全員休み':'クリックして休日スタッフを編集'}
                        style={{display:'flex',alignItems:'center',gap:6,padding:'5px 12px',
                          background:'repeating-linear-gradient(45deg,#f5f5f5,#f5f5f5 3px,#ebebeb 3px,#ebebeb 6px)',
                          borderLeft:'1px solid #e5e7eb',cursor:storeHoliday?'default':'pointer',flexWrap:'wrap',justifyContent:'flex-end',minWidth:'fit-content',maxWidth:'45%'}}>
                        {dayoff.length>0
                          ? dayoff.map(s=>(
                              <span key={s.id} style={{padding:'2px 9px',borderRadius:20,background:'#9ca3af',color:'white',fontWeight:700,fontSize:11,whiteSpace:'nowrap'}}>
                                {s.name}
                              </span>
                            ))
                          : <span style={{fontSize:11,color:'#9ca3af',fontStyle:'italic',whiteSpace:'nowrap'}}>休日なし</span>
                        }
                        <span style={{fontSize:11,color:'#9ca3af',flexShrink:0}}>🏖</span>
                      </div>
                    </div>
                  );
                })()}
              </div>

              <div style={{padding:'8px 18px 4px 18px',flex:1,minHeight:0,display:'flex',flexDirection:'column',overflowY:'auto'}}>
              {/* 編集中ロック表示 */}
              {(()=>{
                const al=Object.entries(locks).filter(([k,v])=>k.includes(dk)&&v.lockedBy!==currentUser.name);
                if(!al.length)return null;
                return <div style={{marginBottom:12,padding:'7px 12px',background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:7,display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
                  <span style={{fontSize:12,fontWeight:700,color:'#92400e'}}>🔒 編集中：</span>
                  {al.map(([k,v])=><span key={k} style={{fontSize:11,background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:12,padding:'2px 8px',color:'#dc2626',fontWeight:600}}>{v.lockedBy}</span>)}
                </div>;
              })()}

              {/* -- 対応可能チェック・アラート（時間枠別・自店舗のみ） -- */}
              {(()=>{
                const storeHolidayChk=isClosed(new Date(...dk.split('-').map((v,i)=>i===1?Number(v)-1:Number(v))));
                const offs=storeHolidayChk?currentStaffList.map(s=>s.name):(dayOffData[dk]||[]);
                const workingCount=storeHolidayChk?0:currentStaffList.filter(s=>!offs.includes(s.name)).length;
                if(workingCount===0)return null;

                // 入庫時間を分単位に変換するヘルパー
                const toMin=t=>{
                  if(!t)return null;
                  const m=t.match(/(\d+):(\d+)/);
                  if(!m)return null;
                  return parseInt(m[1])*60+parseInt(m[2]);
                };

                // 自店舗の車検を枠別にカウント（承認済みのみ）（9:00〜9:29 → 9時枠、9:30〜9:59 → 9:30枠）
                const myInsps=(inspData[dk]||[]).filter(r=>r?.name&&!r.pendingApproval&&(r.store===vsId||(r.store==null&&vsId==='honten')));
                const insp900=myInsps.filter(r=>{const m=toMin(r.time);return m!=null&&m>=9*60&&m<9*60+30;}).length;
                const insp930=myInsps.filter(r=>{const m=toMin(r.time);return m!=null&&m>=9*60+30&&m<10*60;}).length;

                // スケジュールの09:00・09:30スロット件数（複数行対応）
                const countSchedSlot=(base)=>{
                  const day=schedData[dk]||{};
                  const keys=[base,...Object.keys(day).filter(k=>k.startsWith(base+'__'))];
                  return keys.filter(k=>day[k]?.name).length;
                };
                const sched900=countSchedSlot('09:00');
                const sched930=countSchedSlot('09:30');

                // 枠ごとの合計
                const total900=insp900+sched900;
                const total930=insp930+sched930;

                const alerts=[];
                [
                  {label:'9:00枠',total:total900,insp:insp900,sched:sched900},
                  {label:'9:30枠',total:total930,insp:insp930,sched:sched930},
                ].forEach(({label,total,insp,sched})=>{
                  if(total===0)return;
                  const isOver=total>workingCount;
                  const isEqual=total===workingCount;
                  if(!isOver&&!isEqual)return;
                  alerts.push({label,total,insp,sched,isOver,isEqual});
                });

                if(alerts.length===0)return null;
                return(
                  <div style={{marginBottom:12,fontSize:`${scale}%`,display:'flex',flexDirection:'column',gap:6}}>
                    {alerts.map(({label,total,insp,sched,isOver})=>(
                      <div key={label} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',background:isOver?'#fff1f2':'#fffbeb',border:`2px solid ${isOver?'#fca5a5':'#fcd34d'}`,borderRadius:9}}>
                        <span style={{fontSize:18,flexShrink:0}}>{isOver?'⚠️':'⚡'}</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:800,color:isOver?'#dc2626':'#d97706',fontSize:13}}>
                            【{label}】入庫台数が対応スタッフ数{isOver?'を超えています':'に達しています'}
                          </div>
                          <div style={{fontSize:11,color:isOver?'#9f1239':'#92400e',marginTop:2,display:'flex',gap:10,flexWrap:'wrap'}}>
                            <span>🚗 車検 <strong>{insp}台</strong></span>
                            <span>⏰ 整備 <strong>{sched}件</strong></span>
                            <span>＝ 合計 <strong>{total}件</strong></span>
                            <span>👤 スタッフ <strong>{workingCount}名</strong></span>
                            {isOver&&<span style={{color:'#dc2626',fontWeight:800}}>→ {total-workingCount}件オーバー</span>}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })()}

              {/* == スプリットパネル：左＝車検＋備考 ／ 右＝タイムスケジュール == */}
              {/* ドラッグで左右比率を変更、リセットで50:50に戻す */}
              <div ref={splitContainerRef}
                style={{display:'flex',gap:0,flex:1,overflow:'hidden',position:'relative',userSelect:isDraggingRef.current?'none':'auto'}}
                onMouseMove={e=>{
                  if(!isDraggingRef.current||!splitContainerRef.current)return;
                  const rect=splitContainerRef.current.getBoundingClientRect();
                  const pct=((e.clientX-rect.left)/rect.width)*100;
                  setSplitRatio(Math.min(93,Math.max(7,pct)));
                }}
                onMouseUp={()=>{isDraggingRef.current=false;document.body.style.cursor='';document.body.style.userSelect='';}}
                onMouseLeave={()=>{if(isDraggingRef.current){isDraggingRef.current=false;document.body.style.cursor='';document.body.style.userSelect='';}}}
              >

                {/* --- 左カラム --- */}
                <div style={{width:`${splitRatio}%`,minWidth:0,flexShrink:0,display:'flex',flexDirection:'column',gap:18,overflowY:'auto',height:'100%',paddingBottom:40}}>
              {/* -- 車検セクション（台数集計なし） -- */}
              <div id={SEC_INSP} style={{marginBottom:26,fontSize:`${scale}%`,scrollMarginTop:'var(--header-h,60px)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <h3 style={SEC_TITLE('#3730a3')}>🚗 車検</h3>
                  {/* 台数制限バッジ（設定中の日のみ表示） */}
                  {inspLimits[dk]!=null&&(
                    <div style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',background:'#fee2e2',border:'2px solid #ef4444',borderRadius:6}}>
                      <span style={{fontSize:14}}>🚗</span>
                      <span style={{fontWeight:700,color:'#dc2626',fontSize:11}}>台数制限 最大{inspLimits[dk]}台</span>
                    </div>
                  )}
                  {/* 承認待ち警告アイコン */}
                  {(()=>{
                    const pendingCount=(inspData[dk]||[]).filter(r=>r?.name&&r.pendingApproval).length;
                    if(pendingCount===0)return null;
                    return <div style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',background:'#fef3c7',border:'2px solid #f59e0b',borderRadius:6}}>
                      <span style={{fontSize:16}}>⚠️</span>
                      <span style={{fontWeight:700,color:'#d97706',fontSize:11}}>承認待ち {pendingCount}件</span>
                    </div>;
                  })()}
                  {/* +/- 枠ボタン：左詰め */}
                  {inspSlots>1&&<button onClick={()=>setInspSlots(s=>Math.max(1,s-1))} title="枠を削除" style={{display:'flex',alignItems:'center',gap:2,padding:'4px 9px',background:'#fef2f2',border:'2px solid #fca5a5',borderRadius:5,cursor:'pointer',fontWeight:700,fontSize:10,color:'#dc2626'}}><MinusSquare size={13}/></button>}

                </div>
                <div style={{overflowX:'auto'}}>
                  <table style={TBL}>
                    <thead><tr style={{background:'linear-gradient(90deg,#3730a3,#6d28d9)',color:'white'}}>
                      {['No','氏名','車種','コース','代車','特典','入庫','備考',''].map(h=><th key={h} style={{padding:'7px 8px',textAlign:'left',fontSize:12,fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>)}
                    </tr></thead>
                    <tbody>
                      {(()=>{
                        const allRows=(inspData[dk]||[]);
                        // 現在の店舗を上位に表示（本店ログイン→本店上、三田店ログイン→三田店上）
                        const normSt=s=>{if(!s)return'';if(s==='honten'||s==='本店')return'honten';if(s==='sanda'||s==='三田店')return'sanda';return s;};
                        const storeOrder=r=>{const st=normSt(r?.store);if(st===vsId)return 0;if(st)return 1;return 2;};
                        const timeToMin=t=>{if(!t||typeof t!=='string')return 9999;const m=t.match(/(\d+):(\d+)/);return m?parseInt(m[1])*60+parseInt(m[2]):9999;};
                        const sortFn=(a,b)=>{
                          const so=storeOrder(a)-storeOrder(b);
                          if(so!==0)return so;
                          return timeToMin(a.time)-timeToMin(b.time);
                        };
                        const allMapped=allRows.map((r,i)=>({...(r&&r.name?r:blankInsp()),_origIdx:i}));
                        // 台数制限取得（設定なければ6）
                        const dayInspLimit=inspLimits[dk]??6;
                        // キャンセル除外・名前あり行をidx順（入力順）で並べる
                        const validRows=allMapped
                          .filter(r=>!!(r.name)&&r.bookingStatus!=='cancelled')
                          .sort((a,b)=>a._origIdx-b._origIdx);

                        // 上段6台：入力順で先着dayInspLimit台を確定（店舗・承認状態に関わらず）
                        // ただし表示順はログイン店舗優先・時刻順（sortFn）で並べる
                        const normalRows=validRows.slice(0,dayInspLimit).slice().sort(sortFn);

                        // 下段7台目以降：入力順で7台目以降を時刻順で並べる
                        const waitingRows=validRows
                          .slice(dayInspLimit)
                          .sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));

                        // 追加行のインデックス
                        const usedIdxs=new Set(validRows.map(r=>r._origIdx));
                        const recycledIdx=allRows.findIndex((r,i)=>!usedIdxs.has(i)&&(!r||!r.name||r.bookingStatus==='cancelled'));
                        const addIdx=recycledIdx>=0?recycledIdx:allRows.length;

                        const rows=[];
                        // ① 上段：先着6台（店舗・承認状態に関わらず入力順固定）
                        normalRows.forEach((row,dispIdx)=>{
                          const origIdx=row._origIdx??dispIdx;
                          const {_origIdx,...cleanRow}=row;
                          rows.push(
                            <InspRow key={`${origIdx}-${dispIdx}`} row={cleanRow} idx={origIdx} dispNo={dispIdx+1} dk={dk} onOpenModal={handleOpenModal} lockInfo={getInspLock(dk,origIdx)} loanerRes={loanerRes} loanerResH={loanerResH} loanerResS={loanerResS} vsId={vsId} onApprove={handleApprove} isOverLimit={false} setItems={setItems} onPrintJobSheet={(r,dk2)=>handlePrintJobSheet(r,dk2,vsId,loanerResH,loanerResS,loanerRes)}/>
                          );
                        });
                        // ② 台数制限超過バナー（7台目以降がある場合）
                        if(waitingRows.length>0){
                          rows.push(
                            <tr key="limit-alert">
                              <td colSpan={8} style={{padding:'7px 14px',background:'linear-gradient(90deg,#fee2e2,#fff1f2)',border:'2px solid #fca5a5',textAlign:'center',fontSize:12,fontWeight:800,color:'#dc2626'}}>

                              </td>
                            </tr>
                          );
                        }
                        // ③ 下段：7台目以降（入力順・承認済みでも位置は変わらない）
                        waitingRows.forEach((row,pi)=>{
                          const origIdx=row._origIdx??pi;
                          const {_origIdx,...cleanRow}=row;
                          // 承認済み行はそのまま（承認済みバッジ）、未承認行は承認待ちフラグ付与
                          const displayRow=cleanRow.approved
                            ?{...cleanRow,pendingApproval:false}  // 承認済み：承認待ちバッジ消す
                            :{...cleanRow,pendingApproval:true};  // 未承認：承認待ちバッジ表示

                          );
                        });
                        // ④ 追加行（isNew=trueで開く）
                        const addDispNo=normalRows.length+waitingRows.length+1;
                        rows.push(
                          <InspRow key={`add-${addIdx}`} row={{...blankInsp()}} idx={addIdx} dispNo={addDispNo} dk={dk} onOpenModal={(type,dk2,idx2,slot)=>handleOpenModal(type,dk2,idx2,slot,true)} lockInfo={null} loanerRes={loanerRes} loanerResH={loanerResH} loanerResS={loanerResS} vsId={vsId} onApprove={handleApprove} isOverLimit={false} setItems={setItems}/>
                        );
                        return rows;

        onClose={()=>setShowMemoItemEdit(false)}
        title="備考・メモ クイック編集"
        items={Array.isArray(memoItemsRaw)?memoItemsRaw.map(si=>({...si,text:si.text??si.content??si.label??''})):DEFAULT_MEMO_ITEMS}
        onSave={v=>setMemoItems(v)}/>
    </div>
  );
}

function App(){return <ErrorBoundary><AppInner/></ErrorBoundary>;}
